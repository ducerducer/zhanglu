// ========== INIT ==========
function init() {
  renderArticle();

function setInitialHeight() {
  const page = document.getElementById("pageArticle");
  const articlePanel = document.getElementById("articlePanel");
  const pageH = page.offsetHeight;
  // Start with ~40% of the page for article, with a sane min/max
  let h = Math.max(120, Math.min(pageH - 160, Math.round(pageH * 0.4)));
  articlePanel.style.height = h + "px";
}

function renderArticle() {
  const el = document.getElementById("articleText");
  el.innerHTML = ARTICLE_PARAGRAPHS.map(p => `<p>${p}</p>`).join("");
}

function renderQuestions() {
  const container = document.getElementById("questionsContainer");
  container.innerHTML = QUESTIONS.map((q, idx) => {
    const tableHTML = q.answerRows
      ? `<table><thead><tr><th>作品</th><th>所托花木</th><th>特征</th><th>所言情志</th></tr></thead><tbody>` +
        q.answerRows.map(r =>
          `<tr><td>${r.work}</td><td>${r.flower}</td><td>${r.trait}</td><td>${r.zhi}</td></tr>`
        ).join("") + `</tbody></table>`
      : `<div class="text">${q.answer}</div>`;

    return `
      <div class="question-card" id="card_${q.id}">
        <div class="question-label">第${q.label}题 <span class="point-badge">${q.point}</span></div>
        <div class="question-text">${q.text}</div>
        ${q.subtext ? `<div class="question-subtext">${q.subtext}</div>` : ""}

        <details class="answer-toggle">
          <summary>✅ 查看正确答案</summary>
          <div class="answer-content">${tableHTML}</div>
        </details>

        <div class="input-area">
          <textarea id="input_${q.id}" placeholder="在此输入孩子的答案……" oninput="onTyping('${q.id}')">${loadDraft(q.id)}</textarea>
        </div>
        <div class="action-row">
          <button class="analyze-btn" id="btn_${q.id}" onclick="analyze('${q.id}', ${idx})">🔍 AI 分析</button>
          <span class="status-text" id="status_${q.id}"></span>
        </div>
        <div class="analysis-result" id="result_${q.id}"></div>
      </div>

  }).join("");
}

function loadDraft(qId) {
  try { return localStorage.getItem("draft_" + qId) || ""; } catch(e) { return ""; }
}

function onTyping(qId) {
  try { localStorage.setItem("draft_" + qId, document.getElementById("input_" + qId).value); } catch(e) {}
}

// ========== DRAG RESIZE ==========
function initDragResize() {
  const handle = document.getElementById("dragHandle");
  const articlePanel = document.getElementById("articlePanel");
  const page = document.getElementById("pageArticle");
  let startY, startH;

  function onStart(e) {
    e.preventDefault();
    startY = e.type.startsWith("touch") ? e.touches[0].clientY : e.clientY;
    startH = articlePanel.offsetHeight;
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onEnd);
    document.addEventListener("touchmove", onMove, { passive: false });
    document.addEventListener("touchend", onEnd);
  }

  function onMove(e) {
    e.preventDefault();
    const clientY = e.type.startsWith("touch") ? e.touches[0].clientY : e.clientY;
    const delta = clientY - startY;
    const pageH = page.offsetHeight;
    const minH = 80;
    const maxH = pageH - 120;
    let newH = Math.max(minH, Math.min(maxH, startH + delta));
    articlePanel.style.height = newH + "px";
  }

  function onEnd() {
    document.removeEventListener("mousemove", onMove);
    document.removeEventListener("mouseup", onEnd);
    document.removeEventListener("touchmove", onMove);
    document.removeEventListener("touchend", onEnd);
  }

  handle.addEventListener("mousedown", onStart);
  handle.addEventListener("touchstart", onStart, { passive: true });
}

// ========== AI ANALYSIS ==========
function analyze(qId, qIdx) {
  const q = QUESTIONS[qIdx];
  const studentAnswer = document.getElementById("input_" + qId).value.trim();
  if (!studentAnswer) {
    document.getElementById("status_" + qId).textContent = "⚠️ 请先输入答案";
    return;
  }

  const btn = document.getElementById("btn_" + qId);
  const status = document.getElementById("status_" + qId);
  const resultDiv = document.getElementById("result_" + qId);

  btn.disabled = true;
  status.innerHTML = '<span class="loading"></span> AI 分析中……';
  resultDiv.classList.remove("visible");

  const questionFullText = q.text + (q.subtext ? "\n" + q.subtext : "");
  const answerText = q.answerRows
    ? q.answerRows.map(r => `${r.work}: 花木=${r.flower}, 特征=${r.trait}, 情志=${r.zhi}`).join("\n")
    : q.answer;

  const systemPrompt = `你是一位经验丰富的初中语文教师。你要对学生的阅读理解答案进行精准分析。

你将收到：一道语文阅读题 + 正确答案 + 学生的回答。

请按照以下三点进行分析（这个分析将存入错题本，以后会根据所有错题本记录来总结学生的语文能力薄弱环节）：

【缺失点】学生哪些答案要点没有答出来？对比正确答案，逐点指出。

【原因分析】学生没答出来的根本原因是什么？可能是：漏掉了某个答案点、没有理解文章深层含义或作者意图、审题不清、答题技巧不足、表达不完整等。请具体分析。

【改进建议】针对这道题，告诉学生下次遇到同类题目时具体怎么做才能答对。建议要具体、可操作。

注意：语气对事不对人，以鼓励为主。不要在分析中透露这是给家长看的。`;

  const userMessage = `## 文章
《紫藤萝瀑布》（宗璞）

## 题目
${questionFullText}

## 正确答案
${answerText}

## 学生的回答
${studentAnswer}

请按【缺失点】【原因分析】【改进建议】三点给出分析。`;

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: MODEL,
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: userMessage }
      ],
      temperature: 0.3,
      max_tokens: 2000
    })
  })
  .then(r => r.json())
  .then(data => {
    btn.disabled = false;
    if (data.error) {
      status.textContent = "❌ API 错误：" + (data.error.message || JSON.stringify(data.error));
      return;
    }
    const analysisText = data.choices?.[0]?.message?.content || "分析失败，未收到有效回复";
    status.textContent = "✅ 分析完成";
    displayAnalysis(qId, analysisText, q, studentAnswer, answerText);
    saveToErrorBook(qId, q, studentAnswer, answerText, analysisText);
    renderErrorBook();
  })
  .catch(err => {
    btn.disabled = false;
    status.textContent = "❌ 请求失败：" + err.message;
  });
}

function displayAnalysis(qId, text) {
  const div = document.getElementById("result_" + qId);
  div.innerHTML = "";

  let missContent = "", reasonContent = "", suggestContent = "";

  const missMatch = text.match(/【缺失点】([\s\S]*?)(?=【原因分析】|【改进建议】|$)/);
  const reasonMatch = text.match(/【原因分析】([\s\S]*?)(?=【缺失点】|【改进建议】|$)/);
  const suggestMatch = text.match(/【改进建议】([\s\S]*?)(?=【缺失点】|【原因分析】|$)/);

  if (missMatch) missContent = missMatch[1].trim();
  if (reasonMatch) reasonContent = reasonMatch[1].trim();
  if (suggestMatch) suggestContent = suggestMatch[1].trim();

  if (!missContent && !reasonContent && !suggestContent) {
    const lines = text.split("\n");
    let currentSection = "";
    for (const line of lines) {
      const t = line.trim();
      if (/缺失/.test(t)) { currentSection = "miss"; continue; }
      if (/原因|为什么/.test(t)) { currentSection = "reason"; continue; }
      if (/建议|改进|怎么做/.test(t)) { currentSection = "suggest"; continue; }
      if (currentSection === "miss") missContent += t + "\n";
      else if (currentSection === "reason") reasonContent += t + "\n";
      else if (currentSection === "suggest") suggestContent += t + "\n";
    }
  }

  if (!missContent && !reasonContent && !suggestContent) {
    div.innerHTML = `<div style="font-size:14px;line-height:1.8;white-space:pre-wrap;">${escapeHtml(text)}</div>`;
    div.classList.add("visible");
    return;
  }

  if (missContent) {
    div.innerHTML += `<div class="analysis-section"><span class="section-label miss">❌ 缺失点</span><div class="section-content">${formatText(missContent)}</div></div>`;
  }
  if (reasonContent) {
    div.innerHTML += `<div class="analysis-section"><span class="section-label reason">🤔 原因分析</span><div class="section-content">${formatText(reasonContent)}</div></div>`;
  }
  if (suggestContent) {
    div.innerHTML += `<div class="analysis-section"><span class="section-label suggest">💡 改进建议</span><div class="section-content">${formatText(suggestContent)}</div></div>`;
  }

  div.classList.add("visible");
}

function formatText(text) {
  return text.split("\n").filter(l => l.trim()).map(l => `<p>${l.trim()}</p>`).join("");
}

function escapeHtml(text) {
  const d = document.createElement("div");
  d.textContent = text;
  return d.innerHTML;
}

// ========== ERROR BOOK ==========
function getErrorBook() {
  try { return JSON.parse(localStorage.getItem("errorBook") || "[]"); } catch(e) { return []; }
}

function saveToErrorBook(qId, q, studentAnswer, correctAnswer, analysis) {
  const book = getErrorBook();
  const existingIdx = book.findIndex(e => e.qId === qId);
  const entry = {
    qId, label: q.label,
    question: q.text + (q.subtext ? " " + q.subtext : ""),
    correctAnswer, studentAnswer, analysis,
    timestamp: new Date().toLocaleString("zh-CN", { timeZone: "Asia/Shanghai" })
  };
  if (existingIdx >= 0) book[existingIdx] = entry;
  else book.push(entry);
  try { localStorage.setItem("errorBook", JSON.stringify(book)); } catch(e) {}
}

function deleteErrorEntry(qId) {
  let book = getErrorBook();
  book = book.filter(e => e.qId !== qId);
  try { localStorage.setItem("errorBook", JSON.stringify(book)); } catch(e) {}
  renderErrorBook();
}

function renderErrorBook() {
  const book = getErrorBook();
  const container = document.getElementById("errEntries");
  const countText = document.getElementById("errCountText");
  countText.textContent = `共 ${book.length} 条分析记录`;

  if (book.length === 0) {
    container.innerHTML = `<div class="empty-state">📝 暂无分析记录，先做一道题吧</div>`;
    return;
  }

  container.innerHTML = book.map(e => {
    let missPreview = "";
    const m = e.analysis.match(/【缺失点】([\s\S]*?)(?=【原因分析】|【改进建议】|$)/);
    if (m) missPreview = m[1].trim().substring(0, 120) + (m[1].trim().length > 120 ? "…" : "");
    const s = e.analysis.match(/【改进建议】([\s\S]*?)(?=【缺失点】|【原因分析】|$)/);
    const sp = s ? s[1].trim().substring(0, 100) + (s[1].trim().length > 100 ? "…" : "") : "";

    return `
      <div class="err-entry">
        <button class="delete-entry" onclick="deleteErrorEntry('${e.qId}')" title="删除">✕</button>
        <div class="meta">第${e.label}题 · ${e.timestamp}</div>
        <div class="q-text">${e.question}</div>
        <div class="analysis-summary">
          <strong style="color:#c0392b;">缺失点：</strong>${missPreview || "（见详情）"}<br>
          ${sp ? `<strong style="color:#27ae60;">建议：</strong>${sp}` : ""}
        </div>
        <details style="margin-top:6px;font-size:13px;">
          <summary style="color:#2d5a27;cursor:pointer;">查看完整分析</summary>
          <div style="margin-top:6px;padding:8px;background:#f9f9f9;border-radius:6px;line-height:1.7;white-space:pre-wrap;">${escapeHtml(e.analysis)}</div>
        </details>
      </div>
    `;
  }).join("");
}

// ========== OVERALL SUMMARY ==========
function generateOverallSummary() {
  const book = getErrorBook();
  if (book.length === 0) {
    document.getElementById("overallAnalysis").textContent = "错题本为空，请先做一些题目并分析。";
    document.getElementById("overallAnalysis").classList.add("visible");
    return;
  }

  const btn = document.getElementById("summaryBtn");
  const resultDiv = document.getElementById("overallAnalysis");
  btn.disabled = true;
  btn.textContent = "⏳ 正在分析……";
  resultDiv.classList.remove("visible");

  const entriesText = book.map((e, i) =>
    `【记录 ${i+1}】第${e.label}题\n问题：${e.question}\n学生答案：${e.studentAnswer}\n正确答案：${e.correctAnswer}\n分析：\n${e.analysis}`
  ).join("\n\n---\n\n");

  const systemPrompt = `你是一位经验丰富的初中语文教师。我将给你一份学生历次阅读理解练习的错题本记录，包含每次的题目、正确答案、学生答案以及之前对每道题的分析。

请根据所有记录，做一份全面的总结分析，包括以下方面：

1. **总体评价**：学生的语文阅读理解能力整体处于什么水平？
2. **常见薄弱环节**：从这些错题中，可以归纳出学生哪些反复出现的问题？（如：审题不清、答案点遗漏、不理解深层含义、答题格式不规范等）
3. **各能力维度分析**：从"信息提取能力""理解分析能力""鉴赏评价能力""语言表达能力"等维度分析学生的表现。
4. **具体改进建议**：针对发现的薄弱环节，给出可操作的学习建议。
5. **下一步学习重点**：建议重点练习哪些题型或能力。

语气要对事不对人，以鼓励为主，不要打击学生信心。给出可操作的、有针对性的建议。`;

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: MODEL,
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: `以下是我孩子的错题本记录，请根据这些记录做一份全面的总结分析。\n\n${entriesText}` }
      ],
      temperature: 0.3,
      max_tokens: 3000
    })
  })
  .then(r => r.json())
  .then(data => {
    btn.disabled = false;
    btn.textContent = "🧠 根据错题本生成总结";
    if (data.error) {
      resultDiv.textContent = "❌ API 错误：" + (data.error.message || JSON.stringify(data.error));
      resultDiv.classList.add("visible");
      return;
    }
    resultDiv.textContent = data.choices?.[0]?.message?.content || "总结失败";
    resultDiv.classList.add("visible");
  })
  .catch(err => {
    btn.disabled = false;
    btn.textContent = "🧠 根据错题本生成总结";
    resultDiv.textContent = "❌ 请求失败：" + err.message;
    resultDiv.classList.add("visible");
  });
}

// ========== NAVIGATION ==========
function showPage(page) {
  document.querySelectorAll(".page").forEach(el => el.classList.remove("active"));
  document.getElementById("page" + page.charAt(0).toUpperCase() + page.slice(1)).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(el => el.classList.remove("active"));
  document.getElementById("nav" + page.charAt(0).toUpperCase() + page.slice(1) + "Btn").classList.add("active");
  if (page === "errbook") renderErrorBook();
}

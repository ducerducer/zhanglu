<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f0eb; color: #333; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* Nav */
.nav { flex-shrink: 0; z-index: 100; background: #2d5a27; color: #fff; display: flex; align-items: center; padding: 12px 16px; gap: 8px; }
.nav-title { font-size: 18px; font-weight: 700; flex: 1; }
.nav-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 6px 14px; border-radius: 16px; font-size: 14px; cursor: pointer; }
.nav-btn.active { background: rgba(255,255,255,0.3); }
.nav-btn:hover { background: rgba(255,255,255,0.25); }

/* Pages */
.page { display: none; height: 0; flex: 1; overflow: hidden; }
.page.active { display: flex; flex-direction: column; }

/* Article Panel (top half) - resizable */
.article-panel { background: #fff; overflow: hidden; display: flex; flex-direction: column; }
.article-header { padding: 12px 16px 4px; flex-shrink: 0; }
.article-title { font-size: 20px; font-weight: 700; text-align: center; }
.article-author { text-align: center; color: #888; font-size: 13px; }
.article-scroll { flex: 1; overflow-y: auto; padding: 0 16px 12px; }
.article-text { line-height: 1.8; font-size: 15px; padding-bottom: 8px; }

/* Drag handle */
.drag-handle { flex-shrink: 0; height: 16px; min-height: 16px; background: #e8e0d8; cursor: row-resize; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-tap-highlight-color: transparent; }
.drag-handle::after { content: "⠿"; color: #bbb; font-size: 11px; letter-spacing: 4px; }
.drag-handle:active, .drag-handle:hover { background: #d5ccc2; }
/* Bottom safe area for phones */
.questions-panel { padding-bottom: max(24px, env(safe-area-inset-bottom, 16px)); }

/* Questions Panel (bottom half) */
.questions-panel { flex: 1; overflow-y: auto; padding: 12px 16px 24px; }
.question-card { background: #fff; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 12px; border-left: 4px solid #2d5a27; }
.question-label { font-weight: 700; color: #2d5a27; font-size: 14px; margin-bottom: 6px; }
.question-text { font-size: 14px; line-height: 1.7; margin-bottom: 8px; }
.question-subtext { color: #555; font-size: 13px; padding-left: 8px; border-left: 3px solid #ddd; margin-bottom: 8px; line-height: 1.6; }

/* Foldable answer */
.answer-toggle { margin-bottom: 8px; }
.answer-toggle summary { font-size: 13px; color: #2d5a27; cursor: pointer; padding: 4px 0; font-weight: 600; user-select: none; }
.answer-toggle[open] summary { margin-bottom: 6px; }
.answer-content { background: #f0f7ee; border-radius: 8px; padding: 10px 12px; font-size: 14px; line-height: 1.6; color: #333; }
.answer-content table { width: 100%; border-collapse: collapse; margin-top: 4px; font-size: 13px; }
.answer-content th { background: #2d5a27; color: #fff; padding: 5px 6px; text-align: left; }
.answer-content td { padding: 4px 6px; border-bottom: 1px solid #ddd; font-size: 13px; }
.answer-content .text { font-size: 14px; line-height: 1.6; }

/* Input */
.input-area textarea { width: 100%; min-height: 56px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; line-height: 1.6; }
.input-area textarea:focus { outline: none; border-color: #2d5a27; }

/* Actions */
.action-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
.analyze-btn { background: #2d5a27; color: #fff; border: none; padding: 8px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; flex-shrink: 0; }
.analyze-btn:hover { background: #3a7a33; }
.analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.status-text { font-size: 13px; color: #888; }

/* Analysis Result */
.analysis-result { display: none; background: #fffbe6; border-radius: 10px; padding: 12px; margin-top: 10px; border: 1px solid #f0dca0; }
.analysis-result.visible { display: block; }
.analysis-section { margin-bottom: 8px; }
.analysis-section:last-child { margin-bottom: 0; }
.analysis-section .section-label { font-weight: 700; font-size: 14px; display: block; margin-bottom: 3px; }
.analysis-section .section-label.miss { color: #c0392b; }
.analysis-section .section-label.reason { color: #d35400; }
.analysis-section .section-label.suggest { color: #27ae60; }
.analysis-section .section-content { font-size: 14px; line-height: 1.6; padding-left: 2px; }
.analysis-section .section-content p { margin-bottom: 4px; }

/* Error Book */
.err-book { background: #fff; border-radius: 12px; padding: 16px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.err-entry { border: 1px solid #e8e0d8; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
.err-entry:last-child { margin-bottom: 0; }
.err-entry .meta { font-size: 13px; color: #888; margin-bottom: 4px; }
.err-entry .q-text { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.err-entry .analysis-summary { font-size: 13px; line-height: 1.6; color: #555; }
.empty-state { text-align: center; color: #aaa; padding: 40px 0; font-size: 15px; }
.summary-btn { background: #8e44ad; color: #fff; border: none; padding: 10px 24px; border-radius: 20px; font-size: 15px; cursor: pointer; margin: 10px 0; display: block; width: 100%; }
.summary-btn:hover { background: #9b59b6; }
.summary-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.overall-analysis { display: none; background: #f3ecfa; border-radius: 10px; padding: 16px; margin-top: 12px; border: 1px solid #d5c0e8; line-height: 1.8; font-size: 14px; white-space: pre-wrap; }
.overall-analysis.visible { display: block; }
.delete-entry { float: right; color: #e74c3c; font-size: 18px; cursor: pointer; background: none; border: none; padding: 2px 6px; }

/* Loading */
.loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #2d5a27; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 4px; }
@keyframes spin { to { transform: rotate(360deg); } }

.point-badge { display: inline-block; font-size: 12px; color: #888; margin-left: 4px; }

/* Mobile adjust */
@media (max-width: 480px) {
  .questions-panel { padding: 8px 10px 16px; }
  .question-card { padding: 10px 12px; }
  .article-scroll { padding: 0 10px 8px; }
  .article-header { padding: 8px 10px 2px; }
}

@media (max-width: 360px) {
  .article-text { font-size: 14px; line-height: 1.7; }
  .question-text { font-size: 13px; }
}

<script>

  "⑨种子发芽了，先探出两片嫩黄的叶子，像试探风向的小手掌，肥厚而天真。然后，舒展腰肢，把身后的土地生机盎然地长起来。",

  "⑬那一年没有秋天，寒凝一切的风雪，毫无先兆地骤然降临。早晨起来，天地一片苍茫，我们几乎是跌跌撞撞地扑向葵花。石围墙也被吹得四散飘去，向日葵却凝然不动地站立在那里，在冰雕玉琢的莹白之中，保持着凄清的翠绿。叶片傲然舒展，像一面玻璃做的旗，发出环珮般的叮当之声。最不可思议的是，在它生命的最后一刻，居然绽开一朵明艳的花。那花盘只有五分硬币那么大，薄而平整，冰雪凝在其上，像一块光滑的表蒙子；刚分裂出的葵花子还未成熟，像丝丝缕缕的优质蛋白弯曲着，沁出极轻淡的黄色。最令人警醒的是花盘四周伸出的焦黑的黄色花瓣，箭头一般怒放着，像一颗永不泯灭的星。葵花身上的冰花越结越厚，最后，凝固成一个方柱形的冰晶。",

    label: "4",
    point: "6分",
    text: `借助花木来表达情志是中国文学的一个传统，请回忆本册课本中运用了托物言志手法的课文，联系花与人，完成下面的表格。`,
    subtext: `请填写下面表格中的空白处：`,
    answerRows: [
      { work: "《爱莲说》", flower: "莲花", trait: "出淤泥而不染，濯清涟而不妖", zhi: "表达作者不与世俗同流合污、洁身自好的君子之志" },

    answer: `示例："世界上最高的葵花"即使在极其艰苦的环境中依然顽强绽放，这启示我在困难面前要保持积极向上的态度。在学习或生活中遇到困难时，不能抱怨外在环境，而要积极想办法，相信自己总会走出困境。\n座右铭示例：①不管多么险峻的高山，总会为不畏艰难的人留下一条攀登的路。②不是因为看到了希望才坚持，而是因为坚持了才看到希望。`

const MAIN_QUESTION_IDS = ["q1","q2a","q2b","q3","q4","q5"];

// ========== API CONFIG ==========
const API_KEY = "YOUR_API_KEY";
const API_URL = "https://api.deepseek.com/chat/completions";
const MODEL = "deepseek-v4-pro";

// ========== INIT ==========
function init() {
  renderArticle();
  renderQuestions();
  renderErrorBook();
  initDragResize();
  // Set initial article height
  setTimeout(setInitialHeight, 50);
}

function setInitialHeight() {
  const page = document.getElementById("pageArticle");
  const articlePanel = document.getElementById("articlePanel");
  const pageH = page.offsetHeight;
  // Start with ~40% of the page for article, with a sane min/max
  let h = Math.max(120, Math.min(pageH - 160, Math.round(pageH * 0.4)));
  articlePanel.style.height = h + "px";
}

function renderArticle() {
  const el = document.getElementById("articleText");
  el.innerHTML = ARTICLE_PARAGRAPHS.map(p => `<p>${p}</p>`).join("");
}

function renderQuestions() {
  const container = document.getElementById("questionsContainer");
  container.innerHTML = QUESTIONS.map((q, idx) => {
    const tableHTML = q.answerRows
      ? `<table><thead><tr><th>作品</th><th>所托花木</th><th>特征</th><th>所言情志</th></tr></thead><tbody>` +
        q.answerRows.map(r =>
          `<tr><td>${r.work}</td><td>${r.flower}</td><td>${r.trait}</td><td>${r.zhi}</td></tr>`
        ).join("") + `</tbody></table>`
      : `<div class="text">${q.answer}</div>`;

    return `
      <div class="question-card" id="card_${q.id}">
        <div class="question-label">第${q.label}题 <span class="point-badge">${q.point}</span></div>
        <div class="question-text">${q.text}</div>
        ${q.subtext ? `<div class="question-subtext">${q.subtext}</div>` : ""}

        <details class="answer-toggle">
          <summary>✅ 查看正确答案</summary>
          <div class="answer-content">${tableHTML}</div>
        </details>

        <div class="input-area">
          <textarea id="input_${q.id}" placeholder="在此输入孩子的答案……" oninput="onTyping('${q.id}')">${loadDraft(q.id)}</textarea>
        </div>
        <div class="action-row">
          <button class="analyze-btn" id="btn_${q.id}" onclick="analyze('${q.id}', ${idx})">🔍 AI 分析</button>
          <span class="status-text" id="status_${q.id}"></span>
        </div>
        <div class="analysis-result" id="result_${q.id}"></div>
      </div>
    `;
  }).join("");
}

function loadDraft(qId) {
  try { return localStorage.getItem("draft_" + qId) || ""; } catch(e) { return ""; }
}

function onTyping(qId) {
  try { localStorage.setItem("draft_" + qId, document.getElementById("input_" + qId).value); } catch(e) {}
}

// ========== DRAG RESIZE ==========
function initDragResize() {
  const handle = document.getElementById("dragHandle");
  const articlePanel = document.getElementById("articlePanel");
  const page = document.getElementById("pageArticle");
  let startY, startH;

  function onStart(e) {
    e.preventDefault();
    startY = e.type.startsWith("touch") ? e.touches[0].clientY : e.clientY;
    startH = articlePanel.offsetHeight;
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onEnd);
    document.addEventListener("touchmove", onMove, { passive: false });
    document.addEventListener("touchend", onEnd);
  }

  function onMove(e) {
    e.preventDefault();
    const clientY = e.type.startsWith("touch") ? e.touches[0].clientY : e.clientY;
    const delta = clientY - startY;
    const pageH = page.offsetHeight;
    const minH = 80;
    const maxH = pageH - 120;
    let newH = Math.max(minH, Math.min(maxH, startH + delta));
    articlePanel.style.height = newH + "px";
  }

  function onEnd() {
    document.removeEventListener("mousemove", onMove);
    document.removeEventListener("mouseup", onEnd);
    document.removeEventListener("touchmove", onMove);
    document.removeEventListener("touchend", onEnd);
  }

  handle.addEventListener("mousedown", onStart);
  handle.addEventListener("touchstart", onStart, { passive: true });
}

// ========== AI ANALYSIS ==========
function analyze(qId, qIdx) {
  const q = QUESTIONS[qIdx];
  const studentAnswer = document.getElementById("input_" + qId).value.trim();
  if (!studentAnswer) {
    document.getElementById("status_" + qId).textContent = "⚠️ 请先输入答案";
    return;
  }

  const btn = document.getElementById("btn_" + qId);
  const status = document.getElementById("status_" + qId);
  const resultDiv = document.getElementById("result_" + qId);

  btn.disabled = true;
  status.innerHTML = '<span class="loading"></span> AI 分析中……';
  resultDiv.classList.remove("visible");

  const questionFullText = q.text + (q.subtext ? "\n" + q.subtext : "");
  const answerText = q.answerRows
    ? q.answerRows.map(r => `${r.work}: 花木=${r.flower}, 特征=${r.trait}, 情志=${r.zhi}`).join("\n")
    : q.answer;

  const systemPrompt = `你是一位经验丰富的初中语文教师。你要对学生的阅读理解答案进行精准分析。

你将收到：一道语文阅读题 + 正确答案 + 学生的回答。

请按照以下三点进行分析（这个分析将存入错题本，以后会根据所有错题本记录来总结学生的语文能力薄弱环节）：

【缺失点】学生哪些答案要点没有答出来？对比正确答案，逐点指出。

【原因分析】学生没答出来的根本原因是什么？可能是：漏掉了某个答案点、没有理解文章深层含义或作者意图、审题不清、答题技巧不足、表达不完整等。请具体分析。

【改进建议】针对这道题，告诉学生下次遇到同类题目时具体怎么做才能答对。建议要具体、可操作。

注意：语气对事不对人，以鼓励为主。不要在分析中透露这是给家长看的。`;

  const userMessage = `## 文章
《葵花之最》（毕淑敏）

## 题目
${questionFullText}

## 正确答案
${answerText}

## 学生的回答
${studentAnswer}

请按【缺失点】【原因分析】【改进建议】三点给出分析。`;

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: MODEL,
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: userMessage }
      ],
      temperature: 0.3,
      max_tokens: 2000
    })
  })
  .then(r => r.json())
  .then(data => {
    btn.disabled = false;
    if (data.error) {
      status.textContent = "❌ API 错误：" + (data.error.message || JSON.stringify(data.error));
      return;
    }
    const analysisText = data.choices?.[0]?.message?.content || "分析失败，未收到有效回复";
    status.textContent = "✅ 分析完成";
    displayAnalysis(qId, analysisText, q, studentAnswer, answerText);
    saveToErrorBook(qId, q, studentAnswer, answerText, analysisText);
    renderErrorBook();
  })
  .catch(err => {
    btn.disabled = false;
    status.textContent = "❌ 请求失败：" + err.message;
  });
}

function displayAnalysis(qId, text) {
  const div = document.getElementById("result_" + qId);
  div.innerHTML = "";

  let missContent = "", reasonContent = "", suggestContent = "";

  const missMatch = text.match(/【缺失点】([\s\S]*?)(?=【原因分析】|【改进建议】|$)/);
  const reasonMatch = text.match(/【原因分析】([\s\S]*?)(?=【缺失点】|【改进建议】|$)/);
  const suggestMatch = text.match(/【改进建议】([\s\S]*?)(?=【缺失点】|【原因分析】|$)/);

  if (missMatch) missContent = missMatch[1].trim();
  if (reasonMatch) reasonContent = reasonMatch[1].trim();
  if (suggestMatch) suggestContent = suggestMatch[1].trim();

  if (!missContent && !reasonContent && !suggestContent) {
    const lines = text.split("\n");
    let currentSection = "";
    for (const line of lines) {
      const t = line.trim();
      if (/缺失/.test(t)) { currentSection = "miss"; continue; }
      if (/原因|为什么/.test(t)) { currentSection = "reason"; continue; }
      if (/建议|改进|怎么做/.test(t)) { currentSection = "suggest"; continue; }
      if (currentSection === "miss") missContent += t + "\n";
      else if (currentSection === "reason") reasonContent += t + "\n";
      else if (currentSection === "suggest") suggestContent += t + "\n";
    }
  }

  if (!missContent && !reasonContent && !suggestContent) {
    div.innerHTML = `<div style="font-size:14px;line-height:1.8;white-space:pre-wrap;">${escapeHtml(text)}</div>`;
    div.classList.add("visible");
    return;
  }

  if (missContent) {
    div.innerHTML += `<div class="analysis-section"><span class="section-label miss">❌ 缺失点</span><div class="section-content">${formatText(missContent)}</div></div>`;
  }
  if (reasonContent) {
    div.innerHTML += `<div class="analysis-section"><span class="section-label reason">🤔 原因分析</span><div class="section-content">${formatText(reasonContent)}</div></div>`;
  }
  if (suggestContent) {
    div.innerHTML += `<div class="analysis-section"><span class="section-label suggest">💡 改进建议</span><div class="section-content">${formatText(suggestContent)}</div></div>`;
  }

  div.classList.add("visible");
}

function formatText(text) {
  return text.split("\n").filter(l => l.trim()).map(l => `<p>${l.trim()}</p>`).join("");
}

function escapeHtml(text) {
  const d = document.createElement("div");
  d.textContent = text;
  return d.innerHTML;
}

// ========== ERROR BOOK ==========
function getErrorBook() {
  try { return JSON.parse(localStorage.getItem("errorBook") || "[]"); } catch(e) { return []; }
}

function saveToErrorBook(qId, q, studentAnswer, correctAnswer, analysis) {
  const book = getErrorBook();
  const existingIdx = book.findIndex(e => e.qId === qId);
  const entry = {
    qId, label: q.label,
    question: q.text + (q.subtext ? " " + q.subtext : ""),
    correctAnswer, studentAnswer, analysis,
    timestamp: new Date().toLocaleString("zh-CN", { timeZone: "Asia/Shanghai" })
  };
  if (existingIdx >= 0) book[existingIdx] = entry;
  else book.push(entry);
  try { localStorage.setItem("errorBook", JSON.stringify(book)); } catch(e) {}
}

function deleteErrorEntry(qId) {
  let book = getErrorBook();
  book = book.filter(e => e.qId !== qId);
  try { localStorage.setItem("errorBook", JSON.stringify(book)); } catch(e) {}
  renderErrorBook();
}

function renderErrorBook() {
  const book = getErrorBook();
  const container = document.getElementById("errEntries");
  const countText = document.getElementById("errCountText");
  countText.textContent = `共 ${book.length} 条分析记录`;

  if (book.length === 0) {
    container.innerHTML = `<div class="empty-state">📝 暂无分析记录，先做一道题吧</div>`;
    return;
  }

  container.innerHTML = book.map(e => {
    let missPreview = "";
    const m = e.analysis.match(/【缺失点】([\s\S]*?)(?=【原因分析】|【改进建议】|$)/);
    if (m) missPreview = m[1].trim().substring(0, 120) + (m[1].trim().length > 120 ? "…" : "");
    const s = e.analysis.match(/【改进建议】([\s\S]*?)(?=【缺失点】|【原因分析】|$)/);
    const sp = s ? s[1].trim().substring(0, 100) + (s[1].trim().length > 100 ? "…" : "") : "";

    return `
      <div class="err-entry">
        <button class="delete-entry" onclick="deleteErrorEntry('${e.qId}')" title="删除">✕</button>
        <div class="meta">第${e.label}题 · ${e.timestamp}</div>
        <div class="q-text">${e.question}</div>
        <div class="analysis-summary">
          <strong style="color:#c0392b;">缺失点：</strong>${missPreview || "（见详情）"}<br>
          ${sp ? `<strong style="color:#27ae60;">建议：</strong>${sp}` : ""}
        </div>
        <details style="margin-top:6px;font-size:13px;">
          <summary style="color:#2d5a27;cursor:pointer;">查看完整分析</summary>
          <div style="margin-top:6px;padding:8px;background:#f9f9f9;border-radius:6px;line-height:1.7;white-space:pre-wrap;">${escapeHtml(e.analysis)}</div>
        </details>
      </div>
    `;
  }).join("");
}

// ========== OVERALL SUMMARY ==========
function generateOverallSummary() {
  const book = getErrorBook();
  if (book.length === 0) {
    document.getElementById("overallAnalysis").textContent = "错题本为空，请先做一些题目并分析。";
    document.getElementById("overallAnalysis").classList.add("visible");
    return;
  }

  const btn = document.getElementById("summaryBtn");
  const resultDiv = document.getElementById("overallAnalysis");
  btn.disabled = true;
  btn.textContent = "⏳ 正在分析……";
  resultDiv.classList.remove("visible");

  const entriesText = book.map((e, i) =>
    `【记录 ${i+1}】第${e.label}题\n问题：${e.question}\n学生答案：${e.studentAnswer}\n正确答案：${e.correctAnswer}\n分析：\n${e.analysis}`
  ).join("\n\n---\n\n");

  const systemPrompt = `你是一位经验丰富的初中语文教师。我将给你一份学生历次阅读理解练习的错题本记录，包含每次的题目、正确答案、学生答案以及之前对每道题的分析。

请根据所有记录，做一份全面的总结分析，包括以下方面：

1. **总体评价**：学生的语文阅读理解能力整体处于什么水平？
2. **常见薄弱环节**：从这些错题中，可以归纳出学生哪些反复出现的问题？（如：审题不清、答案点遗漏、不理解深层含义、答题格式不规范等）
3. **各能力维度分析**：从"信息提取能力""理解分析能力""鉴赏评价能力""语言表达能力"等维度分析学生的表现。
4. **具体改进建议**：针对发现的薄弱环节，给出可操作的学习建议。
5. **下一步学习重点**：建议重点练习哪些题型或能力。

语气要对事不对人，以鼓励为主，不要打击学生信心。给出可操作的、有针对性的建议。`;

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: MODEL,
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: `以下是我孩子的错题本记录，请根据这些记录做一份全面的总结分析。\n\n${entriesText}` }
      ],
      temperature: 0.3,
      max_tokens: 3000
    })
  })
  .then(r => r.json())
  .then(data => {
    btn.disabled = false;
    btn.textContent = "🧠 根据错题本生成总结";
    if (data.error) {
      resultDiv.textContent = "❌ API 错误：" + (data.error.message || JSON.stringify(data.error));
      resultDiv.classList.add("visible");
      return;
    }
    resultDiv.textContent = data.choices?.[0]?.message?.content || "总结失败";
    resultDiv.classList.add("visible");
  })
  .catch(err => {
    btn.disabled = false;
    btn.textContent = "🧠 根据错题本生成总结";
    resultDiv.textContent = "❌ 请求失败：" + err.message;
    resultDiv.classList.add("visible");
  });
}

// ========== NAVIGATION ==========
function showPage(page) {
  document.querySelectorAll(".page").forEach(el => el.classList.remove("active"));
  document.getElementById("page" + page.charAt(0).toUpperCase() + page.slice(1)).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(el => el.classList.remove("active"));
  document.getElementById("nav" + page.charAt(0).toUpperCase() + page.slice(1) + "Btn").classList.add("active");
  if (page === "errbook") renderErrorBook();
}

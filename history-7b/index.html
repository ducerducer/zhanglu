<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>七年级下册历史知识点</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F8F6F1;color:#2C3E50;font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;line-height:1.8;font-size:15px}
.container{max-width:1000px;margin:0 auto;padding:0 16px}

/* Header */
header{position:sticky;top:0;z-index:50;background:rgba(248,246,241,.97);backdrop-filter:blur(8px);border-bottom:2px solid #C0392B;padding:12px 0}
header .container{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:20px;color:#C0392B;display:flex;align-items:center;gap:8px}
header h1 .icon{width:32px;height:32px;border-radius:8px;background:#FDE8E4;display:flex;align-items:center;justify-content:center;font-size:16px}
.period-nav{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 0}
.period-btn{padding:6px 14px;border-radius:16px;border:1px solid #E0D5C8;font-size:12px;cursor:pointer;white-space:nowrap;background:#fff;color:#666;transition:all .2s}
.period-btn.active{background:#C0392B;color:#fff;border-color:#C0392B}
.period-btn:hover:not(.active){background:#FDE8E4}

/* Chapter Card */
.chapter{margin-bottom:40px;scroll-margin-top:130px}
.chapter-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px 16px;background:#fff;border-radius:12px;border-left:4px solid #C0392B;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.chapter-num{width:36px;height:36px;border-radius:50%;background:#C0392B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.chapter-title{font-size:18px;font-weight:600;color:#2C3E50}
.chapter-subtitle{font-size:12px;color:#999;margin-top:-2px}

/* Knowledge Point Card */
.kp-card{margin-bottom:12px;background:#fff;border-radius:10px;border:1px solid #E8E0D5;overflow:hidden;transition:box-shadow .2s}
.kp-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kp-header{padding:12px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;user-select:none}
.kp-num{min-width:22px;height:22px;border-radius:50%;background:#F0EBE0;color:#888;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:3px}
.kp-text{flex:1;font-size:14px;line-height:1.7;color:#3D3D3D}
.kp-text .kw{color:#C0392B;font-weight:600;border-bottom:2px solid rgba(192,57,43,.3);cursor:pointer;padding:0 2px;transition:all .15s}
.kp-text .kw:hover{background:rgba(192,57,43,.08)}
.kp-text .kw.active{background:rgba(192,57,43,.12)}

/* Expand Section */
.kp-detail{display:none;border-top:1px solid #F0EBE0;background:#FAF8F5}
.kp-detail.show{display:block}
.detail-tabs{display:flex;border-bottom:1px solid #E8E0D5}
.detail-tab{padding:8px 16px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:#888;transition:all .2s}
.detail-tab.active{color:#C0392B;border-bottom-color:#C0392B;font-weight:600}
.detail-body{padding:14px 16px;font-size:13px;line-height:1.8;color:#555}
.detail-body .tb{background:#FFF8F0;border-left:3px solid #C0392B;padding:12px 16px;margin-bottom:12px;border-radius:0 8px 8px 0;font-size:13.5px;line-height:1.9;color:#2C3E50}
.detail-body .tb .hl-dynasty{color:#C0392B;font-weight:600}
.detail-body .tb .hl-year{color:#8E44AD;font-weight:600}
.detail-body .tb .hl-person{color:#2C3E8C;font-weight:600}
.detail-body .tb .hl-term{color:#1A7C3E;font-weight:600}
.detail-body .tb .hl-place{color:#D35400;font-weight:600}
.detail-body .tb .sec-label{display:inline-flex;align-items:center;gap:4px;background:#E8E0D5;padding:1px 10px;border-radius:4px;font-size:11px;color:#666;font-weight:500;margin-right:4px}
.detail-body .tb p{margin-bottom:8px}
.detail-body .tb p:last-child{margin-bottom:0}
.detail-body .tb .sub-section{margin-top:10px;padding-top:8px;border-top:1px dashed #E0D5C8}
.detail-body .exam-card{background:#FFF;border:1px solid #E0E7F0;padding:0;margin-bottom:12px;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(41,128,185,.08)}
.detail-body .exam-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#F7FAFF;border-bottom:1px solid #E0E7F0}
.detail-body .exam-source{font-size:11px;color:#2980B9;font-weight:600}
.detail-body .exam-body{padding:12px 14px}
.detail-body .exam-q{font-weight:600;color:#2C3E50;margin-bottom:6px;font-size:13.5px;line-height:1.7}
.detail-body .exam-a{color:#C0392B;font-weight:600;padding:8px 12px;margin-top:8px;background:#FFF5F5;border-radius:6px;font-size:13.5px;line-height:1.6}
.detail-body .exam-a .label{color:#999;font-weight:400;font-size:12px;margin-right:4px}
.detail-body .exam-e{color:#666;font-size:13px;line-height:1.7;margin-top:8px;padding:8px 12px;background:#FAF9F5;border-radius:6px;border-left:2px solid #E8D5B0}
.detail-body .exam-pager{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 0 10px}
.detail-body .exam-dot{width:8px;height:8px;border-radius:50%;background:#D0D8E0;cursor:pointer;transition:all .2s}
.detail-body .exam-dot.active{background:#2980B9;transform:scale(1.3)}
.detail-body .exam-card{display:none}
.detail-body .exam-card.active{display:block}

/* ====== 隐藏答案模式 ====== */
.hide-toggle{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#888;cursor:pointer;user-select:none;white-space:nowrap;padding:4px 10px 4px 12px;border-radius:14px;border:1px solid #E8E0D5;background:#fdfaf5;transition:all .2s;flex-shrink:0}
.hide-toggle:hover{border-color:#C0392B;color:#C0392B}
.hide-toggle.on{background:#C0392B;color:#fff;border-color:#C0392B}
.hide-toggle .switch{width:28px;height:14px;border-radius:7px;background:#ddd;position:relative;transition:all .3s;flex-shrink:0}
.hide-toggle .switch::after{content:'';position:absolute;top:1px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:all .3s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.hide-toggle.on .switch{background:#EF9A9A}
.hide-toggle.on .switch::after{left:14px}

/* 隐藏模式下红色关键词变空白 */
.kw.hidden{color:#ccc!important;border-bottom:2px dashed #ccc!important;cursor:pointer!important}

/* Modal for keyword detail */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;max-width:700px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-header{position:sticky;top:0;background:#fff;border-bottom:1px solid #E8E0D5;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.modal-header h2{font-size:18px;color:#C0392B}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:#F0EBE0;color:#888;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#E8E0D5}
.modal-body{padding:20px}
.modal-section{margin-bottom:20px}
.modal-section h3{font-size:14px;color:#C0392B;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.modal-section h3 .tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:400;color:#fff}
.modal-section h3 .tag.textbook{background:#C0392B}
.modal-section h3 .tag.exam{background:#2980B9}
.modal-section p{font-size:14px;line-height:1.9;color:#444}
.modal-body .tb{margin:0}
.modal-body p{color:#444;font-size:14px;line-height:1.9}
.modal-body .hl-dynasty{color:#C0392B}
.modal-body .hl-year{color:#8E44AD}
.modal-body .hl-person{color:#2C3E8C}
.modal-body .hl-term{color:#1A7C3E}
.modal-body .hl-place{color:#D35400}

/* Loading/Skeleton */
.loading{text-align:center;padding:40px;color:#999}

/* Responsive */
@media(max-width:600px){
  header h1{font-size:16px}
  .kp-text{font-size:13px}
  .detail-body{font-size:12px}
}

/* Footer */
footer{padding:20px;text-align:center;font-size:12px;color:#aaa}
</style>
</head>
<body>

<header>
<div class="container">
  <h1><span class="icon">📜</span> 七年级下册·历史知识点</h1>

  <div class="hide-toggle" id="hideToggle" onclick="toggleHideMode()"><span class="switch"></span><span>隐藏答案</span></div>
</div>
</header>

<div class="container" id="app"></div>

<!-- Keyword Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
<div class="modal">
  <div class="modal-header">
    <h2 id="modalTitle">关键词</h2>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body" id="modalBody"></div>
</div>
</div>

<footer>
  <p>基于统编版·人民教育出版社七年级下册历史教材</p>
</footer>

            kws: { "隋朝": { tb: "隋朝（581年—618年）是中国历史上承南北朝、下启唐朝的大一统王朝。581年，北周外戚杨坚（即隋文帝）代周称帝，改国号为隋，定都大兴城（今陕西西安）。隋文帝在位期间，在政治、经济、军事等方面进行了一系列改革：政治上确立三省六部制，简化地方行政机构；经济上推行均田制，整顿户籍，减轻赋役；军事上改革府兵制，加强中央对军队的控制。589年，隋军渡江南下，灭陈朝，结束了自西晋末年以来近300年的分裂局面，实现了全国统一。隋朝的统一为唐朝的繁荣奠定了基础，但隋炀帝杨广统治后期滥用民力，修建大运河、三征高句丽，导致民怨沸腾，最终在618年被推翻。",
              exam: "" },
            "隋的统一": { tb: "589年隋灭陈，标志着南北朝分裂局面的终结。自316年西晋灭亡后，中国经历了东晋十六国和南北朝的长时期分裂。隋的统一结束了这种局面，顺应了民族交融的大趋势。统一后，南北方的经济文化交流更加便利，为唐朝的强盛铺平了道路。隋文帝杨坚在统一后采取了一系列巩固统一的措施：废除九品中正制，创立科举制雏形；继续推行均田制，促进农业生产；编纂《开皇律》，减轻刑罚；统一货币（五铢钱）和度量衡。这些措施使隋朝国力迅速增强。" },

            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•单选1</span></div><div class='exam-body'><div class='exam-q'>隋文帝灭陈后\u2018率先俭约\u2019,到开皇十七年\u2018户口滋盛,中外仓库,无不盈积\u2019。这则史料能说明</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.隋朝富庶的表现</span> <span class='exam-parse'>隋文帝节俭治国,仓库充盈,体现隋朝经济富庶。</span></div></div></div>"

            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选1</span></div><div class='exam-body'><div class='exam-q'>自7世纪初开始,中国建立了当时世界上最先进、最公平、最科学的人才选拔和任用制度。该制度创立于</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.隋炀帝时期</span> <span class='exam-parse'>隋炀帝时期设置进士科,标志着科举制的创立。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选15</span></div><div class='exam-body'><div class='exam-q'>下表为唐代前后期贵族出身和平民出身官员所占比例变化,促成这一变化的主要原因是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.推进科举取士</span> <span class='exam-parse'>科举制使平民通过考试入仕,贵族比例下降,平民上升。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•非选26(1)</span></div><div class='exam-body'><div class='exam-q'>材料一、二中选拔官吏的标准分别是什么?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>材料一:门第;材料二:考试成绩</span> <span class='exam-parse'>魏晋重门第;科举以考试成绩为标准。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•非选26(2)</span></div><div class='exam-body'><div class='exam-q'>科举制度诞生于哪个朝代?其诞生的标志是什么?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>隋朝。隋炀帝设置进士科。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•非选26(3)</span></div><div class='exam-body'><div class='exam-q'>根据材料二,指出科举制度的特点。结合所学知识,简要指出科举制度的积极作用。</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>特点:政府主导、自由报考、公开考试、平等竞争。积极作用:加强朝廷选官权力,扩大统治基础,促进社会阶层流动,提高官僚队伍文化素养。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•非选26(4)</span></div><div class='exam-body'><div class='exam-q'>唐太宗和武则天对科举制度的完善分别作出了怎样的贡献?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>唐太宗增加科举考试科目,进士科逐渐成为最重要的科目;武           { num: 6, text: "618年，隋朝灭亡，李渊称帝，建立唐朝，定都长安。" },

            kws: { "殿试": { tb: "殿试是科举制度中最高一级的考试，由皇帝在宫殿内亲自主持。武则天于载初元年（690年）首创殿试，亲自策问贡士，以示重视人才。此后，殿试成为定制，在宋代得到进一步规范。殿试由皇帝亲自出题、亲自阅卷，录取者被称为\"天子门生\"。殿试分三甲：一甲三名，即状元、榜眼、探花，赐进士及第；二甲赐进士出身；三甲赐同进士出身。殿试制度加强了皇帝对科举取士的控制，也使科举的权威性和公正性得到提高。" },
              "进士科": { tb: "进士科是科举考试中最重要的科目，始于隋炀帝，完善于唐代。唐代进士科主要考诗赋、策论和经义，其中诗赋最为关键。贞观年间，进士科逐渐成为科举中最受重视的科目，录取人数虽然不多，但一旦考中，仕途前景光明。唐代有\"三十老明经，五十少进士\"的说法，可见进士科之难。进士科的发展促进了唐诗的繁荣，\"以诗取士\"使诗歌创作成为读书人的基本素养。" },

          { num: 8, text: "唐太宗统治期间，政治比较清明，经济得到恢复和发展，国力增强，文教昌盛，各族友好关系进一步发展，历史上称为\"贞观之治\"。",
            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选10</span></div><div class='exam-body'><div class='exam-q'>唐太宗统治期间,政治比较清明,经济得到恢复和发展,历史上称为</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.\u201c贞观之治\u201d</span> <span class='exam-parse'>唐太宗统治时期的盛世局面。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•非选28(1)</span></div><div class='exam-body'><div class='exam-q'>材料一反映了唐太宗怎样的思想?历史上把唐太宗统治期间的局面称为什么?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>重视人民的力量(水能载舟亦能覆舟)。\u201c贞观之治\u201d。</span></div></div></div>"

          { num: 9, text: "武则天是我国历史上唯一的女皇帝。唐玄宗在位前期，年号为\"开元\"。",
            kws: { "武则天": { tb: "武则天（624年—705年），名曌，唐高宗李治的皇后，中国历史上唯一的女皇帝。高宗晚年多病，武则天参与朝政，与高宗并称\"二圣\"。高宗去世后，她先后废立中宗、睿宗，于690年正式称帝，改国号为周，定都洛阳（称神都）。武则天统治期间，大力发展科举制，开创殿试和武举，打破士族垄断；任用狄仁杰等贤臣，注重选拔人才；继续推行均田制，经济持续发展；加强边防，设置安西都护府和北庭都护府。705年，武则天病重，宰相张柬之等发动\"神龙政变\"，拥立中宗复位，恢复唐朝。武则天统治的近50年（作为皇后、太后和皇帝）上承贞观、下启开元，为唐朝的持续繁荣做出了贡献。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研(一)</span></div><div class='exam-body'><div class='exam-q'>《忆昔》诗中\u2018忆昔开元全盛日\u2019反映了哪一盛世局面?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.开元盛世</span> <span class='exam-parse'>唐玄宗统治前期的盛世局面。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•非选27(3)</span></div><div class='exam-body'><div class='exam-q'>唐玄宗统治前期出现了哪一盛世局面?比较唐玄宗统治前期和后期的不同之处。</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>\u201c开元盛世\u201d。前期励精图治、节俭、重用人才;后期追求享乐、朝政腐败、任用奸臣。</span></div></div></div>"
            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选8</span></div><div class='exam-body'><div class='exam-q'>史学家肯定武则天主要是因为</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.减轻人民负担,推动社会经济发展</span> <span class='exam-parse'>武则天继续推行减轻百姓负担的政策,重视发展生产。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选23</span></div><div class='exam-body'><div class='exam-q'>武则天曾下令:凡州县\u2018田畴垦辟,家有余粮\u2019,则地方官吏可得升奖。这体现了武则天</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.重视农业</span> <span class='exam-parse'>通过奖励垦田、增产鼓励农业生产。</span></div></div></div>"
          },
          { num: 10, text: "唐朝前期，发明并推广曲辕犁、简车等重要的生产工具。手工业达到很高水平，蜀锦冠绝全国。长安既是政治、经济、文化交流中心，也是闻名中外的国际大都市。",
            kws: { "曲辕犁": { tb: "曲辕犁是唐朝发明的先进耕犁，又称\"江东犁\"。相比于直辕犁，曲辕犁将长直辕改为短曲辕，并在犁上增加了犁壁、犁箭等部件，使犁身更轻巧、操作更灵活、耕作深度更易控制。曲辕犁特别适合南方水田耕作，大大提高了农业生产效率。它的出现标志着中国犁耕技术的成熟，是中国古代农具史上的重要里程碑，此后沿用了一千多年。" },
              "简车": { tb: "简车是一种利用水流驱动的灌溉工具，在唐朝前期发明并推广。简车由竹木制成，形状像一个大圆轮，轮周装有若干竹筒，利用水流推动轮子转动，将低处的水带到高处流入田间。简车不需要人力或畜力驱动，效率高且可持续工作，极大地提高了灌溉效率，促进了农业生产的发展。" },
              "长安": { tb: "长安是隋唐两朝的都城，位于今陕西西安。隋朝称大兴城，唐朝改名长安。长安城规模宏大，面积达84平方公里，是当时世界上最大的城市之一。城市规划整齐方正，采用里坊制，由宫城、皇城和外郭城三部分组成。朱雀大街宽达150米，将全城分为东西两部分。东市和西市是两大商业中心，聚集了来自世界各地的商人。长安不仅是唐朝的政治中心，也是经济和文化中心，吸引了日本、新罗、波斯、阿拉伯等国的使节、留学生和商人前来交流学习，是名副其实的国际大都市。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选20</span></div><div class='exam-body'><div class='exam-q'>唐朝长安皇城居中北部,坊市分离,体现了</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.城市布局的特点</span> <span class='exam-parse'>长安城布局规整,坊市分离。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•非选18(1)</span></div><div class='exam-body'><div class='exam-q'>依据材料一,概括唐朝长安城商业的特点。</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>商业繁荣;贸易集中在东西市;店铺数量多;中外贸易繁盛。</span></div></div></div>" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•非选27(2)</span></div><div class='exam-body'><div class='exam-q'>材料二中的两种农具分别是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>图1:曲辕犁;图2:筒车。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•单选4</span></div><div class='exam-body'><div class='exam-q'>图中①处(唐朝)应填写的农业生产工具是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.曲辕犁</span> <span class='exam-parse'>曲辕犁是唐朝发明的耕犁。</span></div></div></div>"

            kws: { "文成公主入藏": { tb: "文成公主入藏发生在唐太宗贞观十五年（641年）。吐蕃赞普松赞干布仰慕唐朝文化，多次派遣使者到长安求婚。唐太宗最终将宗室女文成公主嫁给松赞干布。文成公主入藏时带去了大量物品：包括粮食、蔬菜种子、药材、茶叶、丝绸、书籍以及工匠和技术人员。她带去的先进生产技术（如纺织、建筑、造纸、酿酒等）促进了吐蕃经济文化的发展。文成公主还带去了一批佛经和佛像，推动了佛教在吐蕃的传播。松赞干布为文成公主修建了布达拉宫。文成公主在吐蕃生活了近40年，为汉藏友好关系做出了重大贡献。至今西藏仍流传着关于文成公主的许多传说。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选4</span></div><div class='exam-body'><div class='exam-q'>《步辇图》描绘唐太宗接见吐蕃求婚使者,可研究的史实是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.文成公主入藏</span> <span class='exam-parse'>步辇图反映唐蕃和亲。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•单选3</span></div><div class='exam-body'><div class='exam-q'>松赞干布派遣贵族子弟到长安学习,请求唐朝给予蚕种和工匠,影响是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.促进了吐蕃经济和社会的发展</span></div></div></div>" }
            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选4</span></div><div class='exam-body'><div class='exam-q'>《步辇图》描绘了唐太宗接见松赞干布派来的求婚使者的场景,可用来研究的史实是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.文成公主入藏</span> <span class='exam-parse'>《步辇图》描绘的是文成公主入藏的故事。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•非选26(1)</span></div><div class='exam-body'><div class='exam-q'>根据材料一,指出唐朝民族交往的两个事件。从中体现出唐朝采取了怎样的民族政策。</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>文成公主入藏、长庆会盟。开明的民族政策。</span></div></div></div>"
          },
          { num: 2, text: "630年，唐太宗击败东突厥汗国，各酋长及继位者接受唐廷的册封。唐太宗实行开明的民族政策，得到西北各族的拥戴，被尊奉为\"天可汗\"。",
            kws: { "天可汗": { tb: "\"天可汗\"是西北各族对唐太宗的尊称。630年，唐太宗派李靖率领唐军大败东突厥，俘获东突厥颉利可汗，东突厥汗国灭亡。此后，西北各族的首领和继位者都要接受唐朝的册封。唐太宗实行开明的民族政策，对归附的少数民族给予优待，任用少数民族首领担任唐朝官员，在边疆地区设立羁縻州府进行管理。这种尊重和包容的态度赢得了各族的敬重，他们尊称唐太宗为\"天可汗\"（意为\"天下的共同君主\"）。天可汗制度的建立，体现了唐朝强大的国力和开放的胸怀，也促进了各民族之间的交流与融合。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选16</span></div><div class='exam-body'><div class='exam-q'>唐太宗击败东突厥后妥善安置归附者,这一做法</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.推动了民族交融</span> <span class='exam-parse'>安置归附的突厥人,促进民族交融。</span></div></div></div>" }
          },
          { num: 6, text: "隋唐时期，日本派遣隋使、遣唐使来华，唐朝的天文历法、文字、典籍、书画艺术、建筑技术等传到日本，对日本社会的发展产生深远的影响。遣唐使团中的阿倍仲麻吕是留学生中的杰出人物。",
            kws: { "遣唐使": { tb: "遣唐使是日本向唐朝派遣的使节团。从630年至894年（唐朝灭亡前），日本共派遣了19次遣唐使团。使团成员包括大使、副使、留学生、学问僧等，最多时一次达500余人。他们来华学习唐朝的政治制度、法律、天文历法、文字、儒学、佛教、建筑、医药、艺术等。著名遣唐使成员包括：阿倍仲麻吕（中国名晁衡），他在唐朝考中进士，长期在唐朝做官，与李白、王维等诗人交好；吉备真备，将唐朝的天文历法、兵法等带回日本；空海和最澄，将佛教密宗和天台宗传入日本。遣唐使制度对日本大化改新和奈良、平安时期的制度建设产生了深远影响，日本的文字（假名）也是在汉字基础上创制的。" },
              "阿倍仲麻吕": { tb: "阿倍仲麻吕（698年—770年），日本奈良时代的遣唐留学生，中国名晁衡。他于717年随第八次遣唐使团来到长安，入国子监学习。因学业优秀，考中进士，在唐朝历任校书郎、左补阙、秘书监等官职。他与唐代大诗人李白、王维等交情深厚，互有诗歌赠答。753年，阿倍仲麻吕曾试图回国，但船只在海上遇险，漂流至越南，后辗转返回长安。此后他再未回国，最终在长安去世，终年72岁。唐代宗追封他为潞州大都督。阿倍仲麻吕是中日文化交流史上最重要的代表人物之一。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选21</span></div><div class='exam-body'><div class='exam-q'>唐朝时木制帆船从日本来到中国,再现了</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.日本派遣唐使到唐朝学习</span> <span class='exam-parse'>遣唐使来唐学习先进文化。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选22</span></div><div class='exam-body'><div class='exam-q'>\u2018中国唐朝对外友好往来\u2019板报可选资料</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.①③(玄奘、鉴真)</span></div></div></div>" }
            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选21</span></div><div class='exam-body'><div class='exam-q'>唐朝时,一艘艘木制帆船从日本来到中国,再现了当年的场景。这艘船再现的是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.日本派遣唐使到唐朝学习</span> <span class='exam-parse'>为了学习中国先进文化,日本派遣唐使到唐朝学习。</span></div></div></div>"
          },
          { num: 7, text: "鉴真经过六次东渡，最终抵达日本。他主持修建唐招提寺，对中日文化交流做出了卓越贡献。新罗崔致远通过科举考试成为唐朝的官员。贞观初年，玄奘西行前往天竺取经，根据他的口述，由弟子记录成书的《大唐西域记》是研究中外交流史的珍贵文献。中国的造纸术通过大食传播到西方，促进了世界文化的发展。",
            kws: { "鉴真东渡": { tb: "鉴真（688年—763年）是唐朝著名高僧，扬州大明寺住持。应日本僧人邀请，鉴真决心东渡日本弘扬佛法。从743年第一次东渡开始，到753年第六次成功抵达，历时十年，经历了五次失败：前三次因官府阻拦而未成行，第四次在海上遭遇风暴，第五次漂流到海南岛并导致鉴真双目失明。753年，66岁且失明的鉴真第六次东渡，终于成功抵达日本九州。鉴真在日本传播佛教律宗，主持修建了奈良的唐招提寺，还将唐朝的建筑、雕塑、医药、书法等技艺传授给日本人，被日本称为\"律宗祖师\"和\"日本文化之父\"。763年，鉴真在奈良圆寂。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024北师大附中期中</span></div><div class='exam-body'><div class='exam-q'>“东瀛有多远？芒履难丈量。袈裟作舟帆，合十忘生死，弘愿心中藏，普度众生……”这是中央电视台播放的一部有关唐朝高僧的电视剧片尾曲。这部电视剧的主人公是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A. 鉴真</span></div></div></div>" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选9</span></div><div class='exam-body'><div class='exam-q'>中国对印度的称呼几经改变,自这一史事之后,\u2018印度\u2019这一译法逐渐流行。\u2018这一史事\u2019是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.玄奘西行</span> <span class='exam-parse'>玄奘西行天竺(印度)取经,\u2018印度\u2019译法由此流行。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选19</span></div><div class='exam-body'><div class='exam-q'>以下可以作为研究唐朝对外交往的第一手史料的是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.《大唐西域记》</span> <span class='exam-parse'>玄奘口述、弟子记录成书的《大唐西域记》是研究唐朝对外交往的第一手史料。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•非选28(4)</span></div><div class='exam-body'><div class='exam-q'>根据材料四,西行回国僧人的口述由其弟子记录写成了哪本书?我们从他身上可以学到哪些精神?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>《大唐西域记》。坚持不懈、不畏艰险、勇往直前等精神。</span></div></div></div>"
            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选22</span></div><div class='exam-body'><div class='exam-q'>主题为\u2018中国唐朝对外友好往来\u2019的板报,可以入选的资料包括鉴真和尚东渡日本。</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.①③</span> <span class='exam-parse'>鉴真东渡传播佛法,促进中日文化交流。</span></div></div></div>"
          },
          { num: 8, text: "雕版印刷术至少在唐朝前期已经出现。隋唐时期在天文学和医药学领域最杰出的人物是僧一行和孙思邈。《唐本草》是世界上第一部由国家编定颁布的药典。唐朝书法名家有颜真卿、柳公权等，著名的画家有阎立本、吴道子等。",
            kws: { "雕版印刷术": { tb: "雕版印刷术是中国古代重要的印刷技术，至少在唐朝前期已经发明。其方法是在木板上反刻文字或图像，涂上墨汁，再覆盖纸张进行印刷。现存最早的雕版印刷品是敦煌发现的《金刚经》（868年印），现藏于大英图书馆，做工精良，证明了唐代雕版印刷技术已经相当成熟。雕版印刷术的出现大大推动了文化知识的传播，唐代的佛经、历书、诗文等都通过雕版印刷广泛流传。到了宋代，雕版印刷进入黄金时代，活字印刷术在此基础上被毕昇发明。" },
              "僧一行": { tb: "僧一行（683年—727年），唐代著名天文学家和僧人。他原名张遂，后出家为僧。唐玄宗时期，僧一行主持编制了《大衍历》，这是当时世界上最先进的历法之一。他还组织了大规模的天文测量，在全国设立13个观测点，测量北极高度和日影长度，这项工作在世界上首次实测了子午线（经线）的长度。僧一行的天文学成就标志着中国古代天文学发展的高峰。" },
              "孙思邈": { tb: "孙思邈（约581年—682年），唐代著名医药学家，被后人尊称为\"药王\"。他一生致力于医学研究，深入民间采药治病，积累了丰富的临床经验。他撰写的《千金要方》和《千金翼方》是中国最早的临床医学百科全书，涵盖了内、外、妇、儿、五官、针灸等各科，收录药方数千首。孙思邈强调医德，提出\"大医精诚\"的理念，认为医生应当技术精湛、品德高尚。他的医药学成就对后世中医学发展产生了深远影响。" },
              "颜真卿": { tb: "颜真卿（709年—784年），唐代著名书法家，与柳公权并称\"颜柳\"。他的楷书风格雄强敦厚、气势磅礴，后人称为\"颜体\"。颜真卿的书法代表作品有《多宝塔碑》《颜勤礼碑》《颜氏家庙碑》等。他不仅在书法上成就斐然，还是一位政治家和平叛英雄，在安史之乱中组织抵抗叛军，后因不屈于叛臣李希烈而被害。颜真卿的书法对后世影响极大，历代书家无不认真学习颜体。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024北师大附中期中</span></div><div class='exam-body'><div class='exam-q'>中国的书法艺术是中华文化中的瑰宝。唐朝在书法艺术方面建树颇丰。下列人物都属于唐代著名书法家的一组是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B. 颜真卿、柳公权</span></div></div></div>" },
              "吴道子": { tb: "吴道子（约685年—758年），唐代著名画家，被后世尊为\"画圣\"。他最擅长人物画和宗教画，画风奔放洒脱，线条流畅有力，所画人物衣带飘飘，有\"吴带当风\"之美誉。吴道子在长安、洛阳等地寺庙中创作了大量壁画，其代表作有《送子天王图》等。他的绘画对后世中国人物画的发展产生了深远影响。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选8</span></div><div class='exam-body'><div class='exam-q'>宋朝藏书盛行,普通家庭也能买得起书,主要得益于</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.印刷技术普及</span> <span class='exam-parse'>印刷技术降低了书籍成本。</span></div></div></div>" }
          }
        ]
      }
    ]
  },
  {
    period: "辽宋夏金元时期",

      {
        id: "kaodian-13",

          { num: 1, text: "960年，后周大将赵匡胤发动兵变，夺取后周政权，改国号为宋，以开封为东京，作为都城。",
            kws: { "陈桥兵变": { tb: "陈桥兵变是960年赵匡胤在开封以北陈桥驿发动的军事政变。后周世宗柴荣去世后，幼主柴宗训即位，赵匡胤任殿前都点检（禁军最高统帅）。960年正月，契丹和北汉联兵南侵的消息传到开封，赵匡胤率兵北上御敌。军队到达陈桥驿时，赵匡胤的弟弟赵匡义和谋士赵普等人策划了兵变，将事先准备好的黄袍披在赵匡胤身上，拥立他为皇帝。赵匡胤随即率军返回开封，逼迫后周恭帝柴宗训禅位，改国号为\"宋\"，定都开封（称东京）。陈桥兵变几乎未发生流血冲突，赵匡胤对后周皇室和大臣采取了较为宽容的态度，体现了他的政治智慧。" } }
          },
          { num: 3, text: "宋初统治者针对唐末以来武将专权、政权动荡的历史积弊，实行崇文抑武的方针，采取一系列强化中央集权、维护政权稳定的措施。",
            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选1</span></div><div class='exam-body'><div class='exam-q'>俗语\u2018书中自有黄金屋\u2019\u2018万般皆下品,惟有读书高\u2019反映的北宋社会风气是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.崇文抑武</span> <span class='exam-parse'>北宋吸取唐末武将专权教训,推行崇文抑武政策。</span></div></div></div>"
          },
          { num: 4, text: "宋太祖采取杯酒释兵权的方法，解除禁军高级将领的兵权，任用文臣管理军务。他还经常调换军队将领，定期换防，切断将领与士兵同地方的联系，使兵不识将，将不专兵。",
            kws: { "杯酒释兵权": { tb: "杯酒释兵权是宋太祖赵匡胤为加强中央集权而采取的重要措施。961年，赵匡胤设宴招待禁军高级将领石守信、高怀德等人。酒酣耳热之际，赵匡胤以\"人生苦短，不如及时行乐\"为由，劝说将领们交出兵权，回乡享福。石守信等人心领神会，第二天便称病请求解除军职。赵匡胤对交出兵权的将领给予优厚的赏赐和闲职，使他们安心养老。杯酒释兵权以和平方式解决了开国功臣掌握兵权的问题，避免了历史上常见的\"狡兔死，走狗烹\"的流血事件，体现了赵匡胤的政治智慧。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2025四中期中</span></div><div class='exam-body'><div class='exam-q'>有同学在整理宋元时期的历史人物时，搜集到了“黄袍加身”“杯酒释兵权”等典故，与这些典故有关的人物是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A. 宋太祖（赵匡胤）</span></div></div></div>" } }
          },
          { num: 7, text: "宋朝统治者注重发展文教事业，改革和发展科举制。北宋严格了科举考试程序，殿试成为定制，录取及名次直接由皇帝掌握，进士成为\"天子门生\"。科举制度的发展，为读书人进入仕途开辟了道路，使北宋政权基础进一步扩大，政府在全国范围内营造了浓厚的读书风气，促进了整个社会文化素养的提高，造就了宋朝科技发达、文化昌盛、人才辈出的文治局面。",
            kws: { "宋代科举改革": { tb: "宋朝对科举制度进行了重大改革：第一，废除了唐代科举中的公荐制度，实行糊名（弥封）和誊录制度，即考生试卷密封姓名，由专人重新抄写后再交考官评阅，以防止舞弊；第二，扩大录取名额，唐代每年仅取二三十人，宋代扩大到数百人；第三，殿试成为定制，皇帝亲自担任主考官，进士成为\"天子门生\"；第四，提高进士的地位，中进士者立即授予官职。这些改革使科举制度更加公平公正，极大地促进了社会阶层的流动，\"朝为田舍郎，暮登天子堂\"成为可能。宋代的科举改革被认为是中国科举制度的成熟和完善阶段。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•非选17(2)</span></div><div class='exam-body'><div class='exam-q'>依据材料二,概括南宋临安城出现的社会现象,分析其原因。</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>现象:学校数量多,读书风气盛行。原因:科举制发展;重视教育;活字印刷术使用。</span></div></div></div>" }
          },
          { num: 8, text: "1069年，宋神宗任用王安石主持变法。在经济领域实行青苗法、募役法、方田均税法，在军事领域实行保甲法。宋神宗死后，新法几乎全部被废除。",
            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•非选28(4)</span></div><div class='exam-body'><div class='exam-q'>王安石变法采取了哪些措施?取得哪些成效?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>措施:青苗法、方田均税法、募役法等。成效:水利工程效益良好,政府财政收入有所增加。</span></div></div></div>"

          { num: 10, text: "宋真宗时期，辽宋议和，签订盟约，史称\"澶渊之盟\"。1044年，北宋与西夏进行和谈，订立和约，元昊向宋称臣，宋给西夏钱物，称为\"岁赐\"。议和后，宋夏关系一直较为稳定。",
            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选8</span></div><div class='exam-body'><div class='exam-q'>\u2018澶渊之盟\u2019对双方来说都有收获,辽得到了钱物,宋也收回州城,此后宋辽和平相处。以上所述为其订立的</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.影响</span> <span class='exam-parse'>澶渊之盟的影响是宋辽之间保持长期和平。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选12</span></div><div class='exam-body'><div class='exam-q'>下表中宋真宗、苏轼、范文澜、赵永春对澶渊之盟的评价各不相同,由此可见</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.时代和立场影响历史认识</span> <span class='exam-parse'>不同时代、立场的人对同一历史事件的评价可能不同。</span></div></div></div>"
          }
        ]

      {
        id: "kaodian-14",
        title: "考点14 · 辽宋夏金元时期(二)",
        points: [
          { num: 2, text: "1125年，辽被金灭亡。1127年，金军攻破东京，北宋灭亡，史称\"靖康之变\"。北宋灭亡后，赵构登上皇位，以临安为都城建立政权，史称南宋。",
            kws: { "靖康之变": { tb: "靖康之变（1127年）是北宋灭亡的标志性事件。1125年，金朝灭辽后，转而南下攻宋。1126年金军第一次围攻开封，宋钦宗被迫答应割地赔款。同年冬，金军再次南下，1127年初攻破开封城。金军俘虏了宋徽宗、宋钦宗二帝以及后妃、宗室、大臣等3000余人北去，并掠走了大量金银财宝、文物典籍。北宋至此灭亡。因事件发生在宋钦宗靖康年间，故称\"靖康之变\"或\"靖康之耻\"。北宋灭亡后，宋徽宗第九子康王赵构在南京应天府（今河南商丘）即位，改元建炎，后定都临安（今杭州），史称南宋。" },
              "南宋": { tb: "南宋（1127年—1279年）是宋朝南迁后的政权。靖康之变后，赵构在南方重建宋朝，定都临安（今杭州）。南宋的疆域大致以淮河至大散关一线与金朝为界，统治南方地区。南宋时期，经济重心完全南移完成，南方经济繁荣，特别是江南地区成为全国最富裕的地区。南宋时期农业、手工业、商业和海外贸易都很发达，\"苏湖熟，天下足\"的谚语反映了江南农业的繁荣。南宋科技文化成就突出，活字印刷术的改进、指南针的广泛应用、火药在军事上的使用都在这一时期。但南宋在军事上长期处于弱势，最终被蒙古所灭。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选5</span></div><div class='exam-body'><div class='exam-q'>《史记》记载江南落后,南宋\u2018苏湖熟,天下足\u2019,可得结论</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.南宋经济重心南移完成</span></div></div></div>" }
            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选20</span></div><div class='exam-body'><div class='exam-q'>故事时间:靖康二年(1127年),最合适的背景音乐曲风是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.沉郁悲怆,低沉悲伤</span> <span class='exam-parse'>靖康之变中金灭亡北宋,二帝被掳。</span></div></div></div>"
          },
          { num: 3, text: "岳飞统率的\"岳家军\"在郾城大败金军主力。1141年，宋金达成和议，南宋向金称臣，并送钱物，双方以淮水至大散关一线划定分界线，宋金对峙局面形成。",
            kws: { "岳飞": { tb: "岳飞（1103年—1142年），南宋抗金名将，民族英雄。他率领的\"岳家军\"纪律严明，\"冻死不拆屋，饿死不掳掠\"，深受百姓爱戴。1140年，岳飞率军北伐，在郾城大败金军主力，收复郑州、洛阳等地，前锋直抵开封附近的朱仙镇。然而，宋高宗和秦桧担心岳飞势力过大、威胁皇权，同时害怕抗金胜利后迎回被俘的宋钦宗会影响自己的皇位，连发十二道金牌强令岳飞撤军。岳飞被迫班师后，被剥夺兵权，以\"莫须有\"的罪名被杀害于风波亭，年仅39岁。20年后，宋孝宗为岳飞平反昭雪。岳飞精忠报国的精神成为中华民族爱国主义精神的象征，\"精忠报国\"的故事流传至今。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选2</span></div><div class='exam-body'><div class='exam-q'>岳飞\u2018靖康耻,犹未雪\u2019和陆游\u2018家祭无忘告乃翁\u2019反映的时代最强音是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.收复河山,渴望国家统一</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选13</span></div><div class='exam-body'><div class='exam-q'>剧本情节:急诏促回军、满江红、东窗定毒计,主人公是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.岳飞</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选2</span></div><div class='exam-body'><div class='exam-q'>率军北伐取得郾城大捷,\u2018冻死不拆屋\u2019的人物是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.岳飞抗金</span></div></div></div>" }
            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选2</span></div><div class='exam-body'><div class='exam-q'>岳飞词\u2018靖康耻,犹未雪\u2019和陆游诗\u2018家祭无忘告乃翁\u2019反映出两宋之交的时代最强音是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.收复河山,渴望国家统一</span> <span class='exam-parse'>靖康之变后,收复失地、渴望统一是时代主题。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选13</span></div><div class='exam-body'><div class='exam-q'>剧本情节:大势论当前急诏促回军、满江红、东窗定毒计,主人公是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.岳飞</span> <span class='exam-parse'>岳飞被十二道金牌召回,写《满江红》,被秦桧以莫须有罪名杀害。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选2</span></div><div class='exam-body'><div class='exam-q'>率军北伐收复失地、取得郾城大捷、\u2018冻死不拆屋\u2019的历史人物是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.岳飞抗金</span> <span class='exam-parse'>岳飞率领岳家军抗金,纪律严明。</span></div></div></div>"
          },
          { num: 4, text: "1206年，铁木真完成蒙古草原的统一，建立蒙古政权，他被拥立为大汗，尊称为成吉思汗。1227年，蒙古军队灭西夏。1234年，蒙古灭金。1260年，忽必烈继承汗位；1271年，改国号为大元，1272年定都大都。",
            kws: { "成吉思汗": { tb: "成吉思汗（1162年—1227年），名铁木真，蒙古帝国的建立者。他出身于蒙古乞颜部贵族家庭，少年时父亲被毒死，部落离散。铁木真凭借非凡的军事才能和政治智慧，逐步统一了蒙古草原各部。1206年，在斡难河源召开的大会上，铁木真被推举为\"成吉思汗\"（意为\"拥有四海的大汗\"）。他建立了蒙古帝国，创制了蒙古文字，制定了军事、行政制度（千户制）。成吉思汗率蒙古骑兵向四方扩张，征服了中亚、西亚的广大地区。1227年，成吉思汗在进攻西夏时病逝。他的后代继续扩张，建立了横跨欧亚的庞大帝国。" },
              "元朝建立": { tb: "元朝（1271年—1368年）是由蒙古族建立的统一王朝。成吉思汗之孙忽必烈继承汗位后，于1271年采纳刘秉忠的建议，根据《易经》\"大哉乾元\"改国号为\"大元\"，1272年定都大都（今北京）。元朝1279年灭南宋，完成了全国统一，结束了自唐末以来数百年的分裂割据局面。元朝是中国历史上版图最大的朝代，\"北逾阴山，西极流沙，东尽辽左，南越海表\"。元朝实行行省制度，对后世影响深远；在边疆地区设立宣政院管理西藏、设置澎湖巡检司管辖台湾等，加强了对边疆的统治。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024顺义期末</span></div><div class='exam-body'><div class='exam-q'>以下史事可以出现在忽必烈栏中的有：①统一蒙古草原 ②改国号为大元，定都大都 ③灭南宋完成统一 ④设立厂卫特务机构</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C. ②③</span></div></div></div>" } }
          },
          { num: 5, text: "1279年，元朝完成了全国的统一，结束了我国历史上长时期多个政权并立的局面。元朝疆域\"北逾阴山，西极流沙，东尽辽左，南越海表\"，是我国历史上版图最大的朝代。",
            kws: { "元的统一": { tb: "1279年，元朝灭南宋（崖山海战，陆秀夫背负幼帝赵昺投海殉国），完成了全国统一。元朝的统一结束了自907年唐朝灭亡以来长达370多年的分裂局面（五代十国→辽宋夏金并立），建立了统一的多民族国家。元朝统一的意义重大：促进了各民族之间的交流与融合，特别是蒙古族、色目人与汉族的接触；加强了中外联系，丝绸之路在元朝空前繁荣；行省制度的创立为后世地方行政制度提供了范本。元朝的统一也为明清大一统格局奠定了基础。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选21</span></div><div class='exam-body'><div class='exam-q'>建立蒙古政权和完成元朝大一统的君主分别是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.成吉思汗 忽必烈</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•单选9</span></div><div class='exam-body'><div class='exam-q'>我国历史上版图最大的朝代是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.元朝</span> <span class='exam-parse'>元朝疆域空前辽阔。</span></div></div></div>" }
          },
          { num: 6, text: "元朝在中央设中书省掌管全国的行政事务，下设六部；设枢密院负责全国的军政事务，调度全国的军队；设御史台负责监察事务；设宣政院管理全国宗教和西藏地区军政事务。",
            kws: { "中书省": { tb: "中书省是元朝中央最高行政机构，掌管全国行政事务。元朝中央官制大体继承宋金制度，中书省下设吏、户、礼、兵、刑、工六部。中书省长官为中书令，通常由皇太子担任，实际政务由左右丞相负责。元朝还设枢密院掌军事、御史台掌监察、宣政院掌宗教和西藏事务。元朝中央官制对后世产生了重要影响，明清时期的六部制度即源于此。" },
              "宣政院": { tb: "宣政院是元朝设立的中央机构，负责管理全国佛教事务和西藏地区的军政事务。这是中央政府首次设立专门的机构管理西藏地区。宣政院的设置标志着西藏正式纳入中央政府的直接管辖之下。宣政院下设三道宣慰司，在西藏地区驻军、征收赋税、任命官员、审理案件，对西藏进行有效治理。元朝还在西藏设立驿站，加强与内地的联系。宣政院的设立体现了元朝对西藏行使完全的主权管辖，为后世中央政府治理西藏提供了先例。" } }
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选6</span></div><div class='exam-body'><div class='exam-q'>元朝管辖西藏的机构</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.宣政院</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选22</span></div><div class='exam-body'><div class='exam-q'>元朝加强对西藏地区管辖采取的措施是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.设置宣慰使司都元帅府</span></div></div></div>"

          { num: 5, text: "唐朝时，中国人已经发明了火药。唐朝末年，火药开始运用到军事领域。宋元时期，火药更多地用于战争。火药在13世纪传入阿拉伯地区，14世纪初又经阿拉伯人传到欧洲。",
            kws: { "火药": { tb: "火药是中国古代四大发明之一。唐朝初年，炼丹家在炼丹过程中偶然发现了火药的配方（硫磺、硝石和木炭的混合物）。《真元妙道要略》（唐朝）记载了火药爆炸的现象。唐朝末年，火药开始用于军事（\"发机飞火\"）。北宋时期，设立了专门的火药作坊，制造火箭、火炮等武器。《武经总要》（1044年）中记载了三种火药的配方，是世界上最早的关于火药配方的书面记录。宋元时期，火药武器（火枪、火炮、火箭等）在战争中发挥越来越重要的作用。火药在13世纪通过蒙古西征传入阿拉伯地区，14世纪初又经阿拉伯人传到欧洲，彻底改变了世界战争的面貌。" } }

            kws: { "沈括与《梦溪笔谈》": { tb: "沈括（1031年—1095年），北宋著名科学家、政治家。他博学多才，在天文、数学、物理、地理、地质、生物、医药、工程技术等多个领域都有重要贡献。他晚年所著的《梦溪笔谈》是一部综合性的科学著作，收录了他在各个领域的观察和研究成果。书中记载了毕昇发明活字印刷术、指南针的多种使用方法、石油的开采利用（他命名\"石油\"）、地磁偏角的发现等。书中还包含了他在数学（\"隙积术\"和\"会圆术\"）、天文学（提出\"十二气历\"）等方面的创见。《梦溪笔谈》被誉为\"中国科学史上的坐标\"。" },

          { num: 8, text: "宋代杰出的词人有苏轼、李清照、辛弃疾等。南宋陆游是著名的爱国主义诗人。元朝最优秀的杂剧家是关汉卿，代表作是悲剧《窦娥冤》。",
            kws: { "苏轼": { tb: "苏轼（1037年—1101年），号东坡居士，北宋著名文学家、书画家。他是宋代文学最高成就的代表，在诗、词、文、书、画等方面都有极高造诣。苏轼开创了豪放派词风，代表作有《念奴娇·赤壁怀古》《水调歌头·明月几时有》等，突破了词为\"艳科\"的传统，将词的表现领域扩大到社会生活的各个方面。苏轼的散文与欧阳修并称\"欧苏\"，为\"唐宋八大家\"之一。他不仅在文学上成就卓著，在书法（\"宋四家\"之首）、绘画（擅长墨竹）等方面也是一代大家。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024海淀期末</span></div><div class='exam-body'><div class='exam-q'>《东京梦华录》记载：“大抵诸酒肆瓦市，不以风雨寒暑，白昼通夜，骈阗如此。”以上材料表现了</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B. 宋代丰富的市民生活</span></div></div></div>" },
              "李清照": { tb: "李清照（1084年—约1155年），号易安居士，宋代著名女词人。她是婉约派词人的代表，被誉为\"千古第一才女\"。李清照的词以南渡为界分为前后两期：前期词风清新婉丽，多写闺中生活和自然风光（如《如梦令》），反映了她早年优裕的生活；后期国破家亡、流离失所，词风转为凄苦沉郁（如《声声慢》中的\"寻寻觅觅，冷冷清清\"），表达了对家国沦丧的悲愤。她的词在艺术上达到了极高成就，语言优美，意境深远。" },
              "辛弃疾": { tb: "辛弃疾（1140年—1207年），南宋著名爱国词人，是继苏轼之后豪放派词风的又一代表人物。他出生时北方已经沦陷于金朝，少年时曾参加抗金义军。南渡后屡次上书北伐，但始终未能实现抱负。辛弃疾的词慷慨激昂，充满爱国热情和壮志难酬的悲愤，代表作有《永遇乐·京口北固亭怀古》《破阵子·为陈同甫赋壮词以寄之》《青玉案·元夕》等。他与苏轼并称\"苏辛\"，对后世词坛产生了深远影响。" },
              "关汉卿与《窦娥冤》": { tb: "关汉卿（约1234年—约1300年），元代最著名的杂剧作家，\"元曲四大家\"之首。他一生创作了60多种杂剧，现存18种。其代表作《窦娥冤》是中国古典悲剧的典范作品。该剧讲述了一位叫窦娥的青年女子被冤枉判处死刑的故事：窦娥被无赖张驴儿诬陷毒死其父，在严刑拷打下被迫认罪，临刑前发下三桩誓言（血溅白练、六月飞雪、大旱三年），最后冤情感天动地，一一应验。该剧深刻揭露了元代社会的黑暗和腐败，歌颂了窦娥的反抗精神。《窦娥冤》\"感天动地\"的艺术力量和深刻的现实意义使其成为中国戏剧史上的不朽杰作。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选14</span></div><div class='exam-body'><div class='exam-q'>关汉卿的代表作是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.《窦娥冤》</span> <span class='exam-parse'>关汉卿是元杂剧奠基人。</span></div></div></div>" } }
          },
          { num: 9, text: "北宋史学家、政治家司马光主持编写的《资治通鉴》，是一部编年体的通史巨著，记述了从战国到五代共1300多年的历史。",
            kws: { "《资治通鉴》": { tb: "《资治通鉴》是北宋史学家司马光主持编写的一部编年体通史巨著。全书共294卷，约300万字，记述了从周威烈王二十三年（前403年）到五代后周世宗显德六年（959年）共1362年的历史。书名\"资治通鉴\"意为\"鉴于往事，有资于治道\"，即通过历史经验帮助统治者治理国家。《资治通鉴》在史实考订、叙事手法和历史评论方面都达到了很高水平，与司马迁的《史记》并称为\"史学双璧\"。司马光花费了19年时间才完成这部巨著，其助手刘恕、刘攽、范祖禹等也做出了重要贡献。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选25</span></div><div class='exam-body'><div class='exam-q'>宋神宗认为\u2018鉴于往事,有资于治道\u2019,赐名的史书是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.《资治通鉴》</span> <span class='exam-parse'>司马光主持编写。</span></div></div></div>" }
          }
        ]
      }
    ]

        points: [
          { num: 1, text: "1368年，朱元璋称帝，建立明朝，定都应天府。建文帝继位后采取\"削藩\"政策，明太祖之子燕王朱棣发动\"靖难之役\"，夺取帝位，他就是明成祖。",
            kws: { "明朝建立": { tb: "明朝（1368年—1644年）是由朱元璋建立的统一王朝。朱元璋（1328年—1398年）出身贫寒，17岁入皇觉寺为僧，后参加元末农民起义军，逐步成为红巾军领袖。1368年正月，朱元璋在应天府（今南京）称帝，国号大明，年号洪武。同年，明军攻占大都（今北京），元朝灭亡。朱元璋在位期间，推行休养生息政策，发展生产，轻徭薄赋，社会经济得到恢复和发展。他还严惩贪官污吏，整顿吏治，加强中央集权，奠定了明朝近300年的统治基础。" },
              "靖难之役": { tb: "靖难之役（1399年—1402年）是明朝初期的一场内战。明太祖朱元璋去世后，皇太孙朱允炆即位，是为建文帝。建文帝急于削藩，先后废除了周王、岷王、代王、齐王等藩王。驻守北平（今北京）的燕王朱棣（朱元璋第四子）以\"清君侧\"为名起兵反抗，史称\"靖难之役\"。经过四年战争，朱棣的军队攻入南京，建文帝在宫中自焚（一说逃亡民间）。朱棣夺取帝位，是为明成祖，年号永乐。靖难之役后，明成祖将都城从南京迁至北京，加强了对北方的控制。" } }
          },
          { num: 2, text: "为巩固统治，明太祖在政治上采取一系列措施，从中央到地方全面改革官制，以强化皇权。在中央，明太祖废除丞相，使六部直接向皇帝负责。将军队调动和武官任命的权力统归兵部。明太祖设立了由皇帝直接指挥的锦衣卫。后来，明成祖成立东厂，明宪宗成立西厂，合称\"厂卫\"。",
            kws: { "废除丞相": { tb: "废除丞相是明太祖朱元璋强化皇权的重要措施。1380年，朱元璋以谋反罪处死丞相胡惟庸，并以此为借口，下令永久废除丞相制度，由皇帝直接管理六部（吏、户、礼、兵、刑、工）政务。至此，延续了1500多年的丞相制度被废除，皇帝成为国家元首兼政府首脑，皇权达到空前的高度集中。为了处理庞杂的政务，明朝后来设立了内阁（明成祖时期），但其权力远不及前代的丞相。废除丞相是明清君主专制加强的重要标志。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第三单元学情调研•单选4</span></div><div class='exam-body'><div class='exam-q'>\u2018以后子孙做皇帝时,并不许立丞相\u2019,制定者</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.明太祖</span> <span class='exam-parse'>明太祖朱元璋废除丞相。</span></div></div></div>" },
              "锦衣卫": { tb: "锦衣卫是明朝皇帝直接指挥的特务机构，全称\"锦衣卫亲军指挥使司\"。1382年由明太祖朱元璋设立。锦衣卫原本是皇帝的仪仗和护卫部队，后演变为负责侦查、逮捕、审讯的政治特务机构，可以不经过司法程序直接逮捕和审讯官员。锦衣卫设有专门的监狱和法庭，权力极大。明成祖时又设立了东厂（1420年），宪宗时设立了西厂（1477年），合称\"厂卫\"。厂卫制度的出现反映了明朝君主专制的极端强化，也造成了恐怖的政治气氛，许多官员和学者因言获罪。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选5</span></div><div class='exam-body'><div class='exam-q'>明朝皇帝直接统辖六部和锦衣卫,特点是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.皇权高度集中</span></div></div></div>" }
          },
          { num: 4, text: "明朝科举考试的题目必须出自\"四书\"\"五经\"；考生对题目的解释，必须以朱熹的《四书章句集注》等为标准。考生答卷的形式被称为\"八股文\"。",
            kws: { "八股文": { tb: "八股文是明清时期科举考试规定的文章格式。文章由破题、承题、起讲、入手、起股、中股、后股、束股八部分组成，其中\"股\"的部分要求有两两对应的排比句，共八段，故称\"八股文\"。八股文的题目必须出自\"四书\"\"五经\"（儒家经典），内容阐释必须以朱熹的《四书章句集注》为标准，不能有个人发挥。八股文在早期对于规范考试内容、减少阅卷难度方面有一定积极作用，但后期成为束缚士人思想的桎梏。顾炎武曾批评\"八股之害等于焚书\"，认为八股文比秦始皇焚书坑儒的危害更大，因为它扼杀了读书人的独立思考能力和创造力。" },

            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第三单元学情调研•单选15</span></div><div class='exam-body'><div class='exam-q'>郑和船队从官窑定制的瓷器在非洲东部被发现,可知</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.郑和可能曾经抵达非洲东部</span> <span class='exam-parse'>非洲东部发现的明早期官窑瓷器与郑和航海年代吻合。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选6</span></div><div class='exam-body'><div class='exam-q'>《国史十六讲》第十四讲\u2018面向海洋的时代\u2019可能阅读到的内容是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.郑和下西洋</span> <span class='exam-parse'>第十四讲对应明朝,有面向海洋的时代特征。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选15</span></div><div class='exam-body'><div class='exam-q'>郑和船队访问当地首领,表达通好意愿,和平贸易,许多国家派使者来华。材料表明郑和远航</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.发展了明朝与其他国家和地区之间的友好关系</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•非选28(2)</span></div><div class='exam-body'><div class='exam-q'>如何理解梁启超\u2018郑和之后,再无郑和\u2019?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>郑和下西洋是世界航海史上的壮举,但后来明朝实行闭关锁国政策,不再有类似的远航活动。</span></div></div></div>"

          { num: 7, text: "明朝派戚继光到东南沿海抗倭，他统领的军队被誉为\"戚家军\"。1561年，他率军在台州九战九捷，平定了浙东地区的倭患。他领导的抗倭战争是一场反侵略的战争，他是我国历史上的民族英雄。",

          { num: 9, text: "万历初年，张居正在清丈田亩的基础上，将旧赋及其他杂税合并，计入田亩，用银两收税，称为\"一条鞭法\"。",
            kws: { "一条鞭法": { tb: "一条鞭法是明朝万历年间（1581年）张居正推行的赋税制度改革。其核心内容是：将原来的田赋、徭役、杂税等合并为一，统一按田亩征收银两。这一改革简化了赋税征收程序，减少了中间环节的贪腐，在一定程度上减轻了百姓负担；同时，以银两征税促进了商品经济的发展，白银成为主要流通货币。一条鞭法是唐代两税法之后中国赋税制度的又一次重大改革，为清朝的\"摊丁入亩\"制度奠定了基础。但改革在执行过程中也遇到了地方势力的阻挠，张居正去世后改革效果受到影响。" } }

            kws: { "清军入关": { tb: "清军入关是1644年清朝军队在明朝将领吴三桂的引导下进入山海关、进而占领北京并建立全国统治的历史事件。1644年春，李自成的大顺军攻占北京，明朝灭亡。此时，清朝的摄政王多尔衮率大军正驻守在山海关外。镇守山海关的明朝总兵吴三桂面临两难选择：投降李自成还是对抗大顺。李自成进京后拷掠明朝官员，吴三桂的父亲也遭拷掠，吴三桂一怒之下决定降清。他打开山海关大门，清军与吴三桂的军队联合，在\"一片石\"战役中击败李自成的军队。1644年10月，顺治帝从沈阳迁都北京，清朝正式定鼎中原，逐步建立了对全国的统治。清军入关过程中发生了\"扬州十日\"\"嘉定三屠\"等惨剧，但最终清朝完成了全国统一。" } }

          { num: 5, text: "1662年，民族英雄郑成功从荷兰殖民者手中收复台湾。1684年，清朝设置台湾府，隶属福建省，加强了中央政府对台湾的管辖。",
            kws: { "郑成功收复台湾": { tb: "郑成功（1624年—1662年），明末清初的民族英雄。清军入关后，郑成功以福建厦门为基地，坚持抗清斗争。为了寻找稳固的后方基地，郑成功率军于1661年横渡台湾海峡，进攻被荷兰殖民者占据的台湾。荷兰殖民者自1624年占领台湾南部（筑热兰遮城），统治台湾达38年。郑成功的军队经过9个月的围城战斗，于1662年2月迫使荷兰总督揆一投降，台湾回归祖国怀抱。郑成功在台湾设立行政机构，推行屯田制度，发展农业生产，传播中华文化。可惜他收复台湾仅几个月后即病逝，年仅39岁。郑成功从荷兰殖民者手中收复台湾的斗争是中华民族反抗外来侵略的伟大胜利，他作为民族英雄被后人永远铭记。" },
              "台湾府设置": { tb: "1683年，清朝派施琅率水师攻占台湾，郑成功的孙子郑克塽投降。1684年，清朝康熙皇帝决定在台湾设立台湾府，下辖台湾、凤山、诸罗三县，隶属福建省。这是台湾在明朝末年被荷兰殖民者占领和在郑氏政权统治后，重新纳入中央政府行政管辖体系。台湾府的设置标志着清朝中央政府开始对台湾行使直接管辖权，有力地加强了台湾与祖国大陆的联系，促进了台湾地区的经济开发和文化发展。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•单选14</span></div><div class='exam-body'><div class='exam-q'>三国→隋→元→清朝对台湾管辖,①处(清朝)应是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.设台湾府</span></div></div></div>" }
            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第三单元学情调研•单选5</span></div><div class='exam-body'><div class='exam-q'>郑成功收复台湾是证明台湾自古以来是中国领土的证据之一。</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.①②③④⑤</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选12</span></div><div class='exam-body'><div class='exam-q'>年谱显示了某历史人物1624年出生,1662年击败荷兰殖民者收复台湾,该人物是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.郑成功</span> <span class='exam-parse'>郑成功在1662年从荷兰殖民者手中收复台湾。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•非选26(3)</span></div><div class='exam-body'><div class='exam-q'>根据材料三诗句\u2018开辟荆榛逐荷夷,十年始克复先基\u2019,指出图中人物是谁。其主要功绩是什么?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>郑成功。收复台湾,使台湾重新回到祖国怀抱。</span></div></div></div>"
          },
          { num: 7, text: "康熙皇帝三次率军亲征，打败噶尔丹。乾隆时期，清军最终平定了准噶尔部。乾隆时期平定了大、小和卓分裂祖国的叛乱。1762年，清朝设置伊犁将军，管辖整个新疆地区军政事务。1689年，中俄双方代表在尼布楚签订第一个边界条约《尼布楚条约》。",
            kws: { "康熙三征噶尔丹": { tb: "康熙三征噶尔丹是清朝康熙皇帝为维护国家统一、平定准噶尔部首领噶尔丹叛乱的重要军事行动。噶尔丹是漠西蒙古准噶尔部的首领，他统一了漠西蒙古各部后，势力不断扩张，控制了天山南北和青藏高原部分地区，并在沙俄的支持下向东进攻漠北蒙古（喀尔喀蒙古）。康熙皇帝为保护喀尔喀蒙古和维护北部边疆安全，于1690年、1696年、1697年三次御驾亲征。在1696年的昭莫多之战中，清军大败噶尔丹主力。1697年，噶尔丹在逃亡中病死。康熙三征噶尔丹维护了国家的统一和北部边疆的稳定。" },
              "《尼布楚条约》": { tb: "《尼布楚条约》是1689年中俄两国在尼布楚（今俄罗斯涅尔琴斯克）签订的第一个边界条约。17世纪中叶，沙俄不断向东扩张，侵入黑龙江流域。清朝康熙皇帝在平定三藩之乱后，派军于1685年和1686年两次围攻沙俄占据的雅克萨城，击败俄军。在军事胜利的基础上，中俄两国在尼布楚进行谈判。1689年9月7日，双方签订《尼布楚条约》，规定：中俄以额尔古纳河、格尔必齐河和外兴安岭为界，黑龙江以北、外兴安岭以南的土地属于中国。该条约在法律上明确了中俄东部边界，维护了中国的主权和领土完整。条约还规定了两国贸易往来的事宜。这是中国与西方国家签订的第一个平等条约。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第三单元学情调研•单选11</span></div><div class='exam-body'><div class='exam-q'>乾隆平定大小和卓叛乱后设置了伊犁将军,加强了对西北的管辖。</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.统一多民族国家巩固发展</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•非选26(4)</span></div><div class='exam-body'><div class='exam-q'>清政府设置什么官职加强对新疆地区的管辖?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>伊犁将军</span> <span class='exam-parse'>乾隆帝平定大小和卓叛乱后设置伊犁将军管辖新疆。</span></div></div></div>"
          },
          { num: 8, text: "康熙皇帝设立南书房。雍正年间，设立军机处，军政大事完全由皇帝裁决。康熙时期，部分官员向皇帝秘密呈送报告，经皇帝亲手批阅后返回，形成了奏折制度。康熙、雍正和乾隆三朝，从思想领域严密控制士人，大兴\"文字狱\"。",
            kws: { "军机处": { tb: "军机处是清朝雍正年间（1729年）设立的中央军事和政务机构，初名\"军机房\"，后改称军机处。军机处直接对皇帝负责，处理军政大事，拟写皇帝旨意，参与国家重大决策。军机大臣由皇帝从大学士、尚书、侍郎中选派亲信担任。军机处实际上取代了内阁的大部分职能，成为清朝事实上的最高权力机构。军机处的设置使军政大权完全集中于皇帝一人手中，标志着清朝君主专制达到了顶峰。军机处一直延续到1911年清朝灭亡前夕才被废除。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第三单元学情调研•单选24</span></div><div class='exam-body'><div class='exam-q'>\u2018皇室的权\u2019达到顶峰的标志是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.清朝雍正时设军机处</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选22</span></div><div class='exam-body'><div class='exam-q'>清初官制从议政王大臣会议到军机处的变化反映了</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.君主专制强化</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•单选13</span></div><div class='exam-body'><div class='exam-q'>锦衣卫和军机处共同反映的主题是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.君主专制的强化</span></div></div></div>" },
              "文字狱": { tb: "文字狱是清朝康熙、雍正、乾隆三朝为加强思想控制而制造的一批因文字作品获罪的案件。统治者从文人学者的诗文中摘取片言只语，罗织罪名，进行残酷迫害。著名的文字狱案例包括：康熙朝的\"明史案\"（庄廷鑨刊刻《明史》被指诽谤清朝，株连数百人）、雍正朝的\"吕留良案\"（吕留良著作被认为有反清思想，被开棺戮尸，株连家族）、乾隆朝的\"胡中藻案\"（因诗中\"一把心肠论浊清\"被认为侮辱清朝，被处死）。文字狱的高压政策严重禁锢了知识分子的思想，使文人不敢讨论现实政治，学术研究转向脱离现实的考据学（乾嘉学派）。文字狱是清朝文化专制主义的集中体现，对社会进步和思想解放产生了严重的阻碍作用。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选13</span></div><div class='exam-body'><div class='exam-q'>中俄签订第一个边界条约前的自卫战争是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.雅克萨之战</span></div></div></div>" }
            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第三单元学情调研•单选24</span></div><div class='exam-body'><div class='exam-q'>\u2018皇室的权\u2019达到顶峰的标志是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.清朝雍正时设军机处</span> <span class='exam-parse'>军机处使皇帝具有至高无上的权威。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第三单元学情调研•非选26(3)</span></div><div class='exam-body'><div class='exam-q'>材料三中导游所说的\u2018偏房\u2019指的是哪一机构?这一机构有什么作用?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>军机处。强化了君主专制。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•单选13</span></div><div class='exam-body'><div class='exam-q'>明朝锦衣卫木印和清朝军机处的史料反映的主题是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.君主专制的强化</span> <span class='exam-parse'>锦衣卫和军机处都体现了君主权力的加强。</span></div></div></div>"
          },
          { num: 9, text: "顺治时期，颁布\"禁海令\"，严厉限制海上贸易。1757年，只开放广州一处对外通商。这种闭关自守的政策，无法适应新的外部环境，导致当时的中国逐渐落后于世界潮流。",
            exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第三单元学情调研•单选18</span></div><div class='exam-body'><div class='exam-q'>材料中\u2018这种政策\u2019既有对沿海人民的防范,也有天朝上国观念的影响,该政策</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.使中国逐渐落后于世界的潮流</span> <span class='exam-parse'>闭关锁国政策使中国无法及时学习国外先进科技。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•非选28(3)</span></div><div class='exam-body'><div class='exam-q'>从A(隋唐对外开放)到B(明初禁海)再到C(清初迁海),对外政策发生了什么变化?产生了什么影响?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>从积极开放到逐渐封闭保守。使中国逐渐落后于世界潮流。</span></div></div></div>"

              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选11</span></div><div class='exam-body'><div class='exam-q'>大兴文字狱、提倡尊孔读经、大力推行禁书毁书反映的主题是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.思想领域的严密控制</span> <span class='exam-parse'>清初通过文字狱等加强对思想领域的严密控制。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选18</span></div><div class='exam-body'><div class='exam-q'>\u2018清风不识字,何故乱翻书\u2019被处死,与此相关的政策是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.大兴文字狱</span> <span class='exam-parse'>清朝大兴文字狱,知识分子因文字获罪。</span></div></div></div>"

      {
        id: "kaodian-19",
        title: "考点19 · 明清时期(三)",
        points: [
          { num: 4, text: "明朝引进了原产于美洲的玉米、甘薯、花生等作物。清朝继续改进种植技术，改良新品种，使粮食产量大幅度提高。经济作物的种植面积不断扩大，农产品商品化程度进一步加深。明朝时，松江是棉纺织业中心，苏州是丝织业中心，景德镇是制瓷中心。清朝已出现了比较成熟的手工工场。",
            kws: { "美洲作物的传入": { tb: "美洲作物的传入是明清时期农业发展的重要事件。1492年哥伦布发现美洲后，原产于美洲的玉米、甘薯、马铃薯、花生、烟草、番茄、辣椒等作物通过海上贸易传入中国。明朝中后期，这些作物开始在东南沿海种植，清朝时推广到全国各地。玉米和甘薯具有耐旱、耐贫瘠、产量高的特点，在山地、旱地也能种植，极大地拓展了耕地范围，提高了粮食产量，对养活快速增长的人口起到了关键作用。美洲作物的传入被视为中国农业史上的第二次革命（第一次是唐宋时期占城稻的传入）。" },
              "手工工场": { tb: "手工工场是资本主义萌芽的产物。清朝时期，在纺织、陶瓷、冶铁等行业中出现了比较成熟的手工工场。手工工场的特点：规模较大（几十人甚至上百人）；分工明确（如纺织业中纺纱、织布、染整等工序分别由不同工人完成）；雇佣关系（工人出卖劳动力领取工资，不再是家庭作坊的帮工）。江南地区的丝织业和棉纺织业中手工工场最为发达。手工工场的出现标志着资本主义萌芽的产生，但由于封建制度的压制和闭关政策的限制，这种萌芽发展缓慢，始终未能突破封建生产关系的束缚。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2025房山期末</span></div><div class='exam-body'><div class='exam-q'>以下史料可用于研究明清时期经济发展状况的有：①洪武丈量鱼鳞图 ②清朝《黄河筑堤图》③张择端《清明上河图》④清朝《耕织图·耕》</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B. ①②④</span></div></div></div>" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选11</span></div><div class='exam-body'><div class='exam-q'>大兴文字狱、禁书毁书反映的主题是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.思想领域的严密控制</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选18</span></div><div class='exam-body'><div class='exam-q'>\u2018清风不识字,何故乱翻书\u2019被处死,与什么政策相关</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.大兴文字狱</span></div></div></div>" }

const app = document.getElementById('app');
const nav = document.getElementById('periodNav');

// Navigation
KNOWLEDGE.forEach((period, i) => {
  const btn = document.createElement('button');
  btn.className = 'period-btn' + (i === 0 ? ' active' : '');
  btn.textContent = period.period;
  btn.onclick = () => {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(period.id).scrollIntoView({ behavior: 'smooth' });
  };
  nav.appendChild(btn);
});

// Build page
function buildPage() {
  let html = '';
  
  KNOWLEDGE.forEach(period => {
    html += `<div class="chapter" id="${period.id}">`;
    period.chapters.forEach(ch => {
      html += `<div class="chapter-header"><div class="chapter-num">${ch.id.split('-')[1]}</div><div><div class="chapter-title">${ch.title}</div></div></div>`;
      ch.points.forEach(pt => {
        // Process text to mark keywords
        let text = pt.text;
        if (pt.kws) {
          Object.keys(pt.kws).forEach(kw => {
            const idx = text.indexOf(kw);
            if (idx >= 0) {
              const before = text.substring(0, idx);
              const after = text.substring(idx + kw.length);
              text = before + `<span class="kw" data-keyword="${kw}" data-chapter="${ch.id}" data-point="${pt.num}">${kw}</span>` + after;
            }
          });
        }
        
        html += `<div class="kp-card"><div class="kp-header" onclick="toggleDetail(this, event)">`;
        html += `<div class="kp-num">${pt.num}</div>`;
        html += `<div class="kp-text">${text}</div>`;
        html += `</div></div>`;
      });
    });
    html += `</div>`;
  });
  
  app.innerHTML = html;
}

buildPage();

// Format textbook content for better readability
function formatTbContent(text) {
  // Split into paragraphs by period/new sections
  let paras = text.split(/(?<=[。！？])/);
  
  // Rejoin and format each paragraph
  return paras.map(p => {
    if (!p.trim()) return '';
    
    // Must-have keywords to bold
    let formatted = p;
    // Highlight year-like patterns: 581年, 589年, 627年—649年
    formatted = formatted.replace(/(\d{3,4})年/g, '<span class="hl-year">$1</span>年');
    // Bold dynasty names
    const dynasties = ['隋朝','唐朝','宋朝','元朝','明朝','清朝','西周','东周','秦朝','汉朝','三国','魏晋','南北朝','隋唐','辽朝','西夏','金朝','南宋','北宋','五代十国'];
    dynasties.forEach(d => {
      const re = new RegExp(d.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      formatted = formatted.replace(re, `<span class="hl-dynasty">${d}</span>`);
    });
    // Bold key historical person names (frequently occurring)
    const persons = ['杨坚','李世民','武则天','赵匡胤','朱元璋','朱棣','忽必烈','成吉思汗','铁木真','岳飞','文成公主','松赞干布','玄奘','鉴真','郑和','戚继光','李自成','郑成功','康熙','乾隆','雍正','秦始皇','汉武帝','唐太宗','宋太祖','明太祖','明成祖','王安石','司马光','李时珍','宋应星','徐光启','黄宗羲','顾炎武','王夫之','曹雪芹','关汉卿','苏轼','辛弃疾','李清照','陆游','张居正','吴三桂','噶尔丹','林则徐'];
    persons.forEach(pr => {
      const re = new RegExp(pr.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      formatted = formatted.replace(re, `<span class="hl-person">${pr}</span>`);
    });
    // Bold key terms
    const terms = ['三省六部制','科举制','八股文','行省制度','军机处','一条鞭法','闭关锁国','崇文抑武','杯酒释兵权','澶渊之盟','靖康之变','安史之乱','贞观之治','开元盛世','文景之治','康乾盛世','推恩令','焚书坑儒','商鞅变法','戊戌变法','辛亥革命','鸦片战争','五四运动','均田制','租庸调制','两税法','摊丁入亩'];
    terms.forEach(t => {
      const re = new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      formatted = formatted.replace(re, `<span class="hl-term">${t}</span>`);
    });
    // Bold place names
    const places = ['长安','洛阳','开封','临安','大都','北京','南京','大兴','涿郡','余杭','西域','天竺','吐蕃'];
    places.forEach(pl => {
      const re = new RegExp(pl.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      formatted = formatted.replace(re, `<span class="hl-place">${pl}</span>`);
    });
    
    return `<p>${formatted}</p>`;
  }).filter(p => p.trim()).join('');
}

function toggleDetail(header, evt) {
  // If clicking on a red keyword, don't expand card (modal handles it)
  if (evt && evt.target && evt.target.closest && evt.target.closest('.kw')) return;
  
  const card = header.closest('.kp-card');
  let detail = card.querySelector('.kp-detail');
  
  if (!detail) {
    detail = document.createElement('div');
    detail.className = 'kp-detail show';
    detail.innerHTML = '<div class="detail-tabs"><div class="detail-tab active">📖 课本详解</div><div class="detail-tab">📝 相关真题</div></div><div class="detail-body" style="padding:10px 16px;color:#999;font-size:12px">点击红色关键词查看课本详解内容</div>';
    card.appendChild(detail);
  } else {
    detail.classList.toggle('show');
    detail.style.display = detail.classList.contains('show') ? 'block' : 'none';
  }
}

function switchTab(tab, index) {
  const tabs = tab.parentElement.querySelectorAll('.detail-tab');
  tabs.forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  
  const body = tab.parentElement.nextElementSibling;
  body.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  body.querySelectorAll('.tab-content')[index].style.display = 'block';
}

// Click on keyword to open modal
document.addEventListener('click', function(e) {
  const kw = e.target.closest('.kw');
  if (kw) {
    e.stopPropagation();
    const keyword = kw.dataset.keyword;
    const chapterId = kw.dataset.chapter;
    const pointNum = kw.dataset.point;
    
    // Find the keyword data
    let foundData = null;
    KNOWLEDGE.forEach(p => {
      p.chapters.forEach(ch => {
        if (ch.id === chapterId) {
          ch.points.forEach(pt => {
            if (pt.num == pointNum && pt.kws && pt.kws[keyword]) {
              foundData = { keyword, ...pt.kws[keyword], chapter: ch.title };
            }
          });
        }
      });
    });
    
    if (foundData) {
      document.getElementById('modalTitle').textContent = foundData.keyword;
      
      let tbContent = foundData.tb ? formatTbContent(foundData.tb) : '<p style="color:#999">暂无内容</p>';
      let examHtml = foundData.exam ? foundData.exam : '';
      let examContent = '';
      if (examHtml) {
        examContent = '<div class="exam-container">' + examHtml + '</div>';
      } else {
        examContent = '<p style="color:#999;text-align:center;padding:20px 0">📌 暂无真题，等你发过来我会补上～</p>';
      }
      
      document.getElementById('modalBody').innerHTML = `
        <div class="detail-tabs" style="margin-bottom:14px">
          <div class="detail-tab active" onclick="switchModalTab(this,0)">📖 课本详解</div>
          <div class="detail-tab" onclick="switchModalTab(this,1)">📝 相关真题</div>
        </div>
        <div class="tab-content" data-tab="0">${tbContent}</div>
        <div class="tab-content" data-tab="1" style="display:none">${examContent}</div>
      `;
      document.getElementById('modalOverlay').classList.add('show');
      applyHideMode();
    }
  }
});

  body.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  body.querySelectorAll('.tab-content')[index].style.display = 'block';
  if (index === 1) setTimeout(initExamPager, 50);
  applyHideMode();
}

function initExamPager() {
  const container = document.querySelector('.tab-content[data-tab="1"] .exam-container');
  if (!container) return;
  const cards = container.querySelectorAll('.exam-card');
  if (cards.length <= 1) { cards.forEach(c => c.classList.add('active')); return; }
  const oldPager = container.querySelector('.exam-pager');
  if (oldPager) oldPager.remove();
  cards.forEach((c,i) => c.classList.toggle('active', i===0));
  const pager = document.createElement('div');
  pager.className = 'exam-pager';
  for (let i = 0; i < cards.length; i++) {
    const dot = document.createElement('span');
    dot.className = 'exam-dot' + (i===0?' active':'');
    dot.dataset.index = i;
    dot.onclick = function() {
      cards.forEach(c => c.classList.remove('active'));
      cards[i].classList.add('active');
      pager.querySelectorAll('.exam-dot').forEach(d => d.classList.remove('active'));
      this.classList.add('active');
      applyHideMode();
    };
    pager.appendChild(dot);
  }
  container.appendChild(pager);
}

// ====== 隐藏答案模式 ======
let hideMode = false;

function toggleHideMode(){
  hideMode = !hideMode;
  document.getElementById('hideToggle').classList.toggle('on', hideMode);
  if(hideMode) applyHideMode();
  else resetHideMode();
}

function applyHideMode(){
  if(!hideMode) return;
  document.querySelectorAll('.kw').forEach(el => {
    if(!el.dataset.originalText){
      el.dataset.originalText = el.textContent;
    }
    el.textContent = el.textContent.replace(/./g, '_');
    el.classList.add('hidden');
  });
}

function resetHideMode(){
  document.querySelectorAll('.kw').forEach(el => {
    if(el.dataset.originalText){
      el.textContent = el.dataset.originalText;
    }
    el.classList.remove('hidden');
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// Close modal on overlay click
document.getElementById('modalOverlay').onclick = function(e) {
  if (e.target === this) closeModal();
};

// Escape key closes modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

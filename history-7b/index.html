// ==================== RENDER ====================
const app = document.getElementById('app');
const nav = document.getElementById('periodNav');

// Navigation
KNOWLEDGE.forEach((period, i) => {
  const btn = document.createElement('button');
  btn.className = 'period-btn' + (i === 0 ? ' active' : '');
  btn.textContent = period.period;
  btn.onclick = () => {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(period.id).scrollIntoView({ behavior: 'smooth' });
  };
  nav.appendChild(btn);
});

// Build page
function buildPage() {
  let html = '';
  
  KNOWLEDGE.forEach(period => {
    html += `<div class="chapter" id="${period.id}">`;
    period.chapters.forEach(ch => {
      html += `<div class="chapter-header"><div class="chapter-num">${ch.id.split('-')[1]}</div><div><div class="chapter-title">${ch.title}</div></div></div>`;
      ch.points.forEach(pt => {
        // Process text to mark keywords
        let text = pt.text;
        let foundKws = {};
        if (pt.kws) {
          Object.keys(pt.kws).forEach(kw => {
            if (kw === 'exam' || kw === 'tb') return;
            const idx = text.indexOf(kw);
            if (idx >= 0) {
              const before = text.substring(0, idx);
              const after = text.substring(idx + kw.length);
              text = before + `<span class="kw" data-keyword="${kw}" data-chapter="${ch.id}" data-point="${pt.num}">${kw}</span>` + after;
              foundKws[kw] = true;
            }
          });
        }
        
        html += `<div class="kp-card"><div class="kp-header" onclick="toggleDetail(this, event)">`;
        html += `<div class="kp-num">${pt.num}</div>`;
        // Add unfound keywords inline after text
        if (pt.kws) {
          let extra_kws = '';
          Object.keys(pt.kws).forEach(kw => {
            if (kw === 'exam' || kw === 'tb') return;
            if (!foundKws[kw]) {
              extra_kws += `<span class="kw kw-inline" data-keyword="${kw}" data-chapter="${ch.id}" data-point="${pt.num}">${kw}</span> `;
            }
          });
          if (extra_kws) {
            text += extra_kws;
          }
        }
        html += `<div class="kp-text">${text}</div>`;
        
        html += `</div></div>`;
      });
    });
    html += `</div>`;
  });
  
    // Short Answer sections
  html += '<div class="sa-section" id="sa-main">';
  KNOWLEDGE.forEach(period => {
    if (period.shortAnswer && period.shortAnswer.length > 0) {
      html += '<div class="sa-section-title"> 简答题 <span class="sa-badge">' + period.shortAnswer.length + '题组</span></div>';
      period.shortAnswer.forEach(sa => {
        if (sa.materials) {
          var mId = 'mat-' + period.id + '-' + sa.num;
          html += '<div class="sa-mat-btn" onclick="openSAMat(&#39;' + mId + '&#39;)"> 查看材料</div>';
        }
        html += '<div class="sa-group">';
        html += '<div class="sa-group-title"><span class="sa-num">' + sa.num + '</span>' + sa.title + '</div>';
        sa.questions.forEach(function(qa, qi) {
          var qId = 'sA-' + period.id + '-' + sa.num + '-' + qi;
          html += '<div class="sa-q-item" onclick="toggleSAAnswer(&#39;' + qId + '&#39;)">';
          html += '<div class="sa-q"><span class="sa-q-icon"></span>' + qa.q + '<span class="sa-expand-icon">▾</span></div>';
          html += '<div class="sa-a-wrap" id="' + qId + '"><span class="sa-a-label">答：</span>' + qa.a + '</div>';
          html += '</div>';
        });
        html += '</div>';
      });
    }
  });
  html += '</div>';
  
  // ====== 选择题 (extracted from exam data) ======
  html = renderChoiceQuestions(html);
  app.innerHTML = html;
}

buildPage();

// ====== Scroll to Section ======

function scrollToSection(secId) {
  var el = document.getElementById(secId);
  if (el) { el.scrollIntoView({ behavior: 'smooth' }); }
}

// ====== 选择题 Section ======

function renderChoiceQuestions(html) {
  var cqHtml = '';
  var total = 0;
  
  KNOWLEDGE.forEach(function(period) {
    var periodQuestions = [];
    period.chapters.forEach(function(ch) {
      ch.points.forEach(function(pt) {
        for (var kwName in pt.kws) {
          var examHtml = pt.kws[kwName].exam;
          if (!examHtml) continue;
          if (examHtml.indexOf('exam-options') === -1) continue;
          // Found exam data with options. Split into cards and extract
          var parts = examHtml.split('<div class=\'exam-card\'>');
          for (var pi = 1; pi < parts.length; pi++) {
            var card = parts[pi];
            if (card.indexOf('exam-options') === -1) continue;
            // Extract source
            var srcMatch = card.match(/exam-source[^>]*>([^<]*)<\/span>/);
            var source = srcMatch ? srcMatch[1].trim() : '';
            // Extract question
            var qMatch = card.match(/exam-q[^>]*>([^<]*)<\/div>/);
            var question = qMatch ? qMatch[1].trim() : '';
            // Extract options
            var opts = [];
            var optRegex = /<span class='opt'>([^<]*)<\/span>/g;
            var om;
            while ((om = optRegex.exec(card)) !== null) {
              opts.push(om[1].trim());
            }
            // Extract answer
            var aMatch = card.match(/a-text[^>]*>([^<]*)<\/span>/);
            var answer = aMatch ? aMatch[1].trim() : '';
            // Extract analysis (解析)
            var parseMatch = card.match(/exam-parse[^>]*>([^<]*)<\/span>/);
            var analysis = parseMatch ? parseMatch[1].trim() : '';
            if (question && opts.length > 0) {
              periodQuestions.push({
                source: source,
                question: question,
                options: opts,
                answer: answer,
                analysis: analysis
              });
            }
          }
        }
      });
    });
    
    if (periodQuestions.length > 0) {
      total += periodQuestions.length;
      cqHtml += '<div class="cq-group">';
      cqHtml += '<div class="cq-group-title">📋 ' + period.period + ' <span style="font-size:12px;color:#888;font-weight:400">' + periodQuestions.length + '题</span></div>';
      periodQuestions.forEach(function(q, qi) {
        var cqId = 'cq-' + period.id + '-' + qi;
        cqHtml += '<div class="cq-card">';
        if (q.source) cqHtml += '<div class="cq-source">' + q.source + '</div>';
        cqHtml += '<div class="cq-q" onclick="toggleCQAnswer(\'' + cqId + '\')">';
        cqHtml += '<span class="q-text">' + q.question + '</span>';
        cqHtml += '<span class="cq-expand">▾</span></div>';
        cqHtml += '<div class="cq-options">';
        q.options.forEach(function(o) {
          cqHtml += '<span class="opt">' + o + '</span>';
        });
        cqHtml += '</div>';
        cqHtml += '<div class="cq-answer" id="' + cqId + '"><span style="color:#999;font-weight:400">答案：</span>' + q.answer + (q.analysis ? '<br><span style="color:#666;font-weight:400;font-size:12px">解析：' + q.analysis + '</span>' : '') + '</div>';
        cqHtml += '</div>';
      });
      cqHtml += '</div>';
    }
  });
  
  if (total > 0) {
    html += '<div class="cq-section" id="cq-main">';
    html += '<div class="cq-section-title"> 选择题 <span class="cq-badge">' + total + '题</span></div>';
    html += '<div class="cq-filters" id="cqFilters">';
    html += '<span class="cq-filter active" onclick="filterChoiceQuestions(this,\'all\')">全部</span>';
    html += '<span class="cq-filter" onclick="filterChoiceQuestions(this,\'隋唐\')">隋唐</span>';
    html += '<span class="cq-filter" onclick="filterChoiceQuestions(this,\'辽宋\')">辽宋金元</span>';
    html += '<span class="cq-filter" onclick="filterChoiceQuestions(this,\'明清\')">明清</span>';
    html += '</div>';
    html += cqHtml;
    html += '</div>';
  }
  return html;
}

function toggleCQAnswer(id) {
  var el = document.getElementById(id);
  if (!el) return;
  var icon = el.parentElement.querySelector('.cq-expand');
  if (icon) icon.classList.toggle('open');
  el.classList.toggle('show');
}

function filterChoiceQuestions(btn, period) {
  // Update active button
  document.querySelectorAll('.cq-filter').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  // Show/hide groups
  document.querySelectorAll('.cq-group').forEach(function(g) {
    var title = g.querySelector('.cq-group-title');
    if (!title) return;
    if (period === 'all' || title.textContent.indexOf(period) >= 0) {
      g.style.display = 'block';
    } else {
      g.style.display = 'none';
    }
  });
}

// Format textbook content for better readability
function formatTbContent(text) {
  // Split into paragraphs by period/new sections
  let paras = text.split(/(?<=[。！？])/);
  
  // Rejoin and format each paragraph
  return paras.map(p => {
    if (!p.trim()) return '';
    
    // Must-have keywords to bold
    let formatted = p;
    // Highlight year-like patterns: 581年, 589年, 627年—649年
    formatted = formatted.replace(/(\d{3,4})年/g, '<span class="hl-year">$1</span>年');
    // Bold dynasty names
    const dynasties = ['隋朝','唐朝','宋朝','元朝','明朝','清朝','西周','东周','秦朝','汉朝','三国','魏晋','南北朝','隋唐','辽朝','西夏','金朝','南宋','北宋','五代十国'];
    dynasties.forEach(d => {
      const re = new RegExp(d.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      formatted = formatted.replace(re, `<span class="hl-dynasty">${d}</span>`);
    });
    // Bold key historical person names (frequently occurring)
    const persons = ['杨坚','李世民','武则天','赵匡胤','朱元璋','朱棣','忽必烈','成吉思汗','铁木真','岳飞','文成公主','松赞干布','玄奘','鉴真','郑和','戚继光','李自成','郑成功','康熙','乾隆','雍正','秦始皇','汉武帝','唐太宗','宋太祖','明太祖','明成祖','王安石','司马光','李时珍','宋应星','徐光启','黄宗羲','顾炎武','王夫之','曹雪芹','关汉卿','苏轼','辛弃疾','李清照','陆游','张居正','吴三桂','噶尔丹','林则徐'];
    persons.forEach(pr => {
      const re = new RegExp(pr.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      formatted = formatted.replace(re, `<span class="hl-person">${pr}</span>`);
    });
    // Bold key terms
    const terms = ['三省六部制','科举制','八股文','行省制度','军机处','一条鞭法','闭关锁国','崇文抑武','杯酒释兵权','澶渊之盟','靖康之变','安史之乱','贞观之治','开元盛世','文景之治','康乾盛世','推恩令','焚书坑儒','商鞅变法','戊戌变法','辛亥革命','鸦片战争','五四运动','均田制','租庸调制','两税法','摊丁入亩'];
    terms.forEach(t => {
      const re = new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      formatted = formatted.replace(re, `<span class="hl-term">${t}</span>`);
    });
    // Bold place names
    const places = ['长安','洛阳','开封','临安','大都','北京','南京','大兴','涿郡','余杭','西域','天竺','吐蕃'];
    places.forEach(pl => {
      const re = new RegExp(pl.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      formatted = formatted.replace(re, `<span class="hl-place">${pl}</span>`);
    });
    
    return `<p>${formatted}</p>`;
  }).filter(p => p.trim()).join('');
}

function toggleDetail(header, evt) {
  // If clicking on a red keyword, don't expand card (modal handles it)
  if (evt && evt.target && evt.target.closest && evt.target.closest('.kw')) return;
  
  const card = header.closest('.kp-card');
  let detail = card.querySelector('.kp-detail');
  
  if (!detail) {
    detail = document.createElement('div');
    detail.className = 'kp-detail show';
    detail.innerHTML = '<div class="detail-tabs"><div class="detail-tab active">📖 课本详解</div><div class="detail-tab">📝 相关真题</div></div><div class="detail-body" style="padding:10px 16px;color:#999;font-size:12px">点击红色关键词查看课本详解内容</div>';
    card.appendChild(detail);
  } else {
    detail.classList.toggle('show');
    detail.style.display = detail.classList.contains('show') ? 'block' : 'none';
  }
}

function switchTab(tab, index) {
  const tabs = tab.parentElement.querySelectorAll('.detail-tab');
  tabs.forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  
  const body = tab.parentElement.nextElementSibling;
  body.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  body.querySelectorAll('.tab-content')[index].style.display = 'block';
}

// Click on keyword to open modal
document.addEventListener('click', function(e) {
  const kw = e.target.closest('.kw');
  if (kw) {
    e.stopPropagation();
    const keyword = kw.dataset.keyword;
    const chapterId = kw.dataset.chapter;
    const pointNum = kw.dataset.point;
    
    // Find the keyword data
    let foundData = null;
    KNOWLEDGE.forEach(p => {
      p.chapters.forEach(ch => {
        if (ch.id === chapterId) {
          ch.points.forEach(pt => {
            if (pt.num == pointNum && pt.kws && pt.kws[keyword]) {
              foundData = { keyword, ...pt.kws[keyword], chapter: ch.title };
            }
          });
        }
      });
    });
    
    if (foundData) {
      document.getElementById('modalTitle').textContent = foundData.keyword;
      
      let tbContent = foundData.tb ? formatTbContent(foundData.tb) : '<p style="color:#999">暂无内容</p>';
      let examHtml = foundData.exam ? foundData.exam : '';
      let examContent = '';
      if (examHtml) {
        examContent = '<div class="exam-container">' + examHtml + '</div>';
      } else {
        examContent = '<p style="color:#999;text-align:center;padding:20px 0">📌 暂无真题，等你发过来我会补上～</p>';
      }
      
      document.getElementById('modalBody').innerHTML = `<div style="padding:6px 0">${tbContent}</div>`;
      document.getElementById('modalOverlay').classList.add('show');
      applyHideMode();
    }
  }
});

function toggleSAAnswer(id) {
  var el = document.getElementById(id);
  if (!el) return;
  var icon = el.parentElement.querySelector('.sa-expand-icon');
  if (icon) icon.classList.toggle('open');

function openSAMat(mId) {
  var found = null;
  KNOWLEDGE.forEach(function(period) {
    if (period.shortAnswer) period.shortAnswer.forEach(function(sa) {
      var id = 'mat-' + period.id + '-' + sa.num;
      if (id === mId && sa.materials) found = {title: sa.title, text: sa.materials, period: period.period};
    });
  });
  if (!found) return;
  document.getElementById('saMatTitle').textContent = found.period + ' · ' + found.title;
  var body = document.getElementById('saMatBody');
  var blocks = found.text.split('材料');
  var h = '';
  for (var i = 1; i < blocks.length; i++) {
    h += '<div class="mat-block"><div class="mat-label">材料' + toC(i) + '</div><div>' + blocks[i].trim() + '</div></div>';
  }
  body.innerHTML = h;
  document.getElementById('saMatOverlay').classList.add('show');
}
function toC(n) { var d = ['','一','二','三','四','五','六']; return d[n]||n; }
function closeSAMat() { document.getElementById('saMatOverlay').classList.remove('show'); }


// ====== 隐藏答案模式 ======
let hideMode = false;

function toggleHideMode(){
  hideMode = !hideMode;
  document.getElementById('hideToggle').classList.toggle('on', hideMode);
  if(hideMode) applyHideMode();
  else resetHideMode();
}

function applyHideMode(){
  if(!hideMode) return;
  document.querySelectorAll('.kw').forEach(el => {
    if(!el.dataset.originalText){
      el.dataset.originalText = el.textContent;
    }
    el.textContent = el.textContent.replace(/./g, '_');
    el.classList.add('hidden');
  });
}

function resetHideMode(){
  document.querySelectorAll('.kw').forEach(el => {
    if(el.dataset.originalText){
      el.textContent = el.dataset.originalText;
    }
    el.classList.remove('hidden');
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// Close modal on overlay click
document.getElementById('modalOverlay').onclick = function(e) {
  if (e.target === this) closeModal();
};

// Escape key closes modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

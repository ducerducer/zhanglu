<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F8F6F1;color:#2C3E50;font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;line-height:1.8;font-size:15px}
.container{max-width:1000px;margin:0 auto;padding:0 16px}

/* Header */
header{position:sticky;top:0;z-index:50;background:rgba(248,246,241,.97);backdrop-filter:blur(8px);border-bottom:2px solid #C0392B;padding:12px 0}
header .container{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:20px;color:#C0392B;display:flex;align-items:center;gap:8px}
header h1 .icon{width:32px;height:32px;border-radius:8px;background:#FDE8E4;display:flex;align-items:center;justify-content:center;font-size:16px}
.period-nav{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 0}
.period-btn{padding:6px 14px;border-radius:16px;border:1px solid #E0D5C8;font-size:12px;cursor:pointer;white-space:nowrap;background:#fff;color:#666;transition:all .2s}
.period-btn.active{background:#C0392B;color:#fff;border-color:#C0392B}
.period-btn:hover:not(.active){background:#FDE8E4}

/* Chapter Card */
.chapter{margin-bottom:40px;scroll-margin-top:130px}
.chapter-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px 16px;background:#fff;border-radius:12px;border-left:4px solid #C0392B;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.chapter-num{width:36px;height:36px;border-radius:50%;background:#C0392B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.chapter-title{font-size:18px;font-weight:600;color:#2C3E50}
.chapter-subtitle{font-size:12px;color:#999;margin-top:-2px}

/* Knowledge Point Card */
.kp-card{margin-bottom:12px;background:#fff;border-radius:10px;border:1px solid #E8E0D5;overflow:hidden;transition:box-shadow .2s}
.kp-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kp-header{padding:12px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;user-select:none}
.kp-num{min-width:22px;height:22px;border-radius:50%;background:#F0EBE0;color:#888;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:3px}
.kp-text{flex:1;font-size:14px;line-height:1.7;color:#3D3D3D}
.kp-text .kw{color:#C0392B;font-weight:600;border-bottom:2px solid rgba(192,57,43,.3);cursor:pointer;padding:0 2px;transition:all .15s}
.kp-text .kw:hover{background:rgba(192,57,43,.08)}
.kp-text .kw-inline{font-size:11px;color:#C0392B;background:#FFF5F3;border:1px solid #F0C8C0;border-radius:10px;padding:2px 8px;cursor:pointer;transition:all .2s;white-space:nowrap;margin-left:4px}
.kp-text .kw.active{background:rgba(192,57,43,.12)}

.detail-tabs{display:flex;border-bottom:1px solid #E8E0D5}
.detail-tab{padding:8px 16px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:#888;transition:all .2s}
.detail-tab.active{color:#C0392B;border-bottom-color:#C0392B;font-weight:600}
.detail-body{padding:14px 16px;font-size:13px;line-height:1.8;color:#555}
.detail-body .tb{background:#FFF8F0;border-left:3px solid #C0392B;padding:12px 16px;margin-bottom:12px;border-radius:0 8px 8px 0;font-size:13.5px;line-height:1.9;color:#2C3E50}
.detail-body .tb .hl-dynasty{color:#C0392B;font-weight:600}
.detail-body .tb .hl-year{color:#8E44AD;font-weight:600}
.detail-body .tb .hl-person{color:#2C3E8C;font-weight:600}
.detail-body .tb .hl-term{color:#1A7C3E;font-weight:600}
.detail-body .tb .hl-place{color:#D35400;font-weight:600}
.detail-body .tb .sec-label{display:inline-flex;align-items:center;gap:4px;background:#E8E0D5;padding:1px 10px;border-radius:4px;font-size:11px;color:#666;font-weight:500;margin-right:4px}
.detail-body .tb p{margin-bottom:8px}
.detail-body .tb p:last-child{margin-bottom:0}
.detail-body .tb .sub-section{margin-top:10px;padding-top:8px;border-top:1px dashed #E0D5C8}
.detail-body .exam-card{background:#FFF;border:1px solid #E0E7F0;padding:0;margin-bottom:12px;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(41,128,185,.08)}
.detail-body .exam-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#F7FAFF;border-bottom:1px solid #E0E7F0}
.detail-body .exam-source{font-size:11px;color:#2980B9;font-weight:600}
.detail-body .exam-body{padding:12px 14px}
.detail-body .exam-q{font-weight:600;color:#2C3E50;margin-bottom:6px;font-size:13.5px;line-height:1.7}
.detail-body .exam-a{color:#C0392B;font-weight:600;padding:8px 12px;margin-top:8px;background:#FFF5F5;border-radius:6px;font-size:13.5px;line-height:1.6}
.detail-body .exam-a .label{color:#999;font-weight:400;font-size:12px;margin-right:4px}
/* Exam answer collapse */
/* Exam options */
.exam-card .exam-options{padding:8px 12px;font-size:13px;line-height:1.8;color:#444}
.exam-card .exam-options .opt{display:block;padding:1px 0}
.exam-card .exam-options .opt-correct{color:#C0392B;font-weight:500}
/* Exam options */
.exam-card .exam-options{padding:8px 12px;font-size:13px;line-height:1.8;color:#444}
.exam-card .exam-options .opt{display:block;padding:1px 0}
/* Exam options */
.exam-card .exam-options{padding:8px 12px;font-size:13px;line-height:1.8;color:#444}
.exam-card .exam-options .opt{display:block;padding:1px 0}
.exam-card .exam-a{display:none}
.exam-card .exam-a.show{display:block}
.exam-card .exam-q{cursor:pointer}
.exam-card .exam-q:hover{background:rgba(192,57,43,.04);border-radius:4px}
.exam-card .exam-q .expand-hint{font-size:11px;color:#bbb;margin-left:6px;user-select:none}
.detail-body .exam-e{color:#666;font-size:13px;line-height:1.7;margin-top:8px;padding:8px 12px;background:#FAF9F5;border-radius:6px;border-left:2px solid #E8D5B0}
.detail-body .exam-pager{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 0 10px}
.detail-body .exam-dot{width:8px;height:8px;border-radius:50%;background:#D0D8E0;cursor:pointer;transition:all .2s}
.detail-body .exam-dot.active{background:#2980B9;transform:scale(1.3)}
.detail-body .exam-card{display:none}
.detail-body .exam-card.active{display:block}

/* ====== 隐藏答案模式 ====== */
.hide-toggle{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#888;cursor:pointer;user-select:none;white-space:nowrap;padding:4px 10px 4px 12px;border-radius:14px;border:1px solid #E8E0D5;background:#fdfaf5;transition:all .2s;flex-shrink:0}
.hide-toggle:hover{border-color:#C0392B;color:#C0392B}
.hide-toggle.on{background:#C0392B;color:#fff;border-color:#C0392B}
.hide-toggle .switch{width:28px;height:14px;border-radius:7px;background:#ddd;position:relative;transition:all .3s;flex-shrink:0}
.hide-toggle .switch::after{content:'';position:absolute;top:1px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:all .3s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.hide-toggle.on .switch{background:#EF9A9A}
.hide-toggle.on .switch::after{left:14px}

/* 隐藏模式下红色关键词变空白 */
.kw.hidden{color:#ccc!important;border-bottom:2px dashed #ccc!important;cursor:pointer!important}

/* Modal for keyword detail */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:flex-start;padding:20px 20px 10px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;max-width:700px;width:100%;max-height:65vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-header{position:sticky;top:0;background:#fff;border-bottom:1px solid #E8E0D5;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.modal-header h2{font-size:16px;color:#C0392B}
.modal-close{width:24px;height:24px;border-radius:50%;border:none;background:#F0EBE0;color:#888;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#E8E0D5}
.modal-body{padding:12px 16px 20px}
.modal-section{margin-bottom:14px}
.modal-section h3{font-size:14px;color:#C0392B;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.modal-section p{font-size:13px;line-height:1.65;color:#444}
.modal-body .tb{margin:0}
.modal-body p{color:#444;font-size:13px;line-height:1.65}
.modal-body .hl-dynasty{color:#C0392B}
.modal-body .hl-year{color:#8E44AD}
.modal-body .hl-person{color:#2C3E8C}
.modal-body .hl-term{color:#1A7C3E}
.modal-body .hl-place{color:#D35400}

/* Loading/Skeleton */
.loading{text-align:center;padding:40px;color:#999}

/* Responsive */
@media(max-width:600px){
  header h1{font-size:16px}
  .kp-text{font-size:13px}
  .detail-body{font-size:12px}
}

/* Footer */
footer{padding:20px;text-align:center;font-size:12px;color:#aaa}
/* ====== Short Answer ====== */
.sa-section,.cq-section{margin-top:40px;margin-bottom:40px;scroll-margin-top:130px;padding-top:10px;border-top:3px dashed #E0D5C8}
.sa-section-title,.cq-section-title{font-size:18px;font-weight:700;color:#C0392B;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.cq-section-title{color:#2980B9}
.sa-section-title .sa-badge,.cq-section-title .cq-badge{font-size:11px;background:#FDE8E4;color:#C0392B;padding:2px 10px;border-radius:12px;font-weight:400}

.cq-group{margin-bottom:16px}

.cq-card{background:#fff;border:1px solid #E0E7F0;border-radius:10px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(41,128,185,.06)}
.cq-card .cq-q{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.cq-card .cq-q .q-text{font-size:13.5px;line-height:1.6;color:#2C3E50;font-weight:600;flex:1;padding-right:8px}

.cq-card .cq-options .opt{display:block;padding:2px 0}
.cq-card .cq-answer{display:none;padding:8px 14px 10px;background:#FFF5F5;border-top:1px solid #F0E0E0;font-size:13px;line-height:1.6;color:#C0392B;font-weight:500}
.cq-card .cq-answer.show{display:block}
.cq-card .cq-source{font-size:11px;color:#2980B9;font-weight:600;padding:6px 14px 2px}
.cq-card .cq-options .opt-correct{color:#C0392B;font-weight:500}
.cq-filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.cq-filter{padding:4px 12px;border-radius:14px;font-size:12px;cursor:pointer;border:1px solid #B8D4F0;background:#F4F9FF;color:#2980B9;user-select:none;transition:all .2s}
.cq-filter.active{background:#2980B9;color:#fff;border-color:#2980B9}

.cq-card .cq-expand{font-size:10px;color:#bbb;flex-shrink:0;transition:transform .2s}
.cq-card .cq-expand.open{transform:rotate(180deg)}
.sa-mat-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#8B4513;cursor:pointer;user-select:none;padding:5px 12px;border-radius:8px;border:1px solid #D4B896;background:#FBF5EE;margin-bottom:16px;transition:all .2s}
.sa-mat-btn:hover{background:#F5E6D0;border-color:#8B4513}
.sa-group{border:1px solid #E8E0D5;border-radius:10px;margin-bottom:10px;overflow:hidden;background:#fff}
.sa-group-title{font-size:14px;font-weight:600;color:#2C3E50;padding:10px 14px;background:#FFF8F5;border-bottom:1px solid #F0EBE0;display:flex;align-items:center;gap:8px}
.sa-group-title .sa-num{min-width:24px;height:24px;border-radius:50%;background:#C0392B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.sa-q-item{padding:10px 14px;border-bottom:1px solid #F5F0EA;cursor:pointer;transition:background .15s}
.sa-q-item:last-child{border-bottom:none}

.sa-q-item .sa-q{font-size:13px;line-height:1.6;color:#3D3D3D}
.sa-q-item .sa-q-icon{color:#C0392B;margin-right:4px;font-size:11px}
.sa-expand-icon{color:#aaa;margin-left:6px;font-size:10px;transition:transform .2s;display:inline-block}

.sa-a-wrap{display:none;margin-top:8px;padding:8px 10px;background:#FFF5F5;border-radius:6px;font-size:13px;line-height:1.6;color:#C0392B;font-weight:500}
.sa-a-wrap.show{display:block}
.sa-a-label{color:#999;font-weight:400;font-size:11px;margin-right:4px}
.sa-mat-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:200;justify-content:flex-start;align-items:stretch;padding:0}
.sa-mat-overlay.show{display:flex}
.sa-mat-modal{background:#fff;width:100%;max-width:100%;height:100%;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.15);border-radius:0}

.sa-mat-close{background:none;border:none;font-size:16px;color:#999;cursor:pointer;padding:4px}
.sa-mat-body{padding:12px 14px 40px;font-size:14px;line-height:1.8;color:#3D3D3D}
.sa-mat-body .mat-block{margin-bottom:12px;padding:10px 12px;background:#FAFAF7;border-left:3px solid #C0392B;border-radius:4px}
.sa-mat-body .mat-label{font-weight:600;color:#C0392B;margin-bottom:4px;font-size:13px}

</style>
</head>

const KNOWLEDGE = [
  {
    period: "隋唐时期",
    id: "sui-tang",
    chapters: [
      {
        id: "kaodian-11",

        points: [
          { num: 1, text: "581年，杨坚夺取北周政权，建立隋朝，定都大兴。589年，隋军灭掉陈朝，实现了隋的统一。",
            kws: { "隋朝": { tb: "隋朝（581年—618年）是中国历史上承南北朝、下启唐朝的大一统王朝。581年，北周外戚杨坚（即隋文帝）代周称帝，改国号为隋，定都大兴城（今陕西西安）。隋文帝在位期间，在政治、经济、军事等方面进行了一系列改革：政治上确立三省六部制，简化地方行政机构；经济上推行均田制，整顿户籍，减轻赋役；军事上改革府兵制，加强中央对军队的控制。589年，隋军渡江南下，灭陈朝，结束了自西晋末年以来近300年的分裂局面，实现了全国统一。隋朝的统一为唐朝的繁荣奠定了基础，但隋炀帝杨广统治后期滥用民力，修建大运河、三征高句丽，导致民怨沸腾，最终在618年被推翻。",

            "陈朝": { tb: "陈朝（557年—589年）是南北朝时期南朝的最后一个朝代，由陈霸先建立。陈朝疆域狭小，仅控制江陵以东、长江以南的地区，是南朝中最弱小的一个。陈后主陈叔宝生活奢侈，不理朝政，隋朝大军南下时，陈朝军队毫无抵抗力。589年正月，隋军攻入建康（今南京），陈后主被俘，陈朝灭亡。" }
          }, exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第一单元学情调研</span></div><div class='exam-body'><div class='exam-q'>自7世纪初开始，中国建立了当时世界上最先进、最公平、最科学的人才选拔和任用制度，由此影响着教育和整个社会。该制度创立于</div><div class='exam-options'><span class='opt'>A.唐太宗时期</span><span class='opt'>B.武则天时期</span><span class='opt'>C.隋文帝时期</span><span class='opt'>D.隋炀帝时期</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>D.隋炀帝时期</span></div></div></div>"},
          { num: 2, text: "隋的统一，结束了长期分裂局面，顺应了民族交融的大趋势，进一步促进了南北方经济、文化的交流和发展。",
            kws: { "民族交融": { tb: "民族交融是魏晋南北朝时期的重要历史特征。自西晋末年起，北方少数民族大量内迁，匈奴、鲜卑、羯、氐、羌等民族与汉族在长期的共同生活中相互影响。北魏孝文帝改革（494年）推行汉化政策：改汉姓、说汉语、穿汉服、与汉族通婚，加速了北方民族融合。隋朝统一后，南北方的联系更加密切，南方的经济文化成果（如先进的农业生产技术）传入北方，北方的政治制度和文化传统也影响了南方。这种交融为隋唐时期文化的大繁荣奠定了基础，也促进了\"中华\"认同的形成。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024北师大附中期中</span></div><div class='exam-options'><span class='opt'>A.繁荣与开放</span><span class='opt'>B.多民族交融加强</span><span class='opt'>C.南北经济均衡发展</span><span class='opt'>D.君主专制高度强化</span></div><div class='exam-body'><div class='exam-q'>辽宋夏金元是继三国两晋南北朝之后又一个北方少数民族活跃的时期。下列符合辽宋夏金元这一时期的历史特征的是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B. 多民族交融加强</span></div></div></div>" } }
          },
          { num: 3, text: "隋朝建立后，发展经济，编订户籍，核实户口，减轻百姓赋役负担，统一币制和度量衡；加强中央集权，修订和减省刑律，简化机构，提高行政效率。隋朝经济迅速恢复和发展，人口数量和垦田面积大幅度增长，成为国力强盛的王朝。",
            kws: { "三省六部制": { tb: "三省六部制是隋朝创立的中央官制。三省指中书省（隋称内史省，负责草拟政令）、门下省（负责审核政令）、尚书省（负责执行政令），三省长官均为宰相，互相牵制。六部指尚书省下属的吏、户、礼、兵、刑、工六部，分别管理官员任免、财政税收、礼仪祭祀、军事、司法刑罚和工程建设。三省六部制将相权一分为三，加强了皇权，同时提高了行政效率。这一制度被唐朝继承并完善，成为此后历代王朝中央官制的基本框架，延续了1300多年。" },
              exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第一单元学情调研</span></div><div class='exam-body'><div class='exam-q'>隋唐时期位于洛阳的含嘉仓被誉为\u201c天下第一粮仓\u201d。其粮食来源地有江南的镇江、苏州等，也有来自华北一带的邢州、德州等地。含嘉仓粮食来源的广泛得益于当时</div><div <div class='exam-options'><span class='opt'>A.手工业的发展</span><span class='opt'>B.筒车的发明</span><span class='opt'>C.大运河的开通</span><span class='opt'>D.经济重心南移</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C.大运河的开通</span></div></div></div>" }
          },
          { num: 4, text: "为了加强南北交通，巩固隋朝对全国的统治，隋炀帝征发几百万人，从605年起，陆续开凿了一条贯通南北的大运河。大运河以洛阳为中心，北抵涿郡，南至余杭郡，连接了海河、黄河、淮河、长江、钱塘江五大水系，加强了南北地区政治、经济和文化上的交流，有利于国家统一和民族交融。",
            kws: { "大运河": { tb: "隋朝大运河是隋炀帝杨广下令开凿的宏伟水利工程，从605年至610年分多期完成。运河全长约2000多公里，以洛阳为中心，分为永济渠、通济渠、邗沟和江南河四段，北达涿郡（今北京），南至余杭（今杭州），连接了海河、黄河、淮河、长江和钱塘江五大水系。大运河的开凿动用了数百万民夫，给当时人民造成了沉重负担，但客观上加强了南北联系：南方的粮食和物资可以便捷地运往北方，北方的政治军事中心可以更有效地控制南方。大运河成为此后多个朝代的重要运输通道，唐代以后历代均进行了维护和扩建，直至今天仍在发挥作用。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024海淀期末</span></div><div <div class='exam-options'><span class='opt'>A.都江堰</span><span class='opt'>B.灵渠</span><span class='opt'>C.长城</span><span class='opt'>D.大运河</span></div><div class='exam-body'><div class='exam-q'>这项工程贯通南北，沟通了海河、黄河、淮河、长江、钱塘江五大水系，促进了南北政治、经济和文化交流，对后世影响深远。这项工程是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>D. 大运河</span></div></div></div>" } }
          },
          { num: 5, text: "隋文帝即位后，废除了前朝的选官制度，依才能取士。隋炀帝时，设置进士科，标志着通过考试选拔人才的科举制创立。",
            kws: { "科举制": { tb: "科举制是中国古代通过考试选拔官员的制度。隋文帝废除九品中正制，开始采用分科考试的方式选拔人才。隋炀帝大业年间（605年—618年）正式设置进士科，标志着科举制的创立。科举制打破了门阀世族对官场的垄断，使出身寒门的读书人也能通过考试进入仕途，体现了公平竞争的原则。唐朝进一步完善了科举制度：唐太宗扩大科举规模，武则天创立殿试和武举，唐玄宗时诗赋成为进士科考试的重要内容。科举制一直延续到1905年清朝废除科举，历时约1300年，对中国社会的政治、文化、教育产生了深远影响。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024顺义期末改编</span></div><div <div class='exam-options'><span class='opt'>A.察举制</span><span class='opt'>B.刺史制度</span><span class='opt'>C.选官重门第</span><span class='opt'>D.科举取士</span></div><div class='exam-body'><div class='exam-q'>《神童诗》中有言“朝为田舍郎，暮登天子堂。”与诗句描述现象有关的是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>D. 科举取士</span></div></div></div>" } }
          },
          { num: 6, text: "618年，隋朝灭亡，李渊称帝，建立唐朝，定都长安。" },
          { num: 7, text: "贞观时期，进士科逐渐成为最重要的科目。武则天统治时期，创立殿试。",
            kws: { "殿试": { tb: "殿试是科举制度中最高一级的考试，由皇帝在宫殿内亲自主持。武则天于载初元年（690年）首创殿试，亲自策问贡士，以示重视人才。此后，殿试成为定制，在宋代得到进一步规范。殿试由皇帝亲自出题、亲自阅卷，录取者被称为\"天子门生\"。殿试分三甲：一甲三名，即状元、榜眼、探花，赐进士及第；二甲赐进士出身；三甲赐同进士出身。殿试制度加强了皇帝对科举取士的控制，也使科举的权威性和公正性得到提高。" },
              "进士科": { tb: "进士科是科举考试中最重要的科目，始于隋炀帝，完善于唐代。唐代进士科主要考诗赋、策论和经义，其中诗赋最为关键。贞观年间，进士科逐渐成为科举中最受重视的科目，录取人数虽然不多，但一旦考中，仕途前景光明。唐代有\"三十老明经，五十少进士\"的说法，可见进士科之难。进士科的发展促进了唐诗的繁荣，\"以诗取士\"使诗歌创作成为读书人的基本素养。" ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选1</span></div><div <div class='exam-options'><span class='opt'>A.唐太宗时期</span><span class='opt'>B.武则天时期</span><span class='opt'>C.隋文帝时期</span><span class='opt'>D.隋炀帝时期</span></div><div class='exam-body'><div class='exam-q'>自7世纪初开始,中国建立了当时世界上最先进、最公平、最科学的人才选拔制度。该制度创立于</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.隋炀帝时期</span> <span class='exam-parse'>隋炀帝时期设置进士科,标志着科举制创立。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选15</span></div><div class='exam-body'><div class='exam-q'>唐代前后期贵族出身和平民出身官员比例变化,促成变化的主要原因是</div><div class='exam-options'><span class='opt'>A.推进科举取士</span><span class='opt'>B.唐太宗打击官僚贵族</span><span class='opt'>C.完善三省六部制</span><span class='opt'>D.唐玄宗大力整顿吏治</span></div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.推进科举取士</span></div></div></div>"}
            ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•非选26(4)</span></div><div class='exam-body'><div class='exam-q'>唐太宗和武则天对科举制度的完善分别作出了怎样的贡献?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>唐太宗增加科举考试科目;武则天创立殿试制度。</span></div></div></div>"}
          },
          { num: 8, text: "唐太宗统治期间，政治比较清明，经济得到恢复和发展，国力增强，文教昌盛，各族友好关系进一步发展，历史上称为\"贞观之治\"。",
            kws: { "贞观之治": { tb: "贞观之治是指唐太宗李世民在位期间（627年—649年，年号\"贞观\"）出现的治世。唐太宗吸取隋朝灭亡的教训，以\"水能载舟，亦能覆舟\"为警示，实行了一系列开明政策：政治上，善于纳谏，重用房玄龄、杜如晦等贤相，虚心接受魏征等谏臣的批评；经济上，继续推行均田制和租庸调制，轻徭薄赋，鼓励生产；文化上，重视儒学，扩建学校，编纂《五经正义》；民族关系上，采取开明的民族政策，被西北各族尊为\"天可汗\"。贞观年间社会安定、经济发展、文化繁荣、国力强盛，为唐朝的全面繁荣奠定了基础。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2025四中期中</span></div><div <div class='exam-options'><span class='opt'>A.以民为本，仁政爱民</span><span class='opt'>B.广纳贤才，知人善任</span><span class='opt'>C.虚心纳谏，从善如流</span><span class='opt'>D.开放包容，兼收并蓄</span></div><div class='exam-body'><div class='exam-q'>唐太宗曾对大臣说：“为君之道，必须先存百姓。”他还常引用古人的主张，说：“舟所以比人君，水所以比黎庶，水能载舟，亦能覆舟。”这反映出唐太宗的治国思想是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A. 以民为本，仁政爱民</span></div></div></div>" } }
          },
          { num: 9, text: "武则天是我国历史上唯一的女皇帝。唐玄宗在位前期，年号为\"开元\"。",
            kws: { "武则天": { tb: "武则天（624年—705年），名曌，唐高宗李治的皇后，中国历史上唯一的女皇帝。高宗晚年多病，武则天参与朝政，与高宗并称\"二圣\"。高宗去世后，她先后废立中宗、睿宗，于690年正式称帝，改国号为周，定都洛阳（称神都）。武则天统治期间，大力发展科举制，开创殿试和武举，打破士族垄断；任用狄仁杰等贤臣，注重选拔人才；继续推行均田制，经济持续发展；加强边防，设置安西都护府和北庭都护府。705年，武则天病重，宰相张柬之等发动\"神龙政变\"，拥立中宗复位，恢复唐朝。武则天统治的近50年（作为皇后、太后和皇帝）上承贞观、下启开元，为唐朝的持续繁荣做出了贡献。" },
              "开元盛世": { tb: "开元盛世是唐玄宗李隆基在位前期（713年—741年，年号\"开元\"）出现的鼎盛局面。唐玄宗即位后，励精图治，任用姚崇、宋璟等贤相，整顿吏治，改革兵制，发展经济，提倡文教。开元年间，唐朝政治稳定、经济繁荣、文化昌盛、国力空前强盛：长安成为国际大都市，人口超过百万；农业生产技术大幅提高，曲辕犁和简车的使用提高了耕作效率；丝织业、陶瓷业等手工业达到很高水平；诗歌创作进入黄金时代，李白、杜甫等伟大诗人活跃于这个时期。开元盛世是唐朝极盛时期的标志，也是中国封建社会的鼎盛时期。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024二中期中</span></div><div class='exam-options'><span class='opt'>A.故乡若问登科事，便是当初老榜官</span><span class='opt'>B.城头山鸡鸣角角，洛阳家家学胡乐</span><span class='opt'>C.忆昔开元全盛日，小邑犹藏万家室</span><span class='opt'>D.九天阊阖开宫殿，万国衣冠拜冕旒</span></div><div class='exam-body'><div class='exam-q'>诗歌往往能在一定程度上反映当时的重大历史事件或社会风貌，下列反映唐朝社会经济高度繁荣景象的是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C. 忆昔开元全盛日，小邑犹藏万家室</span></div></div></div>" } ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选8</span></div><div <div class='exam-options'><span class='opt'>A.改国号为周</span><span class='opt'>B.是我国历史上唯一的女皇帝</span><span class='opt'>C.修订法律，废除严刑峻法</span><span class='opt'>D.减轻人民负担，推动社会经济发展</span></div><div class='exam-body'><div class='exam-q'>史学家肯定武则天主要是因为</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.减轻人民负担,推动社会经济发展</span> <span class='exam-parse'>武则天继续减轻百姓负担,重视发展生产。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选23</span></div><div class='exam-body'><div class='exam-q'>武则天曾下令:凡州县\u2018田畴垦辟,家有余粮\u2019则官吏升奖,体现了</div><div class='exam-options'><span class='opt'>A.重用人才</span><span class='opt'>B.重视农业</span><span class='opt'>C.善于纳谏</span><span class='opt'>D.提倡节俭</span></div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.重视农业</span> <span class='exam-parse'>通过奖励垦田鼓励农业生产。</span></div></div></div>"}
          },
          { num: 10, text: "唐朝前期，发明并推广曲辕犁、简车等重要的生产工具。手工业达到很高水平，蜀锦冠绝全国。长安既是政治、经济、文化交流中心，也是闻名中外的国际大都市。",
            kws: { "曲辕犁": { tb: "曲辕犁是唐朝发明的先进耕犁，又称\"江东犁\"。相比于直辕犁，曲辕犁将长直辕改为短曲辕，并在犁上增加了犁壁、犁箭等部件，使犁身更轻巧、操作更灵活、耕作深度更易控制。曲辕犁特别适合南方水田耕作，大大提高了农业生产效率。它的出现标志着中国犁耕技术的成熟，是中国古代农具史上的重要里程碑，此后沿用了一千多年。" },
              "简车": { tb: "简车是一种利用水流驱动的灌溉工具，在唐朝前期发明并推广。简车由竹木制成，形状像一个大圆轮，轮周装有若干竹筒，利用水流推动轮子转动，将低处的水带到高处流入田间。简车不需要人力或畜力驱动，效率高且可持续工作，极大地提高了灌溉效率，促进了农业生产的发展。" ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选12</span></div><div <div class='exam-options'><span class='opt'>A.有助于提高粮食亩产量</span><span class='opt'>B.有效防止洪灾发生</span><span class='opt'>C.奠定了经济发展的基础</span><span class='opt'>D.促进手工业的进步</span></div><div class='exam-body'><div class='exam-q'>筒车是唐朝的灌溉工具,它的使用</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.有助于提高粮食亩产量</span></div></div></div>"},
              "长安": { tb: "长安是隋唐两朝的都城，位于今陕西西安。隋朝称大兴城，唐朝改名长安。长安城规模宏大，面积达84平方公里，是当时世界上最大的城市之一。城市规划整齐方正，采用里坊制，由宫城、皇城和外郭城三部分组成。朱雀大街宽达150米，将全城分为东西两部分。东市和西市是两大商业中心，聚集了来自世界各地的商人。长安不仅是唐朝的政治中心，也是经济和文化中心，吸引了日本、新罗、波斯、阿拉伯等国的使节、留学生和商人前来交流学习，是名副其实的国际大都市。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第一单元学情调研</span></div><div class='exam-body'><div class='exam-q'>唐朝的都城长安，皇城位于城市正中的北部；皇城南面的南厢是百官、市民居住的地区——坊；皇城左右有专门从事商业贸易的地区——市；坊与市之间有墙垣隔开。材料体现了唐朝</div><div class='exam-options'><span class='opt'>A.民族之间相互交融</span><span class='opt'>B.开放的社会风气</span><span class='opt'>C.城市布局的特点</span><span class='opt'>D.手工业十分繁荣</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C.城市布局的特点</span></div></div></div>"} ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•非选27(2)</span></div><div class='exam-body'><div class='exam-q'>材料二中的两种农具分别是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>图1:曲辕犁;图2:筒车。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•单选4</span></div><div class='exam-body'><div class='exam-q'>图中①处(唐朝)应填写的农业生产工具是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.曲辕犁</span> <span class='exam-parse'>曲辕犁是唐朝发明的耕犁。</span></div></div></div>"}
          },
          { num: 11, text: "755年，安禄山和史思明发动叛乱，史称\"安史之乱\"，763年平叛成功。这场叛乱使唐朝的国势由盛转衰，中央权力衰微，形成藩镇割据的局面。",
            kws: { "安史之乱": { tb: "安史之乱（755年—763年）是唐朝由盛转衰的关键事件。安禄山和史思明是唐玄宗时期手握重兵的藩将：安禄山身兼范阳、平卢、河东三镇节度使，拥兵15万。755年冬，安禄山以\"诛杨国忠\"为名在范阳（今北京）起兵叛乱，叛军势如破竹，很快攻占洛阳、长安。唐玄宗仓皇出逃至成都，途中发生马嵬坡兵变，杨贵妃被缢死。太子李亨（唐肃宗）在灵武即位，组织平叛。763年，叛军内部发生内讧，安禄山被其子安庆绪所杀，史思明也被其子史朝义所杀，唐朝军队最终平定叛乱。但安史之乱给唐朝带来巨大破坏：北方经济遭到严重摧残，人口锐减；中央权威下降，各地节度使拥兵自重，形成藩镇割据局面；此后再也无法恢复鼎盛时期的国力。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024十二中期中</span></div><div <div class='exam-options'><span class='opt'>A.使唐室内地空虚</span><span class='opt'>B.引发了黄巢起义</span><span class='opt'>C.使唐朝由盛转衰</span><span class='opt'>D.导致了唐朝灭亡</span></div><div class='exam-body'><div class='exam-q'>阅读材料：寂寞天宝后，园庐但蒿藜。我里百余家，世乱各东西。四邻何所有？一二老寡妻。——杜甫《无家别》。杜甫诗中所描绘的“世乱”的影响是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C. 使唐朝由盛转衰</span></div></div></div>" } }
          }
        ]

      {

        points: [
          { num: 1, text: "唐太宗时，吐蕃赞普松赞干布统一了青藏高原的各个部落，定都逻些。他推广灌溉技术，创制文字，颁行法令，设置官制等，采取了一系列发展生产、改革和完善制度的措施。他仰慕中原文化，多次派使者去唐朝请婚。641年，文成公主入藏，唐太宗同意将她嫁给松赞干布，并派专使护送。",
            kws: { "文成公主入藏": { tb: "文成公主入藏发生在唐太宗贞观十五年（641年）。吐蕃赞普松赞干布仰慕唐朝文化，多次派遣使者到长安求婚。唐太宗最终将宗室女文成公主嫁给松赞干布。文成公主入藏时带去了大量物品：包括粮食、蔬菜种子、药材、茶叶、丝绸、书籍以及工匠和技术人员。她带去的先进生产技术（如纺织、建筑、造纸、酿酒等）促进了吐蕃经济文化的发展。文成公主还带去了一批佛经和佛像，推动了佛教在吐蕃的传播。松赞干布为文成公主修建了布达拉宫。文成公主在吐蕃生活了近40年，为汉藏友好关系做出了重大贡献。至今西藏仍流传着关于文成公主的许多传说。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第一单元学情调研</span></div><div class='exam-body'><div class='exam-q'>下图为唐朝阎立本的《步辇图》（局部）。该图描绘了唐太宗接见松赞干布派的求婚使者的场景。该作品可用来研究的唐朝史实是</div><div class='exam-options'><span class='opt'>A.玄奘西行</span><span class='opt'>B.文成公主入藏</span><span class='opt'>C.金城公主入藏</span><span class='opt'>D.唐蕃会盟</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B.文成公主入藏</span></div></div></div>"} ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•非选26(1)</span></div><div class='exam-body'><div class='exam-q'>根据材料一,指出唐朝民族交往的两个事件。从中体现出唐朝采取了怎样的民族政策?</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>文成公主入藏、长庆会盟。开明的民族政策。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•单选3</span></div><div class='exam-body'><div class='exam-q'>松赞干布派遣贵族子弟到长安学习,请求唐朝给予蚕种和工匠,影响是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.促进了吐蕃经济和社会的发展</span></div></div></div>"}
          },
          { num: 2, text: "630年，唐太宗击败东突厥汗国，各酋长及继位者接受唐廷的册封。唐太宗实行开明的民族政策，得到西北各族的拥戴，被尊奉为\"天可汗\"。",
            kws: { "天可汗": { tb: "\"天可汗\"是西北各族对唐太宗的尊称。630年，唐太宗派李靖率领唐军大败东突厥，俘获东突厥颉利可汗，东突厥汗国灭亡。此后，西北各族的首领和继位者都要接受唐朝的册封。唐太宗实行开明的民族政策，对归附的少数民族给予优待，任用少数民族首领担任唐朝官员，在边疆地区设立羁縻州府进行管理。这种尊重和包容的态度赢得了各族的敬重，他们尊称唐太宗为\"天可汗\"（意为\"天下的共同君主\"）。天可汗制度的建立，体现了唐朝强大的国力和开放的胸怀，也促进了各民族之间的交流与融合。" } ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选16</span></div><div <div class='exam-options'><span class='opt'>A.促进了阶层流动</span><span class='opt'>B.削弱了藩镇实力</span><span class='opt'>C.加强了中外交往</span><span class='opt'>D.推动了民族交融</span></div><div class='exam-body'><div class='exam-q'>唐太宗击败东突厥后妥善安置归附者,这一做法</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.推动了民族交融</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选7</span></div><div class='exam-body'><div class='exam-q'>唐朝与周边民族交往方式多样,由此可知唐朝</div><div class='exam-options'><span class='opt'>A.致力于边疆民族地区开发</span><span class='opt'>B.与周边民族政权的战争不断</span><span class='opt'>C.发展民族关系具有灵活性</span><span class='opt'>D.以军事手段征服各民族政权</span></div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.发展民族关系具有灵活性</span></div></div></div>"}
          },
          { num: 3, text: "隋唐时期，日本派遣隋使、遣唐使来华，唐朝的天文历法、文字、典籍、书画艺术、建筑技术等传到日本，对日本社会的发展产生深远的影响。遣唐使团中的阿倍仲麻吕是留学生中的杰出人物。",
            kws: { "遣唐使": { tb: "遣唐使是日本向唐朝派遣的使节团。从630年至894年（唐朝灭亡前），日本共派遣了19次遣唐使团。使团成员包括大使、副使、留学生、学问僧等，最多时一次达500余人。他们来华学习唐朝的政治制度、法律、天文历法、文字、儒学、佛教、建筑、医药、艺术等。著名遣唐使成员包括：阿倍仲麻吕（中国名晁衡），他在唐朝考中进士，长期在唐朝做官，与李白、王维等诗人交好；吉备真备，将唐朝的天文历法、兵法等带回日本；空海和最澄，将佛教密宗和天台宗传入日本。遣唐使制度对日本大化改新和奈良、平安时期的制度建设产生了深远影响，日本的文字（假名）也是在汉字基础上创制的。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第一单元学情调研</span></div><div class='exam-body'><div class='exam-q'>唐朝时，一艘艘木制帆船从日本来到中国，中日两国交流频繁。上海世博会期间，一艘复制的日本帆船进入了上海的十六铺码头，再现了当年的场景。这艘船再现的是</div><div class='exam-options'><span class='opt'>A.鉴真东渡日本弘扬佛法</span><span class='opt'>B.日本僧人来华传播日本文化</span><span class='opt'>C.日本派遣唐使到唐朝学习</span><span class='opt'>D.玄奘东游去日本求取佛经</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C.日本派遣唐使到唐朝学习</span></div></div></div>"},
              "阿倍仲麻吕": { tb: "阿倍仲麻吕（698年—770年），日本奈良时代的遣唐留学生，中国名晁衡。他于717年随第八次遣唐使团来到长安，入国子监学习。因学业优秀，考中进士，在唐朝历任校书郎、左补阙、秘书监等官职。他与唐代大诗人李白、王维等交情深厚，互有诗歌赠答。753年，阿倍仲麻吕曾试图回国，但船只在海上遇险，漂流至越南，后辗转返回长安。此后他再未回国，最终在长安去世，终年72岁。唐代宗追封他为潞州大都督。阿倍仲麻吕是中日文化交流史上最重要的代表人物之一。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第一单元学情调研</span></div><div class='exam-body'><div class='exam-q'>在历史上，中国对印度的称呼几经改变，如西汉译为身毒，东汉称它为天竺。自此史事之后，印度这一译法逐渐流行。这一史事是</div><div class='exam-options'><span class='opt'>A.玄奘西行</span><span class='opt'>B.印度使节来华</span><span class='opt'>C.鉴真东渡</span><span class='opt'>D.文成公主入藏</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A.玄奘西行</span></div></div></div>"} ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选21</span></div><div <div class='exam-options'><span class='opt'>A.鉴真东渡日本弘扬佛法</span><span class='opt'>B.日本僧人来华传播日本文化</span><span class='opt'>C.日本派遣唐使到唐朝学习</span><span class='opt'>D.玄奘东游去日本求取佛经</span></div><div class='exam-body'><div class='exam-q'>唐朝时木制帆船从日本来到中国,再现了</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.日本派遣唐使到唐朝学习</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第一单元学情调研•单选22</span></div><div class='exam-body'><div class='exam-q'>\u2018中国唐朝对外友好往来\u2019板报可选资料</div><div class='exam-options'><span class='opt'>A.①③</span><span class='opt'>B.②③</span><span class='opt'>C.②④</span><span class='opt'>D.③④</span></div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.①③(玄奘、鉴真)</span></div></div></div>"}
          },
          { num: 4, text: "鉴真经过六次东渡，最终抵达日本。他主持修建唐招提寺，对中日文化交流做出了卓越贡献。新罗崔致远通过科举考试成为唐朝的官员。贞观初年，玄奘西行前往天竺取经，根据他的口述，由弟子记录成书的《大唐西域记》是研究中外交流史的珍贵文献。中国的造纸术通过大食传播到西方，促进了世界文化的发展。",
            kws: { "鉴真东渡": { tb: "鉴真（688年—763年）是唐朝著名高僧，扬州大明寺住持。应日本僧人邀请，鉴真决心东渡日本弘扬佛法。从743年第一次东渡开始，到753年第六次成功抵达，历时十年，经历了五次失败：前三次因官府阻拦而未成行，第四次在海上遭遇风暴，第五次漂流到海南岛并导致鉴真双目失明。753年，66岁且失明的鉴真第六次东渡，终于成功抵达日本九州。鉴真在日本传播佛教律宗，主持修建了奈良的唐招提寺，还将唐朝的建筑、雕塑、医药、书法等技艺传授给日本人，被日本称为\"律宗祖师\"和\"日本文化之父\"。763年，鉴真在奈良圆寂。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024北师大附中期中</span></div><div <div class='exam-options'><span class='opt'>A.鉴真</span><span class='opt'>B.玄奘</span><span class='opt'>C.崔致远</span><span class='opt'>D.阿倍仲麻吕</span></div><div class='exam-body'><div class='exam-q'>“东瀛有多远？芒履难丈量。袈裟作舟帆，合十忘生死，弘愿心中藏，普度众生……”这是中央电视台播放的一部有关唐朝高僧的电视剧片尾曲。这部电视剧的主人公是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A. 鉴真</span></div></div></div>" },
              "玄奘西行": { tb: "玄奘（602年—664年）是唐朝著名高僧、翻译家、旅行家。贞观元年（627年，一说是贞观三年），玄奘从长安出发西行，前往佛教发源地天竺（古印度）取经。他穿越戈壁沙漠，翻越葱岭（帕米尔高原），历经艰难险阻到达天竺。玄奘在天竺游学十余年，在那烂陀寺师从戒贤大师学习佛法经典，精通佛教各个流派。645年，玄奘携带大量佛经返回长安，受到唐太宗的隆重接见。此后，他在长安大慈恩寺组织译场，翻译佛经75部、1335卷。由他口述、弟子辩机记录整理的《大唐西域记》，记载了他沿途所经110多个国家和地区的风土人情、地理物产、历史传说等，是研究古代中亚、南亚历史地理的珍贵文献，至今被国际学术界高度重视。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024二中期中</span></div><div <div class='exam-options'><span class='opt'>A.文明交流互鉴</span><span class='opt'>B.民族关系和睦</span><span class='opt'>C.海外贸易繁荣</span><span class='opt'>D.边疆管理加强</span></div><div class='exam-body'><div class='exam-q'>下图两位历史人物的活动路线图（玄奘西行、鉴真东渡路线图）反映了</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A. 文明交流互鉴</span></div></div></div>" } }
          },
          { num: 5, text: "雕版印刷术至少在唐朝前期已经出现。隋唐时期在天文学和医药学领域最杰出的人物是僧一行和孙思邈。《唐本草》是世界上第一部由国家编定颁布的药典。唐朝书法名家有颜真卿、柳公权等，著名的画家有阎立本、吴道子等。",
            kws: { "雕版印刷术": { tb: "雕版印刷术是中国古代重要的印刷技术，至少在唐朝前期已经发明。其方法是在木板上反刻文字或图像，涂上墨汁，再覆盖纸张进行印刷。现存最早的雕版印刷品是敦煌发现的《金刚经》（868年印），现藏于大英图书馆，做工精良，证明了唐代雕版印刷技术已经相当成熟。雕版印刷术的出现大大推动了文化知识的传播，唐代的佛经、历书、诗文等都通过雕版印刷广泛流传。到了宋代，雕版印刷进入黄金时代，活字印刷术在此基础上被毕昇发明。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第一单元学情调研</span></div><div class='exam-body'><div class='exam-q'>繁荣与开放是唐朝社会的特征。以下能够见证唐朝开放的是</div><div class='exam-options'><span class='opt'>A.敦煌莫高窟</span><span class='opt'>B.《长恨歌》</span><span class='opt'>C.赵州桥</span><span class='opt'>D.《千金方》</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A.敦煌莫高窟</span></div></div></div>"},
              "僧一行": { tb: "僧一行（683年—727年），唐代著名天文学家和僧人。他原名张遂，后出家为僧。唐玄宗时期，僧一行主持编制了《大衍历》，这是当时世界上最先进的历法之一。他还组织了大规模的天文测量，在全国设立13个观测点，测量北极高度和日影长度，这项工作在世界上首次实测了子午线（经线）的长度。僧一行的天文学成就标志着中国古代天文学发展的高峰。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第一单元学情调研</span></div><div class='exam-body'><div class='exam-q'>下列选项中搭配正确的一项是</div><div class='exam-options'><span class='opt'>A.孙思邈——《大衍历》</span><span class='opt'>B.僧一行——《唐本草》</span><span class='opt'>C.白居易——《长恨歌》</span><span class='opt'>D.柳宗元——《玄秘塔碑》</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C.白居易——《长恨歌》</span></div></div></div>"},
              "孙思邈": { tb: "孙思邈（约581年—682年），唐代著名医药学家，被后人尊称为\"药王\"。他一生致力于医学研究，深入民间采药治病，积累了丰富的临床经验。他撰写的《千金要方》和《千金翼方》是中国最早的临床医学百科全书，涵盖了内、外、妇、儿、五官、针灸等各科，收录药方数千首。孙思邈强调医德，提出\"大医精诚\"的理念，认为医生应当技术精湛、品德高尚。他的医药学成就对后世中医学发展产生了深远影响。" },
              "颜真卿": { tb: "颜真卿（709年—784年），唐代著名书法家，与柳公权并称\"颜柳\"。他的楷书风格雄强敦厚、气势磅礴，后人称为\"颜体\"。颜真卿的书法代表作品有《多宝塔碑》《颜勤礼碑》《颜氏家庙碑》等。他不仅在书法上成就斐然，还是一位政治家和平叛英雄，在安史之乱中组织抵抗叛军，后因不屈于叛臣李希烈而被害。颜真卿的书法对后世影响极大，历代书家无不认真学习颜体。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024北师大附中期中</span></div><div <div class='exam-options'><span class='opt'>A.锺繇、胡昭</span><span class='opt'>B.颜真卿、柳公权</span><span class='opt'>C.王羲之、苏轼</span><span class='opt'>D.吴道子、欧阳询</span></div><div class='exam-body'><div class='exam-q'>中国的书法艺术是中华文化中的瑰宝。唐朝在书法艺术方面建树颇丰。下列人物都属于唐代著名书法家的一组是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B. 颜真卿、柳公权</span></div></div></div>" },
              "吴道子": { tb: "吴道子（约685年—758年），唐代著名画家，被后世尊为\"画圣\"。他最擅长人物画和宗教画，画风奔放洒脱，线条流畅有力，所画人物衣带飘飘，有\"吴带当风\"之美誉。吴道子在长安、洛阳等地寺庙中创作了大量壁画，其代表作有《送子天王图》等。他的绘画对后世中国人物画的发展产生了深远影响。" } ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选8</span></div><div <div class='exam-options'><span class='opt'>A.中央集权加强</span><span class='opt'>B.对外交往频繁</span><span class='opt'>C.印刷技术普及</span><span class='opt'>D.文学艺术发展</span></div><div class='exam-body'><div class='exam-q'>宋朝藏书盛行,普通家庭也能买得起书,这主要得益于</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.印刷技术普及</span> <span class='exam-parse'>印刷技术降低了书籍成本。</span></div></div></div>"}

            kws: { "陈桥兵变": { tb: "陈桥兵变是960年赵匡胤在开封以北陈桥驿发动的军事政变。后周世宗柴荣去世后，幼主柴宗训即位，赵匡胤任殿前都点检（禁军最高统帅）。960年正月，契丹和北汉联兵南侵的消息传到开封，赵匡胤率兵北上御敌。军队到达陈桥驿时，赵匡胤的弟弟赵匡义和谋士赵普等人策划了兵变，将事先准备好的黄袍披在赵匡胤身上，拥立他为皇帝。赵匡胤随即率军返回开封，逼迫后周恭帝柴宗训禅位，改国号为\"宋\"，定都开封（称东京）。陈桥兵变几乎未发生流血冲突，赵匡胤对后周皇室和大臣采取了较为宽容的态度，体现了他的政治智慧。" } }

            kws: { "崇文抑武": { tb: "崇文抑武是宋朝基本国策。宋太祖赵匡胤本人就是通过兵变上台的，因此对武将专权极为警惕。为防患于未然，宋朝统治者实行\"崇文抑武\"方针：提高文官地位，以文臣担任地方长官和军队要职；降低武将地位，限制武将权力；大力提倡读书，增加科举录取名额。这一政策有效地防止了内乱和军事政变，但同时也削弱了军队的战斗力，导致宋朝在与辽、西夏、金等政权的军事冲突中经常处于被动地位。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2025朝阳期末</span></div><div class='exam-body'><div class='exam-q'>北宋严格了科举考试程序，殿试成为定制，并大幅度增加科举取士名额。大量文官得到重用，杜绝了武将跋扈和兵变政移情况的发生。材料反映了北宋</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>“重文轻武”的治国政策</span></div></div></div>" } }

            kws: { "杯酒释兵权": { tb: "杯酒释兵权是宋太祖赵匡胤为加强中央集权而采取的重要措施。961年，赵匡胤设宴招待禁军高级将领石守信、高怀德等人。酒酣耳热之际，赵匡胤以\"人生苦短，不如及时行乐\"为由，劝说将领们交出兵权，回乡享福。石守信等人心领神会，第二天便称病请求解除军职。赵匡胤对交出兵权的将领给予优厚的赏赐和闲职，使他们安心养老。杯酒释兵权以和平方式解决了开国功臣掌握兵权的问题，避免了历史上常见的\"狡兔死，走狗烹\"的流血事件，体现了赵匡胤的政治智慧。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2025四中期中</span></div><div <div class='exam-options'><span class='opt'>A.宋太祖</span><span class='opt'>B.宋太宗</span><span class='opt'>C.铁木真</span><span class='opt'>D.忽必烈</span></div><div class='exam-body'><div class='exam-q'>有同学在整理宋元时期的历史人物时，搜集到了“黄袍加身”“杯酒释兵权”等典故，与这些典故有关的人物是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A. 宋太祖（赵匡胤）</span></div></div></div>" } }
          },
          { num: 4, text: "宋朝统治者注重发展文教事业，改革和发展科举制。北宋严格了科举考试程序，殿试成为定制，录取及名次直接由皇帝掌握，进士成为\"天子门生\"。科举制度的发展，为读书人进入仕途开辟了道路，使北宋政权基础进一步扩大，政府在全国范围内营造了浓厚的读书风气，促进了整个社会文化素养的提高，造就了宋朝科技发达、文化昌盛、人才辈出的文治局面。",
            kws: { "宋代科举改革": { tb: "宋朝对科举制度进行了重大改革：第一，废除了唐代科举中的公荐制度，实行糊名（弥封）和誊录制度，即考生试卷密封姓名，由专人重新抄写后再交考官评阅，以防止舞弊；第二，扩大录取名额，唐代每年仅取二三十人，宋代扩大到数百人；第三，殿试成为定制，皇帝亲自担任主考官，进士成为\"天子门生\"；第四，提高进士的地位，中进士者立即授予官职。这些改革使科举制度更加公平公正，极大地促进了社会阶层的流动，\"朝为田舍郎，暮登天子堂\"成为可能。宋代的科举改革被认为是中国科举制度的成熟和完善阶段。" } ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•非选17(2)</span></div><div class='exam-body'><div class='exam-q'>依据材料二,概括南宋临安城出现的社会现象,分析其原因。</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>现象:学校数量多,读书风气盛行。原因:科举制发展;重视教育;活字印刷术使用。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•非选17(1)</span></div><div class='exam-body'><div class='exam-q'>依据材料一,指出宋朝完善科举制度的措施,分析其影响。</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>措施:确定殿试制度,三级考试制度确立。影响:加强中央集权,促进教育发展。</span></div></div></div>"}

          { num: 5, text: "1069年，宋神宗任用王安石主持变法。在经济领域实行青苗法、募役法、方田均税法，在军事领域实行保甲法。宋神宗死后，新法几乎全部被废除。",
            kws: { "王安石变法": { tb: "王安石变法（1069年—1085年）是北宋中期一场重要的改革运动。北宋中期面临\"三冗\"（冗官、冗兵、冗费）问题，国家财政困难，社会矛盾尖锐。宋神宗即位后，锐意改革，于1069年任命王安石为参知政事（副宰相），主持变法。主要变法内容包括：经济方面——青苗法（由政府向农民提供低息贷款）、募役法（改差役为雇役，民户出钱雇人服役）、方田均税法（丈量土地，按田亩征税）、市易法（政府调控物价）等；军事方面——保甲法（民兵制度）、置将法（训练军队）等；教育方面——改革科举，专考经义策论。变法增加了政府收入，一定程度上减轻了农民负担，但在执行过程中弊端丛生，遭到保守派强烈反对。1085年宋神宗去世，高太后听政，起用保守派司马光为相，新法几乎全部废除。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2025四中期中</span></div><div class='exam-options'><span class='opt'>A.①②③</span><span class='opt'>B.①③④</span><span class='opt'>C.①②④</span><span class='opt'>D.②③④</span></div><div class='exam-body'><div class='exam-q'>以下对王安石变法的影响论述正确的是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C. ①②④（①使政府财政收入大幅度增加 ②兴修了大量水利工程 ④使统治集团内部分裂日益严重）</span></div></div></div>" } }
          },
          { num: 6, text: "宋真宗时期，辽宋议和，签订盟约，史称\"澶渊之盟\"。1044年，北宋与西夏进行和谈，订立和约，元昊向宋称臣，宋给西夏钱物，称为\"岁赐\"。议和后，宋夏关系一直较为稳定。",
            kws: { "澶渊之盟": { tb: "澶渊之盟是1005年北宋与辽国签订的和平盟约。1004年，辽圣宗和萧太后率大军南侵，直逼黄河北岸的澶州（今河南濮阳）。宋真宗在宰相寇准的坚持下，御驾亲征澶州。宋军士气大振，射杀辽军主帅萧挞凛，辽军受挫。辽朝见取胜无望，同意议和。1005年，双方在澶州签订盟约：宋辽约为兄弟之国，宋真宗尊辽萧太后为叔母；宋每年向辽提供银10万两、绢20万匹（称\"岁币\"）；双方撤军，以白沟河为界。澶渊之盟后，宋辽之间维持了约120年的和平，双方在边境开设榷场进行贸易，促进了经济文化交流。但\"岁币\"也加重了北宋的财政负担。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024北师大附中期中</span></div><div class='exam-options'><span class='opt'>A.陈桥兵变</span><span class='opt'>B.澶渊之盟</span><span class='opt'>C.开元盛世</span><span class='opt'>D.安史之乱</span></div><div class='exam-body'><div class='exam-q'>北宋曾把与契丹政权边境交界地区的一些地方改名，如“威虏”改为“广信”，“静戎”改为“安肃”，“破虏”改为“信安”等。该现象的出现与下列哪一重大史实有关</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B. 澶渊之盟</span></div></div></div>\n<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024二中期中</span></div><div class='exam-options'><span class='opt'>A.都结束了长期分裂局面</span><span class='opt'>B.都促进了民族交融</span><span class='opt'>C.维持了相当一段时期的和平</span><span class='opt'>D.都加重了北宋的财政负担</span></div><div class='exam-body'><div class='exam-q'>1005年宋辽之间的澶渊之盟、1141年宋金之间的和议，两者的相同影响有</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C.维持了相当一段时期的和平</span></div></div></div>" } }
          }
        ]

          { num: 1, text: "1125年，辽被金灭亡。1127年，金军攻破东京，北宋灭亡，史称\"靖康之变\"。北宋灭亡后，赵构登上皇位，以临安为都城建立政权，史称南宋。",
            kws: { "靖康之变": { tb: "靖康之变（1127年）是北宋灭亡的标志性事件。1125年，金朝灭辽后，转而南下攻宋。1126年金军第一次围攻开封，宋钦宗被迫答应割地赔款。同年冬，金军再次南下，1127年初攻破开封城。金军俘虏了宋徽宗、宋钦宗二帝以及后妃、宗室、大臣等3000余人北去，并掠走了大量金银财宝、文物典籍。北宋至此灭亡。因事件发生在宋钦宗靖康年间，故称\"靖康之变\"或\"靖康之耻\"。北宋灭亡后，宋徽宗第九子康王赵构在南京应天府（今河南商丘）即位，改元建炎，后定都临安（今杭州），史称南宋。" },
              "南宋": { tb: "南宋（1127年—1279年）是宋朝南迁后的政权。靖康之变后，赵构在南方重建宋朝，定都临安（今杭州）。南宋的疆域大致以淮河至大散关一线与金朝为界，统治南方地区。南宋时期，经济重心完全南移完成，南方经济繁荣，特别是江南地区成为全国最富裕的地区。南宋时期农业、手工业、商业和海外贸易都很发达，\"苏湖熟，天下足\"的谚语反映了江南农业的繁荣。南宋科技文化成就突出，活字印刷术的改进、指南针的广泛应用、火药在军事上的使用都在这一时期。但南宋在军事上长期处于弱势，最终被蒙古所灭。" } ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选20</span></div><div <div class='exam-options'><span class='opt'>A.高雅庄重，低沉悲怆</span><span class='opt'>B.清新明快，节奏活泼</span><span class='opt'>C.沉郁悲怆，低沉悲伤</span><span class='opt'>D.静美舒缓，优美动听</span></div><div class='exam-body'><div class='exam-q'>靖康二年(1127年)的历史故事,最合适的背景音乐曲风是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.沉郁悲怆,低沉悲伤</span> <span class='exam-parse'>靖康之变金灭北宋。</span></div></div></div>"}

          { num: 2, text: "岳飞统率的\"岳家军\"在郾城大败金军主力。1141年，宋金达成和议，南宋向金称臣，并送钱物，双方以淮水至大散关一线划定分界线，宋金对峙局面形成。",
            kws: { "岳飞": { tb: "岳飞（1103年—1142年），南宋抗金名将，民族英雄。他率领的\"岳家军\"纪律严明，\"冻死不拆屋，饿死不掳掠\"，深受百姓爱戴。1140年，岳飞率军北伐，在郾城大败金军主力，收复郑州、洛阳等地，前锋直抵开封附近的朱仙镇。然而，宋高宗和秦桧担心岳飞势力过大、威胁皇权，同时害怕抗金胜利后迎回被俘的宋钦宗会影响自己的皇位，连发十二道金牌强令岳飞撤军。岳飞被迫班师后，被剥夺兵权，以\"莫须有\"的罪名被杀害于风波亭，年仅39岁。20年后，宋孝宗为岳飞平反昭雪。岳飞精忠报国的精神成为中华民族爱国主义精神的象征，\"精忠报国\"的故事流传至今。" } ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选2</span></div><div <div class='exam-options'><span class='opt'>A.北伐中原，结束三国鼎立</span><span class='opt'>B.仗义执言，揭露统治腐朽</span><span class='opt'>C.忧国忧民，同情民间疾苦</span><span class='opt'>D.收复河山，渴望国家统一</span></div><div class='exam-body'><div class='exam-q'>岳飞\u2018靖康耻,犹未雪\u2019和陆游\u2018家祭无忘告乃翁\u2019反映的时代最强音是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.收复河山,渴望国家统一</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选13</span></div><div class='exam-body'><div class='exam-q'>剧本情节急诏促回军、满江红、东窗定毒计,主人公是</div><div class='exam-options'><span class='opt'>A.张骞</span><span class='opt'>B.文天祥</span><span class='opt'>C.岳飞</span><span class='opt'>D.王安石</span></div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.岳飞</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选2</span></div><div class='exam-body'><div class='exam-q'>率军北伐取得郾城大捷,\u2018冻死不拆屋\u2019的历史人物是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.岳飞抗金</span></div></div></div>"}
          },
          { num: 3, text: "1206年，铁木真完成蒙古草原的统一，建立蒙古政权，他被拥立为大汗，尊称为成吉思汗。1227年，蒙古军队灭西夏。1234年，蒙古灭金。1260年，忽必烈继承汗位；1271年，改国号为大元，1272年定都大都。",
            kws: { "成吉思汗": { tb: "成吉思汗（1162年—1227年），名铁木真，蒙古帝国的建立者。他出身于蒙古乞颜部贵族家庭，少年时父亲被毒死，部落离散。铁木真凭借非凡的军事才能和政治智慧，逐步统一了蒙古草原各部。1206年，在斡难河源召开的大会上，铁木真被推举为\"成吉思汗\"（意为\"拥有四海的大汗\"）。他建立了蒙古帝国，创制了蒙古文字，制定了军事、行政制度（千户制）。成吉思汗率蒙古骑兵向四方扩张，征服了中亚、西亚的广大地区。1227年，成吉思汗在进攻西夏时病逝。他的后代继续扩张，建立了横跨欧亚的庞大帝国。" },
              "元朝建立": { tb: "元朝（1271年—1368年）是由蒙古族建立的统一王朝。成吉思汗之孙忽必烈继承汗位后，于1271年采纳刘秉忠的建议，根据《易经》\"大哉乾元\"改国号为\"大元\"，1272年定都大都（今北京）。元朝1279年灭南宋，完成了全国统一，结束了自唐末以来数百年的分裂割据局面。元朝是中国历史上版图最大的朝代，\"北逾阴山，西极流沙，东尽辽左，南越海表\"。元朝实行行省制度，对后世影响深远；在边疆地区设立宣政院管理西藏、设置澎湖巡检司管辖台湾等，加强了对边疆的统治。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024顺义期末</span></div><div <div class='exam-options'><span class='opt'>A.①②</span><span class='opt'>B.①③</span><span class='opt'>C.②③</span><span class='opt'>D.③④</span></div><div class='exam-body'><div class='exam-q'>以下史事可以出现在忽必烈栏中的有：①统一蒙古草原 ②改国号为大元，定都大都 ③灭南宋完成统一 ④设立厂卫特务机构</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C. ②③</span></div></div></div>" } ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选21</span></div><div <div class='exam-options'><span class='opt'>A.隋文帝 隋炀帝</span><span class='opt'>B.唐高宗 唐太宗</span><span class='opt'>C.成吉思汗 忽必烈</span><span class='opt'>D.宋太祖 宋高宗</span></div><div class='exam-body'><div class='exam-q'>起朔漠并西域,平西夏灭女真,遂下江南而天下为一。建立政权和完成统一的君主分别是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.成吉思汗 忽必烈</span></div></div></div>"}
          },
          { num: 4, text: "1279年，元朝完成了全国的统一，结束了我国历史上长时期多个政权并立的局面。元朝疆域\"北逾阴山，西极流沙，东尽辽左，南越海表\"，是我国历史上版图最大的朝代。",
            kws: { "元的统一": { tb: "1279年，元朝灭南宋（崖山海战，陆秀夫背负幼帝赵昺投海殉国），完成了全国统一。元朝的统一结束了自907年唐朝灭亡以来长达370多年的分裂局面（五代十国→辽宋夏金并立），建立了统一的多民族国家。元朝统一的意义重大：促进了各民族之间的交流与融合，特别是蒙古族、色目人与汉族的接触；加强了中外联系，丝绸之路在元朝空前繁荣；行省制度的创立为后世地方行政制度提供了范本。元朝的统一也为明清大一统格局奠定了基础。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第二单元学情调研</span></div><div class='exam-body'><div class='exam-q'>起朔漠，并西域，平西夏，灭女真，立高丽，定南诏，遂下江南，而天下为一。建立政权和完成大一统的君主分别是</div><div class='exam-options'><span class='opt'>A.隋文帝 隋炀帝</span><span class='opt'>B.唐高祖 唐太宗</span><span class='opt'>C.成吉思汗 忽必烈</span><span class='opt'>D.宋太祖 宋高宗</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C.成吉思汗 忽必烈</span></div></div></div>"} ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选21</span></div><div <div class='exam-options'><span class='opt'>A.隋文帝 隋炀帝</span><span class='opt'>B.唐高宗 唐太宗</span><span class='opt'>C.成吉思汗 忽必烈</span><span class='opt'>D.宋太祖 宋高宗</span></div><div class='exam-body'><div class='exam-q'>建立蒙古政权和完成元朝大一统的君主分别是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.成吉思汗 忽必烈</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>海淀期末真卷•单选9</span></div><div class='exam-body'><div class='exam-q'>我国历史上版图最大的朝代是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.元朝</span> <span class='exam-parse'>元朝疆域空前辽阔。</span></div></div></div>"}
          },
          { num: 5, text: "元朝在中央设中书省掌管全国的行政事务，下设六部；设枢密院负责全国的军政事务，调度全国的军队；设御史台负责监察事务；设宣政院管理全国宗教和西藏地区军政事务。",
            kws: { "中书省": { tb: "中书省是元朝中央最高行政机构，掌管全国行政事务。元朝中央官制大体继承宋金制度，中书省下设吏、户、礼、兵、刑、工六部。中书省长官为中书令，通常由皇太子担任，实际政务由左右丞相负责。元朝还设枢密院掌军事、御史台掌监察、宣政院掌宗教和西藏事务。元朝中央官制对后世产生了重要影响，明清时期的六部制度即源于此。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第二单元学情调研</span></div><div class='exam-body'><div class='exam-q'>元朝的版图是我国历史上最大的。为了对辽阔的疆域进行有效的治理，元朝实行</div><div class='exam-options'><span class='opt'>A.分封制</span><span class='opt'>B.郡县制</span><span class='opt'>C.科举制</span><span class='opt'>D.行省制</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>D.行省制</span></div></div></div>"},
              "宣政院": { tb: "宣政院是元朝设立的中央机构，负责管理全国佛教事务和西藏地区的军政事务。这是中央政府首次设立专门的机构管理西藏地区。宣政院的设置标志着西藏正式纳入中央政府的直接管辖之下。宣政院下设三道宣慰司，在西藏地区驻军、征收赋税、任命官员、审理案件，对西藏进行有效治理。元朝还在西藏设立驿站，加强与内地的联系。宣政院的设立体现了元朝对西藏行使完全的主权管辖，为后世中央政府治理西藏提供了先例。" } }
          , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第二单元学情调研</span></div><div class='exam-body'><div class='exam-q'>元朝为加强对西藏地区的管辖采取的措施是</div><div class='exam-options'><span class='opt'>A.设置宣慰使司都元帅府</span><span class='opt'>B.平定大、小和卓叛乱</span><span class='opt'>C.设置西域都护府</span><span class='opt'>D.册封南诏首领为云南王</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A.设置宣慰使司都元帅府</span></div></div></div>"},
          { num: 6, text: "元朝在地方设行中书省，简称\"行省\"。行省是中书省临时派出处理地方事务的机构，后转变为常设的地方最高行政机构。行省制度的创立，是我国古代地方行政制度的重大改革，成为我国省制的开端。",
            kws: { "行省制度": { tb: "行省制度是元朝创立的地方行政制度。元朝在中央设中书省，在地方设行中书省（简称\"行省\"），作为中央派出机构管理地方事务。最初行省是临时机构，后逐渐演变为常设的、固定的地方最高行政机构。元朝在全国设立了10个行省：岭北、辽阳、河南江北、陕西、四川、甘肃、云南、江浙、江西、湖广。行省以下设路、府、州、县。行省制度的意义在于：加强了中央对地方的控制，提高了行政效率，是秦汉以来郡县制度的一次重大发展。行省制度被明清两朝继承并完善，奠定了今天中国省制的基础。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024延庆期末</span></div><div <div class='exam-options'><span class='opt'>A.禅让制</span><span class='opt'>B.世袭制</span><span class='opt'>C.宗法制</span><span class='opt'>D.行省制</span></div><div class='exam-body'><div class='exam-q'>某同学梳理北京历史沿革（西周燕国→秦郡县→元隶属于中书省），与元朝相对应的制度是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>D. 行省制</span></div></div></div>" } }
          },
          { num: 7, text: "元朝统治者在边疆地区采取因地制宜的方式加强统治。东南地区，在澎湖设置巡检司，这是历史上中央政府首次在台湾地区正式建立行政机构；西北地区，设置北庭都元帅府等机构，管理西域军政事务；西藏地区，设立宣慰使司都元帅府，屯驻军队。从此，中央政府对西藏正式行使行政管辖。",
            kws: { "澎湖巡检司": { tb: "澎湖巡检司是元朝在澎湖群岛设立的地方行政机构，隶属于福建行省。这是历史上中央政府首次在台湾及澎湖地区正式建立行政机构，标志着台湾地区正式纳入中国版图。巡检司主要负责管理当地居民、征收赋税、维持治安。这一建制被明清两朝延续，证明了台湾自古以来就是中国领土不可分割的一部分。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2025四中期中</span></div><div <div class='exam-options'><span class='opt'>A.西域都护</span><span class='opt'>B.宣政院</span><span class='opt'>C.北庭都元帅府</span><span class='opt'>D.澎湖巡检司</span></div><div class='exam-body'><div class='exam-q'>中央政府首次在台湾地区正式建立的行政机构是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>D. 澎湖巡检司</span></div></div></div>" } }
          },
          { num: 8, text: "元朝的统治深受中原文化的影响，各族以中原文化为主的文化认同趋向加强。这一时期形成新的民族——回回，它是我国回族的前身。",
            kws: { "回族的形成": { tb: "回族是元朝时期形成的新民族。随着蒙古西征，大量中亚、西亚的穆斯林（包括波斯人、阿拉伯人、突厥人等）来到中国，他们被称为\"回回人\"。这些穆斯林与当地的汉、蒙古、维吾尔等民族长期通婚、共同生活，逐渐形成了一个新的民族——回族。回国人擅长商业活动，在元朝社会中具有重要地位，许多人在中央和地方政府中担任要职，如著名政治家赛典赤·赡思丁曾任云南行省平章政事。回族形成是元朝民族融合的典型例证。" } }
          }
        ]

      {
        id: "kaodian-15",
        title: "考点15 · 辽宋夏金元时期(三)",
        points: [
          { num: 1, text: "两宋时期，南方的水稻种植面积迅速增加，由越南传入的占城稻，成熟早，北宋时推广到东南地区。宋朝时，水稻产量跃居粮食作物首位。当时，长江下游和太湖流域一带成为丰饶的粮仓，出现了\"苏湖熟，天下足\"\"苏常熟，天下足\"的谚语。",
            kws: { "占城稻": { tb: "占城稻是宋代从越南占城（今越南中部）传入的优良水稻品种。占城稻的特点是耐旱、早熟、生长期短（从插秧到收获约需50多天），一年可以两熟甚至三熟。北宋真宗时期，朝廷派人从福建取回占城稻种，在江淮地区推广种植。占城稻的推广极大地提高了粮食产量，使南方地区能够养活更多人口，推动了南方经济的发展和人口的增长。" } }
          , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第二单元学情调研</span></div><div class='exam-body'><div class='exam-q'>研读下面两则文献材料：材料一：楚越之地，地广人希，饭稻羹鱼，或火耕而水耨……无积聚而多贫。——《史记》材料二：苏湖熟，天下足。——南宋谚语。可以得出的结论是</div><div class='exam-options'><span class='opt'>A.南宋都城临安是南方政治中心</span><span class='opt'>B.南宋时期经济重心南移已经完成</span><span class='opt'>C.南宋时期江南人口大量增加</span><span class='opt'>D.南宋时期江南一直比较富庶</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B.南宋时期经济重心南移已经完成</span></div></div></div>"},
          { num: 2, text: "元朝建立初期，为了便利南粮北运，忽必烈令人开凿会通河与通惠河，与原有运河连通，使粮船可以从杭州直通大都；还开辟了规模空前的海运航线。",
            kws: { "会通河与通惠河": { tb: "会通河和通惠河是元朝为连通南北大运河而开凿的关键河段。元朝定都大都（今北京），但经济重心在南方，需要将南方的粮食和物资大量北运。原有的大运河在宋金对峙时期已经部分淤塞。忽必烈下令开凿会通河（山东东平至临清，1289年完工），沟通了原来的永济渠和泗水航道；开凿通惠河（大都至通州，1293年完工），连接了京杭大运河。加上原有的运河河段，使粮船可以从杭州直达大都，形成了京杭大运河的完整航线。元朝还发展了海运，从长江口的刘家港出发，经海路直达直沽（今天津），运输效率更高。" } }
          , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第二单元学情调研</span></div><div class='exam-body'><div class='exam-q'>下表是隋元两代大运河的开凿情况。据表可知，大运河的开凿</div><div class='exam-options'><span class='opt'>A.巩固了南方经济重心地位</span><span class='opt'>B.促进了中原地区经济重心的形成</span><span class='opt'>C.反映古代政治中心的变化</span><span class='opt'>D.体现出农耕文明外向型发展特征</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C.反映古代政治中心的变化</span></div></div></div>"},
          { num: 3, text: "北宋前期，四川地区出现\"交子\"，这是世界上最早的纸币。元朝时纸币在全国范围内作为主币发行。南宋时期我国古代经济重心南移完成。",
            kws: { "交子": { tb: "交子是北宋前期在四川地区出现的世界上最早的纸币。四川地区使用铁钱，铁钱体重值小（买一匹布需要用铁钱两万枚，重达100多斤），携带使用极为不便。一些商人开始发行一种纸质凭证——\"交子\"，作为存款和取款凭证。后来，北宋政府于1023年在成都设立\"益州交子务\"，正式发行官交子，成为国家发行的纸币。交子的出现是商品经济发展的结果，也是货币史上的重大革命。南宋时期继续发行纸币。元朝则将纸币在全国范围内作为主币发行，并建立了比较完善的纸币管理制度。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024二中期中</span></div><div <div class='exam-options'><span class='opt'>A.①③</span><span class='opt'>B.①④</span><span class='opt'>C.②③</span><span class='opt'>D.②④</span></div><div class='exam-body'><div class='exam-q'>观察图示（秦半两、汉五铢、唐开元通宝、?纸币拓片），对其分析正确的是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B. ①④（①纸币最早出现于北宋时期 ④纸币的出现反映了当时商业贸易繁荣）</span></div></div></div>" },
              "经济重心南移": { tb: "经济重心南移是中国古代经济发展的重要趋势。从西晋末年到南宋，北方战乱频繁（八王之乱、永嘉之乱、安史之乱、靖康之变），大量北方人口南迁，带来了先进的生产技术和充足的劳动力。南方相对和平稳定，自然条件优越（气候温暖湿润、河网密布），农业生产效率高。到南宋时期，南方在经济总量、人口数量、农业产量、商业繁荣程度等方面已经全面超越北方，经济重心南移最终完成。\"苏湖熟，天下足\"的谚语就是这一变化的最好写照。经济重心南移对中国历史的格局产生了深远影响。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024十二中期中</span></div><div <div class='exam-options'><span class='opt'>A.政治中心东移</span><span class='opt'>B.商业繁荣</span><span class='opt'>C.社会生活丰富</span><span class='opt'>D.经济重心南移</span></div><div class='exam-body'><div class='exam-q'>《宋史》记载：“国家根本，仰给东南”，民间谚语称“苏湖熟，天下足”。两者共同反映了</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>D. 经济重心的南移</span></div></div></div>" } }
          }
        ]
      },
      {
        id: "kaodian-16",
        title: "考点16 · 辽宋夏金元时期(四)",
        points: [
          { num: 1, text: "辽宋夏金时期，刻书很盛行，雕版印刷技术进一步发展。宋代的印刷技术有了新突破，北宋匠人毕昇发明了活字印刷术。他用胶泥刻字，用火烧制，制成泥活字。后来，能工巧匠又发明了木活字。元代科学家王祯对木活字技术做了系统总结并创新。",
            kws: { "活字印刷术": { tb: "活字印刷术是北宋庆历年间（1041年—1048年）毕昇发明的伟大技术。他使用胶泥制作单个汉字，用火烧制使其坚硬，排版时将这些活字排列在铁板上印刷。与雕版印刷相比，活字印刷的优势在于：活字可以重复使用，大大降低了印刷成本；排版灵活，修改方便。然而在宋代，由于汉字数量庞大（约数万个），活字印刷的推广受到一定限制，雕版印刷仍然是主流。毕昇的发明后由元代王祯在《农书》中进行了系统总结，王祯还发明了转轮排字盘，提高了排版效率。活字印刷术在13世纪传入朝鲜，后经丝绸之路传入欧洲，对世界文化传播产生了革命性影响。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024石景山期末</span></div><div <div class='exam-options'><span class='opt'>A.对作战方式产生了巨大影响</span><span class='opt'>B.推动了文化的传播和发展</span><span class='opt'>C.促进了远洋航海技术的发展</span><span class='opt'>D.发展了中医学的治疗理论</span></div><div class='exam-body'><div class='exam-q'>沈括在《梦溪笔谈》中描述一项科技发明：“若止印三二本，未为简易；若印数十百千本，则极为神速”。这项科技发明</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B. 推动了文化的传播和发展</span></div></div></div>" } }
          },
          { num: 2, text: "北宋末年，中国的海船上开始使用指南针，后来经过阿拉伯地区传到了欧洲。",
            kws: { "指南针": { tb: "指南针是中国古代四大发明之一。先秦时期人们已经发现磁石具有指示南北的特性，制作了\"司南\"。宋代开始使用人工磁化制成的指南针，北宋沈括在《梦溪笔谈》中记载了多种指南针的制作方法。北宋末年，中国的航海船只开始使用指南针导航（《萍洲可谈》记载），这是世界上将指南针用于航海的最早记录。指南针的使用使航海不再依赖天文观测（星辰和太阳），可以在阴雨天气和远洋航行中准确辨别方向，极大地促进了航海技术的发展。指南针经阿拉伯商人传到欧洲，为后来的大航海时代提供了重要条件。" } ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第二单元学情调研•单选17</span></div><div <div class='exam-options'><span class='opt'>A.火药</span><span class='opt'>B.指南针</span><span class='opt'>C.印刷术</span><span class='opt'>D.造纸术</span></div><div class='exam-body'><div class='exam-q'>在航行方面对人类文明发展作出重要贡献的发明是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.指南针</span> <span class='exam-parse'>指南针应用于航海。</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选4</span></div><div class='exam-body'><div class='exam-q'>《萍洲可谈》记载\u2018舟师识地理,阴晦观指南针\u2019,表明</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.指南针是海上导航的重要手段</span></div></div></div>"}

          { num: 3, text: "唐朝时，中国人已经发明了火药。唐朝末年，火药开始运用到军事领域。宋元时期，火药更多地用于战争。火药在13世纪传入阿拉伯地区，14世纪初又经阿拉伯人传到欧洲。",
            kws: { "火药": { tb: "火药是中国古代四大发明之一。唐朝初年，炼丹家在炼丹过程中偶然发现了火药的配方（硫磺、硝石和木炭的混合物）。《真元妙道要略》（唐朝）记载了火药爆炸的现象。唐朝末年，火药开始用于军事（\"发机飞火\"）。北宋时期，设立了专门的火药作坊，制造火箭、火炮等武器。《武经总要》（1044年）中记载了三种火药的配方，是世界上最早的关于火药配方的书面记录。宋元时期，火药武器（火枪、火炮、火箭等）在战争中发挥越来越重要的作用。火药在13世纪通过蒙古西征传入阿拉伯地区，14世纪初又经阿拉伯人传到欧洲，彻底改变了世界战争的面貌。" } }
          },
          { num: 4, text: "北宋时期的科学家沈括，创制了先进的历法\"十二气历\"，著有《梦溪笔谈》一书。北宋科学家苏颂主持创制了水运仪象台，比欧洲同类天文仪器早了数百年。元朝科学家郭守敬，编成新的历法《授时历》，比现行公历的确立早约300年。",
            kws: { "沈括与《梦溪笔谈》": { tb: "沈括（1031年—1095年），北宋著名科学家、政治家。他博学多才，在天文、数学、物理、地理、地质、生物、医药、工程技术等多个领域都有重要贡献。他晚年所著的《梦溪笔谈》是一部综合性的科学著作，收录了他在各个领域的观察和研究成果。书中记载了毕昇发明活字印刷术、指南针的多种使用方法、石油的开采利用（他命名\"石油\"）、地磁偏角的发现等。书中还包含了他在数学（\"隙积术\"和\"会圆术\"）、天文学（提出\"十二气历\"）等方面的创见。《梦溪笔谈》被誉为\"中国科学史上的坐标\"。" },
              "郭守敬与《授时历》": { tb: "郭守敬（1231年—1316年），元代著名天文学家、数学家和水利学家。他主持编定的《授时历》于1281年颁行，确定一年为365.2425天，与现行公历（格里高利历）相同，但比公历的制定早了约300年。郭守敬还在全国各地设立了27个天文观测站，进行了大规模的天文测量，其观测精确度在当时世界领先。他创制和改进了简仪、仰仪、圭表等多种天文仪器。郭守敬的水利成就也很突出，曾主持开凿通惠河，解决了大都的漕运问题。" } }
          , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第二单元学情调研</span></div><div class='exam-body'><div class='exam-q'>举世闻名的四大发明中有三项完成于两宋时期，这三项发明指的是</div><div class='exam-options'><span class='opt'>A.雕版印刷术、司南、火药</span><span class='opt'>B.活字印刷术、指南针、火药</span><span class='opt'>C.造纸术、雕版印刷术、指南针</span><span class='opt'>D.造纸术、活字印刷术、火药</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B.活字印刷术、指南针、火药</span></div></div></div>"},
          { num: 5, text: "宋代杰出的词人有苏轼、李清照、辛弃疾等。南宋陆游是著名的爱国主义诗人。元朝最优秀的杂剧家是关汉卿，代表作是悲剧《窦娥冤》。",
            kws: { "苏轼": { tb: "苏轼（1037年—1101年），号东坡居士，北宋著名文学家、书画家。他是宋代文学最高成就的代表，在诗、词、文、书、画等方面都有极高造诣。苏轼开创了豪放派词风，代表作有《念奴娇·赤壁怀古》《水调歌头·明月几时有》等，突破了词为\"艳科\"的传统，将词的表现领域扩大到社会生活的各个方面。苏轼的散文与欧阳修并称\"欧苏\"，为\"唐宋八大家\"之一。他不仅在文学上成就卓著，在书法（\"宋四家\"之首）、绘画（擅长墨竹）等方面也是一代大家。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024海淀期末</span></div><div <div class='exam-options'><span class='opt'>A.唐朝开放的社会风气</span><span class='opt'>B.宋代丰富的市民生活</span><span class='opt'>C.宋代重文轻武的政策</span><span class='opt'>D.元朝发达的中外交通</span></div><div class='exam-body'><div class='exam-q'>《东京梦华录》记载：“大抵诸酒肆瓦市，不以风雨寒暑，白昼通夜，骈阗如此。”以上材料表现了</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B. 宋代丰富的市民生活</span></div></div></div>" },
              "李清照": { tb: "李清照（1084年—约1155年），号易安居士，宋代著名女词人。她是婉约派词人的代表，被誉为\"千古第一才女\"。李清照的词以南渡为界分为前后两期：前期词风清新婉丽，多写闺中生活和自然风光（如《如梦令》），反映了她早年优裕的生活；后期国破家亡、流离失所，词风转为凄苦沉郁（如《声声慢》中的\"寻寻觅觅，冷冷清清\"），表达了对家国沦丧的悲愤。她的词在艺术上达到了极高成就，语言优美，意境深远。" },
              "辛弃疾": { tb: "辛弃疾（1140年—1207年），南宋著名爱国词人，是继苏轼之后豪放派词风的又一代表人物。他出生时北方已经沦陷于金朝，少年时曾参加抗金义军。南渡后屡次上书北伐，但始终未能实现抱负。辛弃疾的词慷慨激昂，充满爱国热情和壮志难酬的悲愤，代表作有《永遇乐·京口北固亭怀古》《破阵子·为陈同甫赋壮词以寄之》《青玉案·元夕》等。他与苏轼并称\"苏辛\"，对后世词坛产生了深远影响。" },
              "关汉卿与《窦娥冤》": { tb: "关汉卿（约1234年—约1300年），元代最著名的杂剧作家，\"元曲四大家\"之首。他一生创作了60多种杂剧，现存18种。其代表作《窦娥冤》是中国古典悲剧的典范作品。该剧讲述了一位叫窦娥的青年女子被冤枉判处死刑的故事：窦娥被无赖张驴儿诬陷毒死其父，在严刑拷打下被迫认罪，临刑前发下三桩誓言（血溅白练、六月飞雪、大旱三年），最后冤情感天动地，一一应验。该剧深刻揭露了元代社会的黑暗和腐败，歌颂了窦娥的反抗精神。《窦娥冤》\"感天动地\"的艺术力量和深刻的现实意义使其成为中国戏剧史上的不朽杰作。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024西城期末</span></div><div <div class='exam-options'><span class='opt'>A.《窦娥冤》</span><span class='opt'>B.《水浒传》</span><span class='opt'>C.《牡丹亭》</span><span class='opt'>D.《红楼梦》</span></div><div class='exam-body'><div class='exam-q'>史学家王国维说，关汉卿的某部作品是“最有悲剧之性质者”“即列之于世界大悲剧中，亦无愧色也”。这部作品是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A. 《窦娥冤》</span></div></div></div>" } }
          },
          { num: 6, text: "北宋史学家、政治家司马光主持编写的《资治通鉴》，是一部编年体的通史巨著，记述了从战国到五代共1300多年的历史。",
            kws: { "《资治通鉴》": { tb: "《资治通鉴》是北宋史学家司马光主持编写的一部编年体通史巨著。全书共294卷，约300万字，记述了从周威烈王二十三年（前403年）到五代后周世宗显德六年（959年）共1362年的历史。书名\"资治通鉴\"意为\"鉴于往事，有资于治道\"，即通过历史经验帮助统治者治理国家。《资治通鉴》在史实考订、叙事手法和历史评论方面都达到了很高水平，与司马迁的《史记》并称为\"史学双璧\"。司马光花费了19年时间才完成这部巨著，其助手刘恕、刘攽、范祖禹等也做出了重要贡献。" } ,

        points: [
          { num: 1, text: "1368年，朱元璋称帝，明朝建立，定都应天府。建文帝继位后采取\"削藩\"政策，明太祖之子燕王朱棣发动\"靖难之役\"，夺取帝位，他就是明成祖。",
            kws: { "明朝建立": { tb: "明朝（1368年—1644年）是由朱元璋建立的统一王朝。朱元璋（1328年—1398年）出身贫寒，17岁入皇觉寺为僧，后参加元末农民起义军，逐步成为红巾军领袖。1368年正月，朱元璋在应天府（今南京）称帝，国号大明，年号洪武。同年，明军攻占大都（今北京），元朝灭亡。朱元璋在位期间，推行休养生息政策，发展生产，轻徭薄赋，社会经济得到恢复和发展。他还严惩贪官污吏，整顿吏治，加强中央集权，奠定了明朝近300年的统治基础。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第三单元学情调研</span></div><div class='exam-body'><div class='exam-q'>明代科举考试只许在四书五经范围内命题，应考者不能自由发挥，答题必须分为八个部分，称为八股文。此举</div><div class='exam-options'><span class='opt'>A.提高了政府的办事效率</span><span class='opt'>B.有利于选拔有真才实学的人</span><span class='opt'>C.促进了文学艺术的发展</span><span class='opt'>D.严重禁锢知识分子的创新思维</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>D.严重禁锢知识分子的创新思维</span></div></div></div>"},
              "靖难之役": { tb: "靖难之役（1399年—1402年）是明朝初期的一场内战。明太祖朱元璋去世后，皇太孙朱允炆即位，是为建文帝。建文帝急于削藩，先后废除了周王、岷王、代王、齐王等藩王。驻守北平（今北京）的燕王朱棣（朱元璋第四子）以\"清君侧\"为名起兵反抗，史称\"靖难之役\"。经过四年战争，朱棣的军队攻入南京，建文帝在宫中自焚（一说逃亡民间）。朱棣夺取帝位，是为明成祖，年号永乐。靖难之役后，明成祖将都城从南京迁至北京，加强了对北方的控制。" } }
          },
          { num: 2, text: "为巩固统治，明太祖在政治上采取一系列措施，从中央到地方全面改革官制，以强化皇权。在中央，明太祖废除丞相，使六部直接向皇帝负责。将军队调动和武官任命的权力统归兵部。明太祖设立了由皇帝直接指挥的锦衣卫。后来，明成祖成立东厂，明宪宗成立西厂，合称\"厂卫\"。",
            kws: { "废除丞相": { tb: "废除丞相是明太祖朱元璋强化皇权的重要措施。1380年，朱元璋以谋反罪处死丞相胡惟庸，并以此为借口，下令永久废除丞相制度，由皇帝直接管理六部（吏、户、礼、兵、刑、工）政务。至此，延续了1500多年的丞相制度被废除，皇帝成为国家元首兼政府首脑，皇权达到空前的高度集中。为了处理庞杂的政务，明朝后来设立了内阁（明成祖时期），但其权力远不及前代的丞相。废除丞相是明清君主专制加强的重要标志。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024四中期未</span></div><div <div class='exam-options'><span class='opt'>A.实行分封制</span><span class='opt'>B.确立郡县制度</span><span class='opt'>C.设立锦衣卫</span><span class='opt'>D.实行垦荒政策</span></div><div class='exam-body'><div class='exam-q'>朱元璋要求以后子孙做皇帝时，“并不许立丞相。臣下敢有奏请设立者，文武群臣即时劾奏，处以重刑”。以下措施中与此作用相同的是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C. 设立锦衣卫</span></div></div></div>" },
              "锦衣卫": { tb: "锦衣卫是明朝皇帝直接指挥的特务机构，全称\"锦衣卫亲军指挥使司\"。1382年由明太祖朱元璋设立。锦衣卫原本是皇帝的仪仗和护卫部队，后演变为负责侦查、逮捕、审讯的政治特务机构，可以不经过司法程序直接逮捕和审讯官员。锦衣卫设有专门的监狱和法庭，权力极大。明成祖时又设立了东厂（1420年），宪宗时设立了西厂（1477年），合称\"厂卫\"。厂卫制度的出现反映了明朝君主专制的极端强化，也造成了恐怖的政治气氛，许多官员和学者因言获罪。" } }
          },
          { num: 3, text: "明朝科举考试的题目必须出自\"四书\"\"五经\"；考生对题目的解释，必须以朱熹的《四书章句集注》等为标准。考生答卷的形式被称为\"八股文\"。",
            kws: { "八股文": { tb: "八股文是明清时期科举考试规定的文章格式。文章由破题、承题、起讲、入手、起股、中股、后股、束股八部分组成，其中\"股\"的部分要求有两两对应的排比句，共八段，故称\"八股文\"。八股文的题目必须出自\"四书\"\"五经\"（儒家经典），内容阐释必须以朱熹的《四书章句集注》为标准，不能有个人发挥。八股文在早期对于规范考试内容、减少阅卷难度方面有一定积极作用，但后期成为束缚士人思想的桎梏。顾炎武曾批评\"八股之害等于焚书\"，认为八股文比秦始皇焚书坑儒的危害更大，因为它扼杀了读书人的独立思考能力和创造力。" } ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第三单元学情调研•单选20</span></div><div <div class='exam-options'><span class='opt'>A.提高了政府的办事效率</span><span class='opt'>B.有利于选拔有真才实学的人</span><span class='opt'>C.促进了文学艺术的发展</span><span class='opt'>D.严重禁锢知识分子的创新思维</span></div><div class='exam-body'><div class='exam-q'>明朝科举以八股文为程式,此举</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>D.严重禁锢知识分子的创新思维</span></div></div></div>"}
          },
          { num: 4, text: "明成祖派郑和率领船队出使西洋，提高了明朝在国际上的地位和威望。",
            kws: { "郑和下西洋": { tb: "郑和下西洋是明朝永乐年间（1405年—1433年）的一次大规模远洋航行活动。郑和（原名马和）是回族宦官，被明成祖赐姓郑。他率领世界上最庞大的船队，先后七次出使西洋（今东南亚、南亚、中东和东非地区），访问了30多个国家和地区。船队规模最大时，有船只200多艘，船员27000多人，最大的宝船长约150米，宽约60米，是当时世界上最大的木制帆船。郑和的航行比哥伦布发现美洲（1492年）早近90年，比达·伽马绕过好望角早近100年。郑和七下西洋促进了中国与亚非各国的经济文化交流，打通了海上丝绸之路，提高了明朝的国际声誉。但明成祖去世后，朝中保守派认为耗费巨大、得不偿失，停止了远洋活动，相关航海资料也被销毁。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2025西城期末</span></div><div class='exam-options'><span class='opt'>A.张骞出使西域</span><span class='opt'>B.鉴真东渡日本</span><span class='opt'>C.唐与大食交往</span><span class='opt'>D.郑和下西洋</span></div><div class='exam-body'><div class='exam-q'>下侧路线图（航海路线，涉及印度洋、东南亚、非洲东海岸等地）描绘的历史事件是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>D. 郑和下西洋</span></div></div></div>" } }
          },
          { num: 5, text: "明朝派戚继光到东南沿海抗倭，他统领的军队被誉为\"戚家军\"。1561年，他率军在台州九战九捷，平定了浙东地区的倭患。他领导的抗倭战争是一场反侵略的战争，他是我国历史上的民族英雄。",
            kws: { "戚继光抗倭": { tb: "戚继光（1528年—1588年），明朝抗倭名将、民族英雄。明朝中期，日本进入\"战国时代\"，许多失败的武士流亡海上，勾结中国沿海的走私商人和海盗，组成武装集团，在东南沿海烧杀抢掠，史称\"倭寇\"。戚继光被派往浙江抗倭，他招募当地农民和矿工，训练了一支纪律严明、战斗力强的军队，人称\"戚家军\"。戚继光针对倭寇的战术特点，创制了\"鸳鸯阵\"等阵法，使戚家军在战斗中屡战屡胜。1561年，戚继光在台州（今浙江临海）九战九捷，基本扫平了浙东的倭患。此后又转战福建、广东，终于彻底平息了东南沿海的倭寇之患。戚继光的抗倭斗争是一场正义的反侵略战争，保卫了东南沿海人民的生命财产安全。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024石景山期末</span></div><div <div class='exam-options'><span class='opt'>A.成吉思汗</span><span class='opt'>B.文天祥</span><span class='opt'>C.戚继光</span><span class='opt'>D.郑成功</span></div><div class='exam-body'><div class='exam-q'>“一片丹心风浪里，心怀击楫敢忘忧！”“封侯非我意，但愿海波平”这是明朝一位抗倭名将的豪迈诗句。他是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>C. 戚继光</span></div></div></div>" } }
          },
          { num: 6, text: "万历初年，张居正在清丈田亩的基础上，将旧赋及其他杂税合并，计入田亩，用银两收税，称为\"一条鞭法\"。",
            kws: { "一条鞭法": { tb: "一条鞭法是明朝万历年间（1581年）张居正推行的赋税制度改革。其核心内容是：将原来的田赋、徭役、杂税等合并为一，统一按田亩征收银两。这一改革简化了赋税征收程序，减少了中间环节的贪腐，在一定程度上减轻了百姓负担；同时，以银两征税促进了商品经济的发展，白银成为主要流通货币。一条鞭法是唐代两税法之后中国赋税制度的又一次重大改革，为清朝的\"摊丁入亩\"制度奠定了基础。但改革在执行过程中也遇到了地方势力的阻挠，张居正去世后改革效果受到影响。" } }
          }
        ]
      },
      {
        id: "kaodian-18",
        title: "考点18 · 明清时期(二)",
        points: [
          { num: 1, text: "明朝末年，政治腐败越发严重，国家财政危机深重，朝廷不断加派赋税，民众不堪重负，怨声载道，阶级矛盾异常尖锐。广大农民纷纷起义，李自成起义提出\"均田免粮\"的口号，得到广大农民的热烈拥护。1644年，其在西安建立政权，国号大顺。接着，起义军攻进北京城内，崇祯帝自缢，明朝灭亡。",
            kws: { "李自成起义": { tb: "李自成（1606年—1645年），明末农民起义领袖。明朝末年，政治腐败，天灾不断（小冰河期导致大面积旱灾和蝗灾），朝廷加派\"三饷\"（辽饷、剿饷、练饷），农民生活极端困苦。李自成出身陕西驿卒（驿站工作人员），因失业而参加农民起义军。他提出\"均田免粮\"的口号，深得贫苦农民拥护。李自成的军队发展迅速，号称百万。1644年正月，李自成在西安建立\"大顺\"政权。同年3月，大顺军攻入北京，明崇祯帝朱由检在煤山（今景山）自缢身亡，明朝灭亡。但李自成的政权未能稳定局势，大顺军进京后纪律松弛，拷掠明朝官员追赃。不久，驻守山海关的明将吴三桂引清军入关，大顺军战败，李自成撤离北京，1645年在湖北九宫山被杀。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024西城期末</span></div><div <div class='exam-options'><span class='opt'>A.李自成起义军提出“均田免赋”</span><span class='opt'>B.明朝引进了高产作物</span><span class='opt'>C.明朝当时是世界上最强大的国家</span><span class='opt'>D.郑成功在明末收复了台湾</span></div><div class='exam-body'><div class='exam-q'>“杀牛羊，备酒浆，开了城门迎闯王，闯王来时不纳粮。”这些歌谣得以流传的背景是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A. 李自成起义军提出“均田免赋”</span></div></div></div>" } }
          },
          { num: 2, text: "明朝灭亡后，正当李自成力图推进全国统一的时候，驻守山海关的明军将领吴三桂降清，引清军入关，并与清军联合打败李自成的军队。1644年，清朝统治者进入北京，逐步建立起对全国的统治。",
            kws: { "清军入关": { tb: "清军入关是1644年清朝军队在明朝将领吴三桂的引导下进入山海关、进而占领北京并建立全国统治的历史事件。1644年春，李自成的大顺军攻占北京，明朝灭亡。此时，清朝的摄政王多尔衮率大军正驻守在山海关外。镇守山海关的明朝总兵吴三桂面临两难选择：投降李自成还是对抗大顺。李自成进京后拷掠明朝官员，吴三桂的父亲也遭拷掠，吴三桂一怒之下决定降清。他打开山海关大门，清军与吴三桂的军队联合，在\"一片石\"战役中击败李自成的军队。1644年10月，顺治帝从沈阳迁都北京，清朝正式定鼎中原，逐步建立了对全国的统治。清军入关过程中发生了\"扬州十日\"\"嘉定三屠\"等惨剧，但最终清朝完成了全国统一。" } }
          },
          { num: 3, text: "1662年，民族英雄郑成功从荷兰殖民者手中收复台湾。1684年，清朝设置台湾府，隶属福建省，加强了中央政府对台湾的管辖。",
            kws: { "郑成功收复台湾": { tb: "郑成功（1624年—1662年），明末清初的民族英雄。清军入关后，郑成功以福建厦门为基地，坚持抗清斗争。为了寻找稳固的后方基地，郑成功率军于1661年横渡台湾海峡，进攻被荷兰殖民者占据的台湾。荷兰殖民者自1624年占领台湾南部（筑热兰遮城），统治台湾达38年。郑成功的军队经过9个月的围城战斗，于1662年2月迫使荷兰总督揆一投降，台湾回归祖国怀抱。郑成功在台湾设立行政机构，推行屯田制度，发展农业生产，传播中华文化。可惜他收复台湾仅几个月后即病逝，年仅39岁。郑成功从荷兰殖民者手中收复台湾的斗争是中华民族反抗外来侵略的伟大胜利，他作为民族英雄被后人永远铭记。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 阶段学情调研</span></div><div class='exam-body'><div class='exam-q'>出现在抗击外来侵略英雄谱系中的是</div><div class='exam-options'><span class='opt'>A.岳飞</span><span class='opt'>B.郑成功</span><span class='opt'>C.郑和</span><span class='opt'>D.文天祥</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B.郑成功</span></div></div></div>"},
              "台湾府设置": { tb: "1683年，清朝派施琅率水师攻占台湾，郑成功的孙子郑克塽投降。1684年，清朝康熙皇帝决定在台湾设立台湾府，下辖台湾、凤山、诸罗三县，隶属福建省。这是台湾在明朝末年被荷兰殖民者占领和在郑氏政权统治后，重新纳入中央政府行政管辖体系。台湾府的设置标志着清朝中央政府开始对台湾行使直接管辖权，有力地加强了台湾与祖国大陆的联系，促进了台湾地区的经济开发和文化发展。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第三单元学情调研</span></div><div class='exam-body'><div class='exam-q'>中央政府首次在台湾地区正式建立的行政机构是</div><div class='exam-options'><span class='opt'>A.西域都护</span><span class='opt'>B.宣政院</span><span class='opt'>C.北庭都元帅府</span><span class='opt'>D.澎湖巡检司</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>D.澎湖巡检司</span></div></div></div>"} ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选20</span></div><div <div class='exam-options'><span class='opt'>A.岳飞</span><span class='opt'>B.郑成功</span><span class='opt'>C.郑和</span><span class='opt'>D.文天祥</span></div><div class='exam-body'><div class='exam-q'>出现在\u2018抗击外来侵略英雄谱系\u2019中的是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>B.郑成功</span></div></div></div>"}
          },
          { num: 4, text: "康熙皇帝三次率军亲征，打败噶尔丹。乾隆时期，清军最终平定了准噶尔部。乾隆时期平定了大、小和卓分裂祖国的叛乱。1762年，清朝设置伊犁将军，管辖整个新疆地区军政事务。1689年，中俄双方代表在尼布楚签订第一个边界条约《尼布楚条约》。",
            kws: { "康熙三征噶尔丹": { tb: "康熙三征噶尔丹是清朝康熙皇帝为维护国家统一、平定准噶尔部首领噶尔丹叛乱的重要军事行动。噶尔丹是漠西蒙古准噶尔部的首领，他统一了漠西蒙古各部后，势力不断扩张，控制了天山南北和青藏高原部分地区，并在沙俄的支持下向东进攻漠北蒙古（喀尔喀蒙古）。康熙皇帝为保护喀尔喀蒙古和维护北部边疆安全，于1690年、1696年、1697年三次御驾亲征。在1696年的昭莫多之战中，清军大败噶尔丹主力。1697年，噶尔丹在逃亡中病死。康熙三征噶尔丹维护了国家的统一和北部边疆的稳定。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第三单元学情调研</span></div><div class='exam-body'><div class='exam-q'>一位同学搜集了《清军平定大、小和卓叛乱图》《新疆伊犁将军府》图片，他研究的主题是</div><div class='exam-options'><span class='opt'>A.清朝巩固西北边疆</span><span class='opt'>B.康熙抗击沙俄侵略</span><span class='opt'>C.清朝在台湾的行政建制</span><span class='opt'>D.土尔扈特部回归祖国</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A.清朝巩固西北边疆</span></div></div></div>"},
              "《尼布楚条约》": { tb: "《尼布楚条约》是1689年中俄两国在尼布楚（今俄罗斯涅尔琴斯克）签订的第一个边界条约。17世纪中叶，沙俄不断向东扩张，侵入黑龙江流域。清朝康熙皇帝在平定三藩之乱后，派军于1685年和1686年两次围攻沙俄占据的雅克萨城，击败俄军。在军事胜利的基础上，中俄两国在尼布楚进行谈判。1689年9月7日，双方签订《尼布楚条约》，规定：中俄以额尔古纳河、格尔必齐河和外兴安岭为界，黑龙江以北、外兴安岭以南的土地属于中国。该条约在法律上明确了中俄东部边界，维护了中国的主权和领土完整。条约还规定了两国贸易往来的事宜。这是中国与西方国家签订的第一个平等条约。" ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选13</span></div><div <div class='exam-options'><span class='opt'>A.戚继光抗倭</span><span class='opt'>B.郑成功收复台湾</span><span class='opt'>C.雅克萨之战</span><span class='opt'>D.土尔扈特部回归</span></div><div class='exam-body'><div class='exam-q'>中俄签订《尼布楚条约》之前的自卫战争是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>C.雅克萨之战</span></div></div></div>"},
              "伊犁将军": { tb: "伊犁将军是清朝在新疆地区设置的最高军政长官。1759年（乾隆二十四年），清朝平定准噶尔部和大、小和卓叛乱后，统一了新疆地区。1762年，清朝正式设置\"总统伊犁等处将军\"（简称伊犁将军），驻伊犁惠远城（今新疆霍城），管辖整个新疆地区的军政事务。伊犁将军下设参赞大臣、办事大臣等官员，管理各地军政事务。清朝的管辖措施包括：屯田戍边、兴修水利、发展贸易、驻军防守等。伊犁将军的设置有力地巩固了西北边疆，维护了国家统一。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024石景山期末</span></div><div <div class='exam-options'><span class='opt'>A.清朝巩固西北边疆</span><span class='opt'>B.康熙抗击沙俄侵略</span><span class='opt'>C.清朝在台湾的行政建制</span><span class='opt'>D.土尔扈特部回归祖国</span></div><div class='exam-body'><div class='exam-q'>一位同学搜集了《清军平定大、小和卓叛乱图》《新疆伊犁将军府》图片，他研究的主题是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A. 清朝巩固西北边疆</span></div></div></div>" } }
          },
          { num: 5, text: "康熙皇帝设立南书房。雍正年间，设立军机处，军政大事完全由皇帝裁决。康熙时期，部分官员向皇帝秘密呈送报告，经皇帝亲手批阅后返回，形成了奏折制度。康熙、雍正和乾隆三朝，从思想领域严密控制士人，大兴\"文字狱\"。",
            kws: { "军机处": { tb: "军机处是清朝雍正年间（1729年）设立的中央军事和政务机构，初名\"军机房\"，后改称军机处。军机处直接对皇帝负责，处理军政大事，拟写皇帝旨意，参与国家重大决策。军机大臣由皇帝从大学士、尚书、侍郎中选派亲信担任。军机处实际上取代了内阁的大部分职能，成为清朝事实上的最高权力机构。军机处的设置使军政大权完全集中于皇帝一人手中，标志着清朝君主专制达到了顶峰。军机处一直延续到1911年清朝灭亡前夕才被废除。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024海淀期末</span></div><div <div class='exam-options'><span class='opt'>A.禁锢了人们的思想言论</span><span class='opt'>B.限制了海外贸易</span><span class='opt'>C.降低了机构的效率</span><span class='opt'>D.强化了君主专制</span></div><div class='exam-body'><div class='exam-q'>清代史学家赵翼在《檐曝杂记》中说：“（军机大臣）供传述缮撰，而不能稍有赞画于其间也。”这说明该机构的设置</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>D. 强化了君主专制</span></div></div></div>" },
              "文字狱": { tb: "文字狱是清朝康熙、雍正、乾隆三朝为加强思想控制而制造的一批因文字作品获罪的案件。统治者从文人学者的诗文中摘取片言只语，罗织罪名，进行残酷迫害。著名的文字狱案例包括：康熙朝的\"明史案\"（庄廷鑨刊刻《明史》被指诽谤清朝，株连数百人）、雍正朝的\"吕留良案\"（吕留良著作被认为有反清思想，被开棺戮尸，株连家族）、乾隆朝的\"胡中藻案\"（因诗中\"一把心肠论浊清\"被认为侮辱清朝，被处死）。文字狱的高压政策严重禁锢了知识分子的思想，使文人不敢讨论现实政治，学术研究转向脱离现实的考据学（乾嘉学派）。文字狱是清朝文化专制主义的集中体现，对社会进步和思想解放产生了严重的阻碍作用。" } }
          },
          { num: 6, text: "顺治时期，颁布\"禁海令\"，严厉限制海上贸易。1757年，只开放广州一处对外通商。这种闭关自守的政策，无法适应新的外部环境，导致当时的中国逐渐落后于世界潮流。",
            kws: { "闭关锁国": { tb: "闭关锁国是清朝严格限制对外交往和贸易的政策。清初为了对付郑成功等抗清势力，顺治年间颁布\"禁海令\"，规定\"片帆不准入海\"，严厉限制海上贸易。康熙收复台湾后一度开放海禁，但后来因担心西方势力威胁，重新加强限制。1757年，乾隆皇帝下令只开放广州一地为对外通商口岸，由广州十三行负责统一管理对外贸易。闭关锁国政策在短期内维护了国家安全和社会稳定，但从长远来看，它使中国隔绝于世界发展的大潮之外：当西方国家正在进行工业革命、科学技术飞速发展的时候，中国却固步自封、闭目塞听。闭关政策导致中国在军事、科技、经济等方面逐渐落后于西方，为近代鸦片战争的失败埋下了伏笔。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024四中期中</span></div><div <div class='exam-options'><span class='opt'>A.闭关锁国</span><span class='opt'>B.开放海禁</span><span class='opt'>C.轻徭薄赋</span><span class='opt'>D.重农抑商</span></div><div class='exam-body'><div class='exam-q'>自清中叶开始，清朝在海上只有广州一口对外通商……对外商的活动和进出口货物的数量进行限制。由此可见，清朝实行的政策是</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A. 闭关锁国</span></div></div></div>" } }
          }
        ]
      },
      {
        id: "kaodian-19",
        title: "考点19 · 明清时期(三)",
        points: [
          { num: 1, text: "明朝时期，美洲作物的传入带来了原产于美洲的玉米、甘薯、花生等作物。清朝继续改进种植技术，改良新品种，使粮食产量大幅度提高。经济作物的种植面积不断扩大，农产品商品化程度进一步加深。明朝时，松江是棉纺织业中心，苏州是丝织业中心，景德镇是制瓷中心。清朝已出现了比较成熟的手工工场。",
            kws: { "美洲作物的传入": { tb: "美洲作物的传入是明清时期农业发展的重要事件。1492年哥伦布发现美洲后，原产于美洲的玉米、甘薯、马铃薯、花生、烟草、番茄、辣椒等作物通过海上贸易传入中国。明朝中后期，这些作物开始在东南沿海种植，清朝时推广到全国各地。玉米和甘薯具有耐旱、耐贫瘠、产量高的特点，在山地、旱地也能种植，极大地拓展了耕地范围，提高了粮食产量，对养活快速增长的人口起到了关键作用。美洲作物的传入被视为中国农业史上的第二次革命（第一次是唐宋时期占城稻的传入）。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 第三单元学情调研</span></div><div class='exam-body'><div class='exam-q'>明清时期大为繁荣的小说、戏剧竞相以普通人丰富多彩的生活以及他们的情感、追求作为题材。这主要是由于</div><div class='exam-options'><span class='opt'>A.文化专制政策</span><span class='opt'>B.市民阶层的壮大</span><span class='opt'>C.对外贸易受阻</span><span class='opt'>D.巩固统治的需要</span></div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B.市民阶层的壮大</span></div></div></div>"},
              "手工工场": { tb: "手工工场是资本主义萌芽的产物。清朝时期，在纺织、陶瓷、冶铁等行业中出现了比较成熟的手工工场。手工工场的特点：规模较大（几十人甚至上百人）；分工明确（如纺织业中纺纱、织布、染整等工序分别由不同工人完成）；雇佣关系（工人出卖劳动力领取工资，不再是家庭作坊的帮工）。江南地区的丝织业和棉纺织业中手工工场最为发达。手工工场的出现标志着资本主义萌芽的产生，但由于封建制度的压制和闭关政策的限制，这种萌芽发展缓慢，始终未能突破封建生产关系的束缚。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2025房山期末</span></div><div <div class='exam-options'><span class='opt'>A.①②③</span><span class='opt'>B.①②④</span><span class='opt'>C.①③④</span><span class='opt'>D.②③④</span></div><div class='exam-body'><div class='exam-q'>以下史料可用于研究明清时期经济发展状况的有：①洪武丈量鱼鳞图 ②清朝《黄河筑堤图》③张择端《清明上河图》④清朝《耕织图·耕》</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>B. ①②④</span></div></div></div>" } }
          },
          { num: 2, text: "明朝医药学家李时珍编写的《本草纲目》，在世界医药史上占有重要地位。明朝科学家徐光启所著的《农政全书》是一部重要的农业科学巨著。宋应星编著的《天工开物》，被誉为\"中国17世纪的工艺百科全书\"。",
            kws: { "《本草纲目》": { tb: "《本草纲目》是明代医药学家李时珍（1518年—1593年）历时27年编著的药物学巨著。全书52卷，约190万字，收录药物1892种（其中新增药物374种），附方11096个，附图1160幅。李时珍亲自到各地采药、搜集民间验方，考证历代本草著作，纠正了前人的许多错误。《本草纲目》对药物的分类科学系统，分为16部、60类，对每种药物详细记载其名称、形态、产地、采集、炮制、性味、功效和主治病症等。该书被翻译成多种文字，在世界范围内广泛流传，被誉为\"东方医学巨典\"，对世界医药学的发展做出了重要贡献。" , exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>📝 2024西城期末</span></div><div <div class='exam-options'><span class='opt'>A.科技的特点</span><span class='opt'>B.文学繁荣</span><span class='opt'>C.商帮出现</span><span class='opt'>D.皇权强化</span></div><div class='exam-body'><div class='exam-q'>有同学记下了“李时珍编写《本草纲目》”“17世纪工艺百科全书《天工开物》”“徐光启编写《农政全书》”等内容，从中可推断他学习的内容是明朝</div><div class='exam-a'><span class='label'>答案：</span><span class='a-text'>A. 科技的特点</span></div></div></div>" },
              "《天工开物》": { tb: "《天工开物》是明代科学家宋应星（1587年—约1666年）编著的综合性科技著作。全书共18卷，系统地记述了明朝农业和手工业的生产技术和经验，涵盖了农业、纺织、制盐、制糖、陶瓷、冶铸、采矿、造纸、兵器制造等30多个行业。书中配有123幅插图，生动地展示了当时的生产场景和技术设备。《天工开物》详细记载了各种生产工具的制作工艺和使用方法，保留了大量珍贵的科技史料。宋应星在书中强调\"穷究试验\"的科学态度，注重实践和观察。该书传到西方后，被翻译成多国文字，被誉为\"中国17世纪的工艺百科全书\"，对世界科技史研究具有重要价值。" ,
          exam: "<div class='exam-card'><div class='exam-header'><span class='exam-source'>第三单元学情调研•单选23</span></div><div <div class='exam-options'><span class='opt'>A.《天工开物》</span><span class='opt'>B.《农政全书》</span><span class='opt'>C.《千金方》</span><span class='opt'>D.《几何原本》</span></div><div class='exam-body'><div class='exam-q'>附有风车、纺缕图、造缸插图的明朝科技巨著是</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.《天工开物》</span></div></div></div><div class='exam-card'><div class='exam-header'><span class='exam-source'>阶段学情调研•单选7</span></div><div class='exam-body'><div class='exam-q'>宋应星把谷物类放在《天工开物》前面,体现了</div><div class='exam-a'><span class='exam-a-label'>答案：</span><span class='a-text'>A.重农和民本思想</span></div></div></div>"},
              "《农政全书》": { tb: "《农政全书》是明代科学家徐光启（1562年—1633年）编著的农业科学巨著。全书60卷，约50万字，分为农本、田制、农事、水利、农器、树艺、蚕桑、种植、牧养、制造、荒政等12类。徐光启在书中汇总了中国古代农业生产的丰富经验，同时介绍了西方的一些农业技术。他还特别关注水利建设和荒政（救灾措施），提出了许多切实可行的建议。《农政全书》是中国古代农业科学集大成之作，对后世农业生产产生了重要影响。" } }

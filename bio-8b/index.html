<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>七年级下册生物知识点</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F0F7F0;color:#2C3E50;font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;line-height:1.8;font-size:15px}
.container{max-width:1000px;margin:0 auto;padding:0 16px}

/* Header */
header{position:sticky;top:0;z-index:50;background:rgba(240,247,240,.97);backdrop-filter:blur(8px);border-bottom:2px solid #2E7D32;padding:12px 0}
header .container{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:20px;color:#2E7D32;display:flex;align-items:center;gap:8px}
header h1 .icon{width:32px;height:32px;border-radius:8px;background:#E8F5E9;display:flex;align-items:center;justify-content:center;font-size:16px}
.period-nav{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 0}
.period-btn{padding:6px 14px;border-radius:16px;border:1px solid #C8E6C9;font-size:12px;cursor:pointer;white-space:nowrap;background:#fff;color:#666;transition:all .2s}
.period-btn.active{background:#2E7D32;color:#fff;border-color:#2E7D32}
.period-btn:hover:not(.active){background:#E8F5E9}

/* Chapter Card */
.chapter{margin-bottom:40px;scroll-margin-top:130px}
.chapter-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px 16px;background:#fff;border-radius:12px;border-left:4px solid #2E7D32;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.chapter-num{width:36px;height:36px;border-radius:50%;background:#2E7D32;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.chapter-title{font-size:18px;font-weight:600;color:#2C3E50}
.chapter-subtitle{font-size:12px;color:#999;margin-top:-2px}

/* SVG diagram container */
.svg-diagram{margin:10px 0;background:#FAFDF8;border:1px solid #C8E6C9;border-radius:8px;padding:10px;text-align:center}
.svg-diagram svg{max-width:100%;height:auto}
.svg-caption{font-size:11px;color:#888;margin-top:4px}

/* Knowledge Point Card */
.kp-card{margin-bottom:12px;background:#fff;border-radius:10px;border:1px solid #C8E6C9;overflow:hidden;transition:box-shadow .2s}
.kp-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kp-header{padding:12px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;user-select:none}
.kp-num{min-width:22px;height:22px;border-radius:50%;background:#E8F5E9;color:#558B2F;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:3px}
.kp-text{flex:1;font-size:14px;line-height:1.7;color:#3D3D3D}
.kp-text .kw{color:#2E7D32;font-weight:600;border-bottom:2px solid rgba(46,125,50,.3);cursor:pointer;padding:0 2px;transition:all .15s}
.kp-text .kw:hover{background:rgba(46,125,50,.08)}
.kp-text .kw.active{background:rgba(46,125,50,.12)}

/* Expand Section */
.kp-detail{display:none;border-top:1px solid #E8F5E9;background:#F8FCF8}
.kp-detail.show{display:block}
.detail-tabs{display:flex;border-bottom:1px solid #C8E6C9}
.detail-tab{padding:8px 16px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:#888;transition:all .2s}
.detail-tab.active{color:#2E7D32;border-bottom-color:#2E7D32;font-weight:600}
.detail-body{padding:14px 16px;font-size:13px;line-height:1.8;color:#555}
.detail-body .tb{background:#F5FAF5;border-left:3px solid #2E7D32;padding:12px 16px;margin-bottom:12px;border-radius:0 8px 8px 0;font-size:13.5px;line-height:1.9;color:#2C3E50}
.detail-body .tb .hl-term{color:#2E7D32;font-weight:600}
.detail-body .tb .hl-year{color:#6A1B9A;font-weight:600}
.detail-body .tb .hl-person{color:#1565C0;font-weight:600}
.detail-body .tb .hl-process{color:#E65100;font-weight:600}
.detail-body .tb .sec-label{display:inline-flex;align-items:center;gap:4px;background:#C8E6C9;padding:1px 10px;border-radius:4px;font-size:11px;color:#2E7D32;font-weight:500;margin-right:4px}
.detail-body .tb p{margin-bottom:8px}
.detail-body .tb p:last-child{margin-bottom:0}
.detail-body .tb .sub-section{margin-top:10px;padding-top:8px;border-top:1px dashed #C8E6C9}
.detail-body .exam{background:#F3E5F5;border-left:3px solid #7B1FA2;padding:12px 16px;margin-bottom:12px;border-radius:0 8px 8px 0}
.detail-body .exam-q{font-weight:600;color:#7B1FA2;margin-bottom:4px}
.detail-body .exam-a{color:#666}

/* ====== 隐藏答案模式 ====== */
.hide-toggle{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#888;cursor:pointer;user-select:none;white-space:nowrap;padding:4px 10px 4px 12px;border-radius:14px;border:1px solid #C8E6C9;background:#f1f8e9;transition:all .2s;flex-shrink:0}
.hide-toggle:hover{border-color:#2E7D32;color:#2E7D32}
.hide-toggle.on{background:#2E7D32;color:#fff;border-color:#2E7D32}
.hide-toggle .switch{width:28px;height:14px;border-radius:7px;background:#ddd;position:relative;transition:all .3s;flex-shrink:0}
.hide-toggle .switch::after{content:'';position:absolute;top:1px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:all .3s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.hide-toggle.on .switch{background:#A5D6A7}
.hide-toggle.on .switch::after{left:14px}

/* 隐藏模式下红色关键词变空白 */
.kw.hidden{color:#ccc!important;border-bottom:2px dashed #ccc!important;cursor:pointer!important}

/* Modal for keyword detail */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;max-width:700px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-header{position:sticky;top:0;background:#fff;border-bottom:1px solid #C8E6C9;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.modal-header h2{font-size:18px;color:#2E7D32}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:#E8F5E9;color:#888;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#C8E6C9}
.modal-body{padding:20px}
.modal-section{margin-bottom:20px}
.modal-section h3{font-size:14px;color:#2E7D32;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.modal-section h3 .tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:400;color:#fff}
.modal-section h3 .tag.textbook{background:#2E7D32}
.modal-section h3 .tag.exam{background:#7B1FA2}
.modal-section p{font-size:14px;line-height:1.9;color:#444}
.modal-body .tb{margin:0}
.modal-body p{color:#444;font-size:14px;line-height:1.9}
.modal-body .hl-term{color:#2E7D32}
.modal-body .hl-year{color:#6A1B9A}
.modal-body .hl-person{color:#1565C0}
.modal-body .hl-process{color:#E65100}

/* Loading/Skeleton */
.loading{text-align:center;padding:40px;color:#999}

/* Responsive */
@media(max-width:600px){
  header h1{font-size:16px}
  .kp-text{font-size:13px}
  .detail-body{font-size:12px}
}

/* Footer */
footer{padding:20px;text-align:center;font-size:12px;color:#aaa}
</style>
</head>
<body>

<header>
<div class="container">
  <h1><span class="icon">🌱</span> 七年级下册·生物知识点</h1>
  <div class="period-nav" id="periodNav"></div>
  <div class="hide-toggle" id="hideToggle" onclick="toggleHideMode()"><span class="switch"></span><span>隐藏答案</span></div>
</div>
</header>

<div class="container" id="app"></div>

<!-- Keyword Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
<div class="modal">
  <div class="modal-header">
    <h2 id="modalTitle">关键词</h2>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body" id="modalBody"></div>
</div>
</div>

<footer>
  <p>基于人民教育出版社七年级下册生物学教材</p>
</footer>

<script>
// ==================== DATA ====================
const KNOWLEDGE = [
  {
    period: `植物的生活`,
    id: `zhiwu`,
    chapters: [
      {
        id: `kaodian-19`,
        title: `考点19 \u00b7 种子萌发`,
        points: [
          { num: 1, text: `种子萌发需要适宜的环境条件：适宜的\u201c温度\u201d、一定的\u201c水分\u201d和充足的\u201c空气\u201d。三者缺一不可。`,
            kws: {
              [`温度`]: { tb: `温度是种子萌发的必需条件之一。种子萌发需要适宜的温度范围，不同植物的种子萌发所需温度不同。一般来说，多数种子在15\u2103-30\u2103范围内可以正常萌发。温度过低，酶的活性受到抑制，种子内的生理生化反应无法正常进行；温度过高，会导致种子内的蛋白质变性，伤害胚。例如，早春播种时常覆盖地膜，就是为了提高土壤温度，为种子萌发创造适宜的温度条件。` },
              [`水分`]: { tb: `水分是种子萌发的关键条件。种子萌发时首先需要吸收充足的水分。吸水后，种皮变软，胚和胚乳吸水膨胀，有利于胚根突破种皮。同时，水分使干燥的种子细胞内酶的活性恢复，分解储存的营养物质（淀粉、蛋白质、脂肪），为胚的生长提供能量和原料。但水分过多（如土壤积水）却不利于种子萌发，因为水分过多会导致氧气缺乏，种子无法进行正常的呼吸作用。` },
              [`空气`]: { tb: `充足的空气（氧气）是种子萌发的必要条件。种子萌发过程中，胚进行旺盛的呼吸作用，需要消耗大量氧气来分解有机物，释放能量供胚生长。如果氧气不足（如种子被水淹没或土壤板结），种子的呼吸作用受到抑制，萌发过程将受阻甚至停止。因此播种前需要松土，为种子萌发提供充足的氧气。` }
            }
          },
          { num: 2, text: `种子萌发的自身条件：胚必须完整、有活力，且不处于\u201c休眠期\u201d；种子储存足够的\u201c营养物质\u201d供胚发育利用。`,
            kws: {
              [`胚`]: { tb: `胚是种子中最重要的结构，由受精卵发育而成，是新植物体的幼体。胚由胚芽（发育成茎和叶）、胚轴（发育成连接茎和根的部分）、胚根（发育成根）和子叶（储存或转运营养）四部分构成。种子萌发的先决条件是胚必须完整且具有活力。如果胚被破坏或死亡，种子就无法萌发。此外，种子必须经过休眠期或解除休眠才能萌发。` },
              [`休眠期`]: { tb: `休眠期是指成熟种子在适宜的环境条件下仍然不能萌发的时期。种子休眠是植物长期进化形成的适应性策略，使种子能度过不良环境（如严寒、干旱），等到条件适宜时再萌发。不同植物的种子休眠期长短不同：有的种子休眠期很短（如水稻），有的很长（如有些野生植物种子可休眠数十年）。农业生产中常用低温层积、机械磨损种皮、激素处理等方法打破休眠期，促进种子萌发。` }
            }
          },
          { num: 3, text: `种子萌发过程：吸水膨胀\u2192转运营养物质\u2192胚根突破种皮发育成根\u2192\u201c胚轴\u201d伸长\u2192\u201c胚芽\u201d发育成茎和叶。子叶出土后逐渐枯萎。`,
            kws: {
              [`胚根`]: { tb: `胚根是种子萌发时最先突破种皮的结构，向下生长发育成植物的主根。胚根突破种皮是种子萌发的关键标志之一。胚根先长出来可以迅速固定幼苗，并从土壤中吸收水分和无机盐。胚根发育成的根系是植物吸收养分的主要器官。在双子叶植物中，胚根发育成直根系；在单子叶植物中，发育成须根系。` },
              [`胚轴`]: { tb: `胚轴是连接胚芽和胚根的重要结构。在种子萌发过程中，胚轴伸长，将胚芽推出土面。在子叶出土的植物（如菜豆）中，胚轴伸长明显，将子叶带出土面；在子叶不出土的植物（如豌豆）中，胚轴不伸长或伸长不明显，子叶留在土中。胚轴后期发育成为根茎连接部分。` },
              [`胚芽`]: { tb: `胚芽是胚的顶端部分，将来发育成植物的茎和叶。种子萌发时，胚芽向上生长，突破土壤后暴露在阳光下，逐渐形成茎和真叶。真叶展开后开始进行光合作用，制造有机物，使幼苗从异养（依赖种子储存营养）转变为自养（通过光合作用自己制造营养）。` }
            }
          }
        ]
      },
      {
        id: `kaodian-20`,
        title: `考点20 \u00b7 植株生长`,
        points: [
          { num: 1, text: `根尖是根生长最快的部位，从顶端向上依次分为\u201c根冠\u201d、\u201c分生区\u201d、\u201c伸长区\u201d和\u201c成熟区\u201d四部分。`,
            kws: {
              [`根冠`]: { tb: `根冠位于根尖的顶端，由一层排列疏松的薄壁细胞组成，像一顶帽子保护着幼嫩的分生区。根冠细胞的外壁有黏液化，可以减小根尖在土壤中生长时的摩擦力，帮助根尖顺利向土壤深层延伸。根冠细胞不断磨损脱落，又不断由分生区产生新的细胞补充，保持根冠的完整性。` },
              [`分生区`]: { tb: `分生区位于根冠的内方，是根尖中细胞分裂最旺盛的区域。分生区细胞排列紧密，细胞壁薄，细胞核大，细胞质浓，具有很强的分裂能力。分生区细胞不断分裂产生新细胞，一部分补充根冠，另一部分向上分化为伸长区。分生区是根尖生长点所在，根的伸长主要依赖分生区的细胞分裂和伸长区的细胞伸长。` },
              [`伸长区`]: { tb: `伸长区位于分生区的上方，由分生区分裂产生的细胞伸长、分化而成。伸长区细胞的特点是停止分裂但迅速纵向伸长，是根尖伸长最快的部位。伸长的长度可达到根尖总伸长量的90%以上。伸长区的细胞开始分化，逐渐形成表皮、皮层和中柱等结构，向上过渡为成熟区。` },
              [`成熟区`]: { tb: `成熟区位于伸长区的上方，是根尖吸收水分和无机盐的主要部位。成熟区的表皮细胞向外突出形成\u201c根毛\u201d，大大增加了吸收面积。成熟区内部出现导管，将吸收的水分和无机盐向上运输到茎叶。成熟区的根毛寿命很短（几天到几周），随着根尖的生长，新的根毛不断形成，老根毛不断脱落。移栽植物时损伤根毛会影响水分吸收，因此常带土移栽以保护根尖和根毛。` }
            }
          },
          { num: 2, text: `叶芽发育为枝条：\u201c芽轴\u201d发育成茎，\u201c幼叶\u201d发育成叶，\u201c芽原基\u201d发育成侧芽。`,
            kws: {
              [`芽轴`]: { tb: `芽轴是叶芽的中心轴，位于幼叶和芽原基的内侧。芽轴发育成植物的茎，不断伸长使枝条长高。芽轴的顶端有生长点（分生组织），不断分裂产生新细胞，使茎持续伸长。` },
              [`幼叶`]: { tb: `幼叶位于芽轴周围，包裹着芽轴和生长点。幼叶将来发育成植物的成熟叶片，是进行光合作用的主要器官。随着芽轴伸长，幼叶逐渐展开、长大，形成绿色的功能叶。` },
              [`芽原基`]: { tb: `芽原基位于幼叶的叶腋处，是将来发育成侧芽的结构。侧芽可以发育成侧枝，使植物产生分枝，增加光合面积和开花数量。顶芽发育旺盛时会抑制侧芽生长，这种现象称为\u201c顶端优势\u201d（如松树、杉树）。摘除顶芽可以解除顶端优势，促进侧芽发育（如果树修剪、棉花打顶）。` }
            }
          },
          { num: 3, text: `植物的生长需要多种无机盐，其中需要量最多的是含\u201c氮\u201d、含\u201c磷\u201d和含\u201c钾\u201d的无机盐。\u201c施肥\u201d为植物生长提供无机盐，但过量施肥会导致\u201c烧苗\u201d。`,
            kws: {
              [`氮`]: { tb: `含氮的无机盐（如硝酸铵、尿素）促进植物枝叶生长。氮是叶绿素、蛋白质和核酸的重要组成元素。缺氮时，植物叶色发黄、植株矮小、生长缓慢。施氮过多会导致枝叶徒长、抗病力下降。` },
              [`磷`]: { tb: `含磷的无机盐（如过磷酸钙）促进植物开花结果。磷是细胞核（DNA、RNA）和细胞膜（磷脂）的重要成分，参与能量代谢（ATP）。缺磷时，植物叶片暗绿或紫红、开花推迟、果实发育不良。磷还能促进根系生长，提高抗寒性。` },
              [`钾`]: { tb: `含钾的无机盐（如氯化钾、硫酸钾）促进茎秆粗壮健壮。钾能激活多种酶的活性，促进光合作用和淀粉合成，增强植物的抗倒伏、抗病虫害能力。缺钾时，植物茎秆软弱易倒伏，叶片边缘焦枯发黄。` },
              [`烧苗`]: { tb: `\u201c烧苗\u201d是指施肥过多导致植物萎蔫甚至死亡的现象。施肥过多使土壤溶液浓度过高（大于根细胞液浓度），根细胞不但不能从土壤中吸收水分，反而会失去水分（渗透失水），导致植物萎蔫。因此施肥要注意\u201c薄肥勤施\u201d，施肥后要适量浇水稀释土壤溶液浓度。` }
            }
          }
        ]
      },
      {
        id: `kaodian-21`,
        title: `考点21 \u00b7 开花结果`,
        points: [
          { num: 1, text: `一朵花由\u201c花柄\u201d、\u201c花托\u201d、\u201c花萼\u201d、\u201c花冠\u201d、\u201c雄蕊\u201d和\u201c雌蕊\u201d组成。\u201c雄蕊\u201d和\u201c雌蕊\u201d是花最重要的结构。`,
            kws: {
              [`雄蕊`]: { tb: `雄蕊是花的雄性生殖器官，由花药和花丝组成。花药着生在花丝顶端，内含花粉囊，产生\u201c花粉\u201d（精子）。花丝细长，支持花药并输送养分。一朵花中雄蕊的数量因植物种类而异（如百合有6枚雄蕊，一朵菊花有数百枚雄蕊）。雄蕊成熟后，花药开裂释放花粉。` },
              [`雌蕊`]: { tb: `雌蕊是花的雌性生殖器官，由柱头、花柱和子房三部分组成。\u201c柱头\u201d位于雌蕊顶端，接受花粉；\u201c花柱\u201d连接柱头和子房，是花粉管伸长的通道；\u201c子房\u201d是雌蕊膨大的基部，内含胚珠。胚珠中有卵细胞。受精后子房发育成果实，胚珠发育成种子。` }
            }
          },
          { num: 2, text: `花成熟后，花粉从\u201c花药\u201d中散发出来落到\u201c柱头\u201d上，称为\u201c传粉\u201d。\u201c受精\u201d是精子与卵细胞结合形成\u201c受精卵\u201d的过程。花粉管中的两个精子分别与卵细胞和中央细胞结合，称为\u201c双受精\u201d——这是\u201c被子植物\u201d特有的受精方式。`,
            kws: {
              [`传粉`]: { tb: `传粉是指花粉从花药落到雌蕊柱头上的过程。传粉方式分为\u201c自花传粉\u201d和\u201c异花传粉\u201d两种：自花传粉是同一朵花的花粉落到自己的柱头上，如豌豆、小麦等；异花传粉是一朵花的花粉落到另一朵花的柱头上，需要依靠\u201c风\u201d或\u201c昆虫\u201d等媒介。风媒花（如水稻、杨树）的花粉多而轻、柱头羽毛状；虫媒花（如桃、月季）有鲜艳的花瓣和芳香的气味。农业生产中常用\u201c人工辅助授粉\u201d来提高传粉效率。` },
              [`受精`]: { tb: `被子植物的受精过程：花粉落到柱头上后受到黏液的刺激萌发形成\u201c花粉管\u201d，花粉管穿过花柱进入子房，到达胚珠。花粉管中有两个\u201c精子\u201d。花粉管顶端破裂后，一个精子与卵细胞结合形成\u201c受精卵\u201d（发育成胚），另一个精子与两个极核结合形成\u201c受精极核\u201d（发育成胚乳）。这种两个精子分别参与受精的过程称为\u201c双受精\u201d，是被子植物（绿色开花植物）特有的受精方式。` }
            }
          },
          { num: 3, text: `受精完成后，\u201c子房\u201d发育成果实，\u201c胚珠\u201d发育成种子，\u201c子房壁\u201d发育成果皮，\u201c受精卵\u201d发育成胚。`,
            kws: {
              [`子房`]: { tb: `子房是雌蕊基部膨大的部分，内含胚珠。受精后子房迅速发育成果实。果实的结构包括果皮和种子两部分。果皮由\u201c子房壁\u201d发育而成，具有保护种子和帮助种子传播的功能（如风传播、动物传播、弹射传播等）。` },
              [`胚珠`]: { tb: `胚珠是子房内的结构，受精后发育成种子。胚珠中的受精卵发育成胚（新植物体的幼体），受精极核发育成胚乳（储存营养），珠被发育成种皮。种子中的子叶或胚乳为种子萌发提供营养。一个子房中的胚珠数量决定了果实中种子的数量：如桃只有一个胚珠，所以一个桃只有一个种子（桃核）；西瓜有多个胚珠，所以一个西瓜有很多种子。` },
              [`果实`]: { tb: `果实由果皮和种子两部分构成。根据果皮的特点，果实可分为\u201c肉果\u201d（果皮肥厚多肉，如桃、苹果、葡萄）和\u201c干果\u201d（果皮干燥，如大豆、花生、向日葵）。果实在种子传播中起着重要作用：肉果被动物取食后，种子随粪便传播到远处；干果可通过风力、水流或弹射等方式传播。` }
            }
          }
        ]
      },
      {
        id: `kaodian-22`,
        title: `考点22 \u00b7 叶片结构`,
        points: [
          { num: 1, text: `叶片由\u201c表皮\u201d、\u201c叶肉\u201d和\u201c叶脉\u201d三部分组成。\u201c表皮\u201d在叶片最外层（上表皮、下表皮），起保护作用；\u201c叶肉\u201d含大量\u201c叶绿体\u201d，是光合作用的主要场所；\u201c叶脉\u201d有\u201c输导\u201d和支持作用。`,
            kws: {
              [`表皮`]: { tb: `表皮是叶片最外面的一层细胞，分为上表皮和下表皮。表皮细胞排列紧密，无色透明，细胞壁外有\u201c角质层\u201d（蜡质层），能防止水分蒸发和病菌侵入。上表皮的角质层一般比下表皮厚。气孔分布于表皮上，下表皮的气孔通常比上表皮多。` },
              [`叶肉`]: { tb: `叶肉是叶片中主要的薄壁组织，含大量叶绿体，是光合作用的主要场所。叶肉分为\u201c栅栏组织\u201d和\u201c海绵组织\u201d。\u201c栅栏组织\u201d靠近上表皮，细胞排列整齐呈柱状，含叶绿体多，光合能力强；\u201c海绵组织\u201d靠近下表皮，细胞形状不规则，排列疏松，含叶绿体较少，细胞间有发达的气腔，有利于气体交换。` },
              [`叶脉`]: { tb: `叶脉是叶中的\u201c血管\u201d，内有\u201c导管\u201d和\u201c筛管\u201d。\u201c导管\u201d由下而上运输水分和无机盐；\u201c筛管\u201d由上而下运输光合作用制造的有机物。叶脉还像骨骼一样支撑叶片，使叶片保持伸展状态，有利于接受阳光。叶脉的排列方式分为网状脉（双子叶植物，如苹果）和平行脉（单子叶植物，如玉米）。` }
            }
          },
          { num: 2, text: `\u201c气孔\u201d是叶片与外界进行气体交换的\u201c门户\u201d，由一对半月形的\u201c保卫细胞\u201d围成。当保卫细胞吸水膨胀时气孔张开，失水收缩时气孔闭合。`,
            kws: {
              [`气孔`]: { tb: `气孔是植物体蒸腾失水的\u201c门户\u201d，也是气体交换的\u201c窗口\u201d。气孔由两个半月形的保卫细胞围成。气孔通常分布在叶片下表皮（下表皮气孔多，上表皮少或没有）。气孔的开闭受保卫细胞控制：保卫细胞吸水膨胀，气孔张开（白天光照时）；保卫细胞失水收缩，气孔闭合（夜间或干旱时）。气孔的开闭调节直接影响光合作用（CO₂进入）、呼吸作用（O₂/CO₂交换）和蒸腾作用（水分散失）的强度。` },
              [`保卫细胞`]: { tb: `保卫细胞是构成气孔的半月形细胞，是气孔开闭的调控者。保卫细胞区别于普通表皮细胞的特点：含有\u201c叶绿体\u201d（能进行光合作用），细胞壁厚薄不均匀（靠近气孔一侧的壁较厚，远离气孔一侧的壁较薄）。当保卫细胞因光合作用产生糖分而吸水膨胀时，较薄的壁向外凸出，较厚的壁向内凹入，气孔张开；失水时，保卫细胞体积缩小，气孔闭合。` }
            }
          }
        ]
      },
      {
        id: `kaodian-23`,
        title: `考点23 \u00b7 蒸腾作用`,
        points: [
          { num: 1, text: `\u201c蒸腾作用\u201d是水分从植物体表面（主要是叶片\u201c气孔\u201d）以水蒸气形式散失到大气中的过程。蒸腾作用能拉动水分和无机盐在植物体内的运输，还能降低叶片温度。`,
            kws: {
              [`蒸腾作用`]: { tb: `蒸腾作用是植物体通过气孔将水分以水蒸气形式散失的过程。植物吸收的水分中，约95%-99%通过蒸腾作用散失，只有1%-5%用于光合作用等生理活动。蒸腾作用的三个重要生理意义：一、\u201c蒸腾拉力\u201d是植物吸收和运输水分的主要动力（如同吸水水泵）；二、溶解在水分中的无机盐随水分的运输而到达植物体各部分；三、水分蒸发带走热量，降低叶片温度，防止叶片被灼伤。影响蒸腾作用强度的因素：光照（增强）、温度（升高增强）、湿度（增大减弱）、风速（增大增强）。` },
              [`气孔`]: { tb: `气孔是蒸腾作用的主要通道，约90%以上的水蒸气通过气孔散失（其余通过角质层蒸发）。气孔的开闭直接调控蒸腾作用的强度。植物在干旱缺水时会主动关闭气孔以减少失水，但气孔关闭也阻断了CO₂进入叶片，导致光合作用减弱。这是一个\u201c保水\u201d与\u201c光合\u201d的权衡。` }
            }
          },
          { num: 2, text: `移栽植物时，为提高成活率需采取措施降低蒸腾作用：去掉部分\u201c枝叶\u201d、在\u201c阴天\u201d或\u201c傍晚\u201d移栽、移栽后适当\u201c遮阴\u201d；移栽时要尽量带\u201c土坨\u201d以保护根尖和根毛。`,
            kws: {
              [`枝叶`]: { tb: `移栽植物时去掉部分枝叶是为了减少蒸腾作用。叶片是蒸腾作用的主要器官，去掉部分枝叶可以降低水分蒸发速度。通常在移栽时剪去部分老叶和嫩叶，保留少量功能叶进行光合作用，可有效提高移栽成活率。` },
              [`阴天`]: { tb: `阴天或傍晚移栽利用了这些时段光照弱、温度低的特点，此时气孔开放程度小，蒸腾作用减弱，移栽后植物的水分散失少，有利于根系恢复吸收功能，提高成活率。` },
              [`土坨`]: { tb: `移栽植物时带\u201c土坨\u201d是指将植物连根带土一起挖出移栽。土坨可以保护根尖（特别是脆弱的分生区和伸长区）和\u201c根毛\u201d，减少根系损伤。根毛是吸收水分和无机盐的主要结构，受损后吸水能力下降，植物容易出现萎蔫。带土移栽还能保留根系周围的微生物群落，帮助植物更快适应新环境。` }
            }
          }
        ]
      },
      {
        id: `kaodian-24`,
        title: `考点24 \u00b7 绿叶在光下制造有机物`,
        points: [
          { num: 1, text: `实验步骤：\u201c暗处理\u201d一昼夜\u2192部分\u201c遮光\u201d\u2192\u201c光照\u201d3-4小时\u2192\u201c酒精脱色\u201d\u2192清水\u201c漂洗\u201d\u2192滴加\u201c碘液\u201d\u2192观察颜色变化。`,
            kws: {
              [`暗处理`]: { tb: `暗处理是指将实验植物放在黑暗环境中一昼夜（约24小时）。目的：消耗掉叶片中原有储存的淀粉，避免对实验结果产生干扰。暗处理期间叶片无法进行光合作用，但呼吸作用继续进行，将储存在叶片中的淀粉逐步分解、运走。如果不进行暗处理，叶片中原有的淀粉遇碘也会变蓝，无法证明淀粉是新产生的。` },
              [`遮光`]: { tb: `遮光是用不透光的纸片（如锡箔纸、黑纸片）将叶片的一部分上下两面遮盖起来。目的：形成\u201c有光\u201d和\u201c无光\u201d的对照，证明光是光合作用的必要条件。遮光部位由于得不到光照，不能进行光合作用；未遮光部位接受光照，能进行光合作用产生淀粉。` },
              [`酒精脱色`]: { tb: `酒精脱色是将叶片放入盛有酒精的小烧杯中，隔水加热使叶片褪色。目的：溶解叶片中的叶绿素，使叶片变为黄白色，便于观察碘液染色后的颜色变化。注意要用\u201c隔水加热\u201d（小烧杯放在大烧杯的热水中），因为酒精易燃，直接加热有危险。脱色后叶片变黄白，绿色的叶绿素溶解到酒精中，酒精变为绿色。` },
              [`碘液`]: { tb: `碘液（碘-碘化钾溶液）用于检验\u201c淀粉\u201d的存在。淀粉遇碘变蓝是淀粉的特征性反应。实验原理：叶片见光部分进行光合作用产生淀粉，滴加碘液后变蓝色；遮光部分没有进行光合作用，没有产生淀粉，滴加碘液后不变蓝（仍为黄白色）。` }
            }
          },
          { num: 2, text: `实验结论：\u201c光\u201d是光合作用的必要条件；\u201c淀粉\u201d是光合作用的主要产物之一。绿叶在光下制造的有机物主要是\u201c淀粉\u201d（需进一步转化成其他有机物被植物利用）。`,
            kws: {
              [`光`]: { tb: `光是光合作用的必需条件。在光下，叶绿体才能利用光能将二氧化碳和水转化为有机物。光为光合作用提供能量来源。实验证明，没有光，叶绿体无法进行光合作用，也就不能产生淀粉。因此光照时间、光照强度都会影响光合作用的效率。` },
              [`淀粉`]: { tb: `淀粉是光合作用的主要初始产物，是一种储能物质。绿叶在光下将二氧化碳和水合成有机物，最初形成葡萄糖，葡萄糖很快转化为淀粉暂时储存在叶片中。夜间，淀粉被分解为糖类运输到植物其他部位（如果实、种子、根、茎等），为植物生长发育提供能量或转变为其他有机物。我们吃的粮食（米、面）富含淀粉，正是因为光合作用将太阳能转化为化学能储存在淀粉中。` }
            }
          }
        ]
      },
      {
        id: `kaodian-25`,
        title: `考点25 \u00b7 光合作用`,
        points: [
          { num: 1, text: `光合作用是指绿色植物通过\u201c叶绿体\u201d，利用\u201c光能\u201d，将\u201c二氧化碳\u201d和\u201c水\u201d转化为储存能量的\u201c有机物\u201d，并释放\u201c氧气\u201d的过程。`,
            kws: {
              [`叶绿体`]: { tb: `叶绿体是光合作用的场所，是植物细胞中特有的能量转换器。叶绿体含有\u201c叶绿素\u201d（呈绿色），叶绿素能吸收光能，将光能转化为化学能。在叶绿体内，光合作用分两个阶段进行：光反应（在类囊体薄膜上，需要光）产生ATP和NADPH；暗反应（在基质中，不需要光直接参与）将CO₂固定并还原为糖类。叶绿体主要分布在叶肉细胞和幼嫩茎的皮层细胞中。` },
              [`二氧化碳`]: { tb: `二氧化碳（CO₂）是光合作用的主要原料之一。CO₂通过气孔进入叶片，扩散到叶肉细胞中的叶绿体。空气中CO₂浓度约为0.03%（300-400ppm），这个浓度远低于光合作用的饱和需求。适当提高CO₂浓度（如温室中增施CO₂气肥或施用农家肥）可以提高光合作用效率。CO₂浓度过高也会抑制光合作用。` },
              [`氧气`]: { tb: `氧气（O₂）是光合作用产生的副产物。光合作用释放的氧气来自水分子（H₂O）的光解。绿色植物是大气中氧气的\u201c制造者\u201d，光合作用释放的氧气维持了大气中O₂和CO₂的平衡。植物在白天光合作用强时，产生的氧气多于呼吸作用消耗的氧气；夜间只进行呼吸作用，消耗氧气释放二氧化碳。` }
            }
          },
          { num: 2, text: `光合作用的表达式：\u201c二氧化碳+水\u201d\xa0\u201c光能\u201d叶绿体\u201c有机物（储存能量）+氧气\u201d。光合作用的产物是\u201c有机物\u201d和\u201c氧气\u201d，原料是\u201c二氧化碳\u201d和\u201c水\u201d，条件是\u201c光\u201d和\u201c叶绿体\u201d。`,
            kws: {
              [`光合作用表达式`]: { tb: `光合作用的化学方程式：6CO₂ + 6H₂O \u2192 C₆H₁₂O₆ + 6O₂（条件：光能、叶绿体）。文字表达式：二氧化碳 + 水 \u2192 有机物（淀粉）+ 氧气。光合作用将\u201c光能\u201d转化为\u201c化学能\u201d储存在有机物中，是生物圈中能量流动的基础。地球上的几乎所有生命都直接或间接依赖光合作用提供的有机物和能量。` }
            }
          },
          { num: 3, text: `影响光合作用的因素：\u201c光照强度\u201d、\u201c二氧化碳浓度\u201d、\u201c温度\u201d、\u201c水分\u201d等。在农业上通过合理密植、间作套种、大棚增施CO₂等措施提高光合作用效率。`,
            kws: {

// ==================== RENDER ====================
const app = document.getElementById('app');
const nav = document.getElementById('periodNav');

// Navigation
KNOWLEDGE.forEach((period, i) => {
  const btn = document.createElement('button');
  btn.className = `period-btn${i === 0 ? ' active' : ''}`;
  btn.textContent = period.period;
  btn.onclick = () => {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(period.id).scrollIntoView({ behavior: 'smooth' });
  };
  nav.appendChild(btn);
});

// Which SVGs to insert per chapter
const CHAPTER_SVGS = {
  'kaodian-19': ['seed'],
  'kaodian-20': ['root'],
  'kaodian-21': ['flower'],
  'kaodian-22': ['leaf'],
  'kaodian-27': ['phoresp']
};

// Build page
function buildPage() {
  let html = '';

  KNOWLEDGE.forEach(period => {
    html += `<div class="chapter" id="${period.id}">`;
    period.chapters.forEach(ch => {
      html += `<div class="chapter-header"><div class="chapter-num">${ch.id.split('-')[1]}</div><div><div class="chapter-title">${ch.title}</div></div></div>`;
      // Insert SVG for matching chapters
      const svgs = CHAPTER_SVGS[ch.id] || [];
      svgs.forEach(svgKey => {
        if (SVGS[svgKey]) {
          html += `<div class="svg-diagram">${SVGS[svgKey]}</div>`;
        }
      });
      ch.points.forEach(pt => {
        // Process text to mark keywords
        let text = pt.text;
        if (pt.kws) {
          Object.keys(pt.kws).forEach(kw => {
            const idx = text.indexOf(kw);
            if (idx >= 0) {
              const before = text.substring(0, idx);
              const after = text.substring(idx + kw.length);
              text = before + `<span class="kw" data-keyword="${kw}" data-chapter="${ch.id}" data-point="${pt.num}">${kw}</span>` + after;
            }
          });
        }

        html += `<div class="kp-card"><div class="kp-header" onclick="toggleDetail(this, event)">`;
        html += `<div class="kp-num">${pt.num}</div>`;
        html += `<div class="kp-text">${text}</div>`;
        html += `</div></div>`;
      });
    });
    html += `</div>`;
  });

  app.innerHTML = html;
}

buildPage();

// Format textbook content for better readability
function formatTbContent(text) {
  let paras = text.split(/(?<=[。！？])/);
  return paras.map(p => {
    if (!p.trim()) return '';
    let formatted = p;
    // Highlight numbers/years
    formatted = formatted.replace(/(\d{1,4})(\u2103|\u00b5m|mm|cm|dm|m|h)/g, `<span class="hl-year">$1$2</span>`);
    // Highlight key biology terms
    const terms = [
      `光合作用`, `呼吸作用`, `蒸腾作用`, `传粉`, `受精`, `双受精`,
      `叶绿体`, `线粒体`, `叶绿素`, `气孔`, `保卫细胞`,
      `导管`, `筛管`, `叶脉`, `胚珠`, `子房`, `花药`, `花丝`,
      `胚芽`, `胚轴`, `胚根`, `子叶`, `种皮`, `胚乳`,
      `根冠`, `分生区`, `伸长区`, `成熟区`, `根毛`,
      `栅栏组织`, `海绵组织`, `角质层`,
      `光补偿点`, `光饱和点`, `净光合速率`, `光合午休`,
      `受精卵`, `胚泡`, `着床`, `胚胎`, `胎儿`, `胎盘`, `脐带`,
      `精子`, `卵细胞`, `睾丸`, `卵巢`, `输卵管`, `子宫`,
      `ATP`, `淀粉`, `有机物`, `无机盐`,
      `合理密植`, `顶端优势`, `烧苗`, `带土移栽`,
      `阳生植物`, `阴生植物`, `C\u2083植物`, `C\u2084植物`,
      `糖酵解`, `无氧呼吸`, `有氧呼吸`,
      `休眠期`, `光反应`, `暗反应`
    ];
    terms.forEach(t => {
      const re = new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, `\\$&`), `g`);
      formatted = formatted.replace(re, `<span class="hl-term">${t}</span>`);
    });
    // Highlight scientists/persons
    const persons = [`胰岛素`, `达尔文`, `施莱登`, `施旺`];
    persons.forEach(pr => {
      const re = new RegExp(pr.replace(/[.*+?^${}()|[\]\\]/g, `\\$&`), `g`);
      formatted = formatted.replace(re, `<span class="hl-person">${pr}</span>`);
    });
    // Highlight process terms
    const processes = [`暗处理`, `遮光`, `酒精脱色`, `漂洗`, `碘液`, `隔水加热`,
      `田间松土`, `低温储存`, `晾晒粮食`, `人工辅助授粉`,
      `薄肥勤施`, `气调储藏`
    ];
    processes.forEach(pr => {
      const re = new RegExp(pr.replace(/[.*+?^${}()|[\]\\]/g, `\\$&`), `g`);
      formatted = formatted.replace(re, `<span class="hl-process">${pr}</span>`);
    });
    return `<p>${formatted}</p>`;
  }).filter(p => p.trim()).join('');
}

function toggleDetail(header, evt) {
  if (evt && evt.target && evt.target.closest && evt.target.closest(`.kw`)) return;
  const card = header.closest(`.kp-card`);
  let detail = card.querySelector(`.kp-detail`);
  if (!detail) {
    detail = document.createElement(`div`);
    detail.className = `kp-detail show`;
    detail.innerHTML = `<div class="detail-tabs"><div class="detail-tab active">\ud83d\udcd6 课本详解</div><div class="detail-tab">\ud83d\udcdd 相关真题</div></div><div class="detail-body" style="padding:10px 16px;color:#999;font-size:12px">点击红色关键词查看课本详解内容</div>`;
    card.appendChild(detail);
  } else {
    detail.classList.toggle(`show`);
    detail.style.display = detail.classList.contains(`show`) ? `block` : `none`;
  }
}

// Click on keyword to open modal
document.addEventListener(`click`, function(e) {
  const kw = e.target.closest(`.kw`);
  if (kw) {
    e.stopPropagation();
    const keyword = kw.dataset.keyword;
    const chapterId = kw.dataset.chapter;
    const pointNum = kw.dataset.point;

    let foundData = null;
    KNOWLEDGE.forEach(p => {
      p.chapters.forEach(ch => {
        if (ch.id === chapterId) {
          ch.points.forEach(pt => {
            if (pt.num == pointNum && pt.kws && pt.kws[keyword]) {
              foundData = { keyword, ...pt.kws[keyword], chapter: ch.title };
            }
          });
        }
      });
    });

    if (foundData) {
      document.getElementById(`modalTitle`).textContent = foundData.keyword;

      let tbContent = foundData.tb ? formatTbContent(foundData.tb) : `<p style="color:#999">暂无内容</p>`;
      let examContent = foundData.exam ? `<p>${foundData.exam}</p>` : `<p style="color:#999">\ud83d\udccc 等你发了真题，我会补到这里～</p>`;

      document.getElementById(`modalBody`).innerHTML = `
        <div class="detail-tabs" style="margin-bottom:14px">
          <div class="detail-tab active" onclick="switchModalTab(this,0)">\ud83d\udcd6 课本详解</div>
          <div class="detail-tab" onclick="switchModalTab(this,1)">\ud83d\udcdd 相关真题</div>
        </div>
        <div class="tab-content" data-tab="0">${tbContent}</div>
        <div class="tab-content" data-tab="1" style="display:none">${examContent}</div>
      `;
      document.getElementById(`modalOverlay`).classList.add(`show`);
      applyHideMode();
    }
  }
});

function switchModalTab(tab, index) {
  const tabs = tab.parentElement.querySelectorAll(`.detail-tab`);
  tabs.forEach(t => t.classList.remove(`active`));
  tab.classList.add(`active`);
  const body = document.getElementById(`modalBody`);
  body.querySelectorAll(`.tab-content`).forEach(c => c.style.display = `none`);
  body.querySelectorAll(`.tab-content`)[index].style.display = `block`;
  applyHideMode();
}

// ====== 隐藏答案模式 ======
let hideMode = false;

function toggleHideMode(){
  hideMode = !hideMode;
  document.getElementById('hideToggle').classList.toggle('on', hideMode);
  if(hideMode) applyHideMode();
  else resetHideMode();
}

function applyHideMode(){
  if(!hideMode) return;
  document.querySelectorAll('.kw').forEach(el => {
    if(!el.dataset.originalText){
      el.dataset.originalText = el.textContent;
    }
    el.textContent = el.textContent.replace(/./g, '_');
    el.classList.add('hidden');
  });
}

function resetHideMode(){
  document.querySelectorAll('.kw').forEach(el => {
    if(el.dataset.originalText){
      el.textContent = el.dataset.originalText;
    }
    el.classList.remove('hidden');
  });
}

function closeModal() {
  document.getElementById(`modalOverlay`).classList.remove(`show`);
}

// Close modal on overlay click
document.getElementById(`modalOverlay`).onclick = function(e) {
  if (e.target === this) closeModal();
};

// Escape key closes modal
document.addEventListener(`keydown`, e => {
  if (e.key === `Escape`) closeModal();
});

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>八年级下册地理知识点</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F0F4F8;color:#2C3E50;font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;line-height:1.8;font-size:15px}
.container{max-width:1000px;margin:0 auto;padding:0 16px}

/* Header */
header{position:sticky;top:0;z-index:50;background:rgba(240,244,248,.97);backdrop-filter:blur(8px);border-bottom:2px solid #1565C0;padding:12px 0}
header .container{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:20px;color:#1565C0;display:flex;align-items:center;gap:8px}
header h1 .icon{width:32px;height:32px;border-radius:8px;background:#E3F2FD;display:flex;align-items:center;justify-content:center;font-size:16px}
.region-nav{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 0}
.region-btn{padding:6px 14px;border-radius:16px;border:1px solid #BBDEFB;font-size:12px;cursor:pointer;white-space:nowrap;background:#fff;color:#666;transition:all .2s}
.region-btn.active{background:#1565C0;color:#fff;border-color:#1565C0}
.region-btn:hover:not(.active){background:#E3F2FD}

/* Chapter Card */
.chapter{margin-bottom:40px;scroll-margin-top:130px}
.chapter-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px 16px;background:#fff;border-radius:12px;border-left:4px solid #1565C0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.chapter-num{width:36px;height:36px;border-radius:50%;background:#1565C0;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.chapter-title{font-size:18px;font-weight:600;color:#2C3E50}
.chapter-subtitle{font-size:12px;color:#999;margin-top:-2px}

/* SVG diagram container */
.svg-diagram{margin:10px 0;background:#FAFDFF;border:1px solid #BBDEFB;border-radius:8px;padding:10px;text-align:center}
.svg-diagram svg{max-width:100%;height:auto}
.svg-caption{font-size:11px;color:#888;margin-top:4px}

/* Knowledge Point Card */
.kp-card{margin-bottom:12px;background:#fff;border-radius:10px;border:1px solid #BBDEFB;overflow:hidden;transition:box-shadow .2s}
.kp-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kp-header{padding:12px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;user-select:none}
.kp-num{min-width:22px;height:22px;border-radius:50%;background:#E3F2FD;color:#1565C0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:3px}
.kp-text{flex:1;font-size:14px;line-height:1.7;color:#3D3D3D}
.kp-text .kw{color:#E53935;font-weight:600;border-bottom:2px solid rgba(229,57,53,.3);cursor:pointer;padding:0 2px;transition:all .15s}
.kp-text .kw:hover{background:rgba(229,57,53,.08)}
.kp-text .kw.active{background:rgba(229,57,53,.12)}

/* Expand Section */
.kp-detail{display:none;border-top:1px solid #BBDEFB;background:#F8FAFC}
.kp-detail.show{display:block}
.detail-tabs{display:flex;border-bottom:1px solid #BBDEFB}
.detail-tab{padding:8px 16px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:#888;transition:all .2s}
.detail-tab.active{color:#1565C0;border-bottom-color:#1565C0;font-weight:600}
.detail-body{padding:14px 16px;font-size:13px;line-height:1.8;color:#555}
.detail-body .tb{background:#EFF6FF;border-left:3px solid #1565C0;padding:12px 16px;margin-bottom:12px;border-radius:0 8px 8px 0;font-size:13.5px;line-height:1.9;color:#2C3E50}
.detail-body .tb .hl-term{color:#1565C0;font-weight:600}
.detail-body .tb .hl-place{color:#E65100;font-weight:600}
.detail-body .tb .hl-climate{color:#2E7D32;font-weight:600}
.detail-body .tb .hl-num{color:#6A1B9A;font-weight:600}
.detail-body .tb p{margin-bottom:8px}
.detail-body .tb p:last-child{margin-bottom:0}
.detail-body .tb .sub-section{margin-top:10px;padding-top:8px;border-top:1px dashed #BBDEFB}
.detail-body .exam{background:#F3E5F5;border-left:3px solid #7B1FA2;padding:12px 16px;margin-bottom:12px;border-radius:0 8px 8px 0}
.detail-body .exam-q{font-weight:600;color:#7B1FA2;margin-bottom:4px}
.detail-body .exam-a{color:#666}

/* Modal for keyword detail */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;max-width:700px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-header{position:sticky;top:0;background:#fff;border-bottom:1px solid #BBDEFB;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.modal-header h2{font-size:18px;color:#E53935}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:#FFEBEE;color:#888;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#FFCDD2}
.modal-body{padding:20px}
.modal-body .detail-tabs{margin-bottom:14px}
.modal-body p{color:#444;font-size:14px;line-height:1.9}
.modal-body .hl-term{color:#1565C0}
.modal-body .hl-place{color:#E65100}
.modal-body .hl-climate{color:#2E7D32}
.modal-body .hl-num{color:#6A1B9A}

/* Loading/Skeleton */
.loading{text-align:center;padding:40px;color:#999}

/* Responsive */
@media(max-width:600px){
  header h1{font-size:16px}
  .kp-text{font-size:13px}
  .detail-body{font-size:12px}
}

/* Footer */
footer{padding:20px;text-align:center;font-size:12px;color:#aaa}
</style>
</head>

<header>
<div class="container">

  <div class="modal-body" id="modalBody"></div>

              ["\u6cb3\u7f51\u7a20\u5bc6"]: { tb: "\u6b27\u6d32\u6cb3\u6d41\u7f51\u7edc\u832b\u7a20\u5bc6\uff0c\u4e3b\u8981\u539f\u56e0\uff1a\u6b27\u6d32\u5730\u5f62\u4ee5\u5e73\u539f\u4e3a\u4e3b\uff0c\u6cb3\u6d41\u6c34\u6d41\u7de9\u6162\uff0c\u5229\u4e8e\u822a\u8fd0\uff1b\u6c14\u5019\u6e7f\u6da6\uff0c\u964d\u6c34\u5747\u5300\uff0c\u6cb3\u6d41\u6c34\u91cf\u4e30\u5bcc\u4e14\u5b63\u8282\u53d8\u5316\u5c0f\uff1b\u6cb3\u6d41\u591a\u5e74\u4e0d\u51bb\u671f\u957f\uff0c\u822a\u8fd0\u5b63\u8282\u957f\u3002\u6b27\u6d32\u5185\u6cb3\u822a\u8fd0\u53d1\u8fbe\uff0c\u65e2\u6709\u6b27\u6d32\u56fd\u9645\u822a\u8fd0\u7684\u91cd\u8981\u6cb3\u6d41\uff08\u591a\u7491\u6cb3\u3001\u83b1\u8335\u6cb3\u3001\u585e\u7eb3\u6cb3\u7b49\uff09\uff0c\u53c8\u6709\u8bf8\u591a\u4eba\u5de5\u8fd0\u6cb3\u5c06\u5404\u6cb3\u7cfb\u8fde\u63a5\uff0c\u5f62\u6210\u4e86\u5d07\u9ad8\u65b9\u4fbf\u7684\u5185\u6cb3\u822a\u8fd0\u7f51\u7edc\u3002" }

        title: "\u8003\u70b918 \u00b7 \u975e\u6d32\u548c\u7f8e\u6d32",
        points: [
          { num: 1, text: "\u201c\u975e\u6d32\u201d\u5730\u5f62\u4ee5\u9ad8\u539f\u4e3a\u4e3b\uff0c\u88ab\u79f0\u4e3a\u201c\u9ad8\u539f\u5927\u9646\u201d\uff0c\u4e5f\u662f\u201c\u70ed\u5e26\u5927\u9646\u201d\uff0c\u8d64\u9053\u6a2a\u8d2f\u4e2d\u90e8\u3002\u7f8e\u6d32\u5206\u4e3a\u201c\u5317\u7f8e\u6d32\u201d\u548c\u201c\u5357\u7f8e\u6d32\u201d\uff0c\u5730\u5f62\u5448\u4e09\u5927\u7eb5\u5217\u5e26\u3002",
            kws: {
              ["\u975e\u6d32"]: { tb: "\u975e\u6d32\u5730\u5f62\u4ee5\u9ad8\u539f\u4e3a\u4e3b\uff0c\u5176\u4e2d\u4e1c\u975e\u9ad8\u539f\u3001\u5357\u975e\u9ad8\u539f\u662f\u4e3b\u8981\u5730\u5f62\u5355\u5143\uff0c\u5e73\u5747\u6d77\u62d4\u7ea2600\u7c73\u4ee5\u4e0a\u3002\u975e\u6d32\u662f\u4e16\u754c\u4e0a\u70ed\u5e26\u5730\u533a\u6700\u5927\u7684\u5927\u6d32\uff0c\u8d64\u9053\u6a2a\u8d2f\u4e2d\u90e8\uff0c\u5317\u56de\u5f52\u7ebf\u548c\u5357\u56de\u5f52\u7ebf\u5206\u522b\u7a7f\u8d8a\u5317\u90e8\u548c\u5357\u90e8\uff0c\u5168\u6d32\u7ecf\u8fc73/4\u7684\u5730\u533a\u4f4d\u4e8e\u70ed\u5e26\uff0c\u56e0\u6b64\u88ab\u79f0\u4e3a\u201c\u70ed\u5e26\u5927\u9646\u201d\u3002\u975e\u6d32\u6709\u4e16\u754c\u7b2c\u4e00\u957f\u6cb3\u5c3c\u7f57\u6cb3\uff086671\u516c\u91cc\uff09\u3001\u4e16\u754c\u6700\u5927\u7684\u6c99\u6f20\u6492\u54c8\u62c9\u6c99\u6f20\u3001\u975e\u6d32\u6700\u9ad8\u5cf0\u72e0\u520a\u9a6c\u4f50\u7f57\u5cf0\uff085895\u7c73\uff09\u3002" },
              ["\u9ad8\u539f\u5927\u9646"]: { tb: "\u975e\u6d32\u88ab\u79f0\u4e3a\u201c\u9ad8\u539f\u5927\u9646\u201d\uff0c\u539f\u56e0\u662f\u5176\u5730\u5f62\u4ee5\u9ad8\u539f\u4e3a\u4e3b\uff0c\u9ad8\u539f\u548c\u6c99\u6f20\u7ea6\u5360\u5168\u6d32\u9762\u79ef\u768460%\u4ee5\u4e0a\u3002\u5751\u6597\u5c71\u5730\u8f83\u5c11\uff0c\u811a\u7684\u5730\u58c1\u8f83\u5c11\u3002\u4e1c\u975e\u9ad8\u539f\u662f\u975e\u6d32\u6700\u5927\u7684\u9ad8\u539f\uff0c\u8fd8\u6709\u5357\u975e\u9ad8\u539f\u3001\u5317\u975e\u9ad8\u539f\u7b49\u3002\u975e\u6d32\u4e1c\u90e8\u6709\u4e16\u754c\u4e0a\u6700\u5927\u7684\u88c2\u8c37\u5e26\u2014\u2014\u4e1c\u975e\u5927\u88c2\u8c37\u3002" },
              ["\u5317\u7f8e\u6d32"]: { tb: "\u5317\u7f8e\u6d32\u5730\u5f62\u5448\u4e09\u5927\u7eb5\u5217\u5e26\u5e03\u5c40\uff1a\u897f\u90e8\u662f\u201c\u7edf\u5c71\u5c71\u7cfb\u201d\uff08\u5305\u62ec\u843d\u57fa\u5c71\u8109\u3001\u5188\u5c14\u6d17\u4ed6\u5c71\u8109\u3001\u5bb6\u7f57\u62c9\u5c71\u8109\u3001\u963f\u62c9\u65af\u52a0\u5c71\u8109\u7b49\uff09\uff1b\u4e2d\u90e8\u662f\u5e7f\u9614\u7684\u201c\u4e2d\u592e\u5927\u5e73\u539f\u201d\uff1b\u4e1c\u90e8\u662f\u8001\u800c\u4f4e\u7684\u201c\u963f\u5df4\u62c9\u5bdf\u4e9a\u5c71\u8109\u201d\u548c\u201c\u62ac\u59c6\u5c71\u8109\u201d\u3002\u5317\u7f8e\u6d32\u6c14\u5019\u7c7b\u578b\u590d\u6742\u591a\u6837\uff0c\u4e1c\u5317\u90e8\u6709\u5e7f\u5927\u7684\u4e9a\u5bd2\u5e26\u9488\u53f6\u6797\u6c14\u5019\uff0c\u897f\u5357\u90e8\u6709\u5730\u4e2d\u6d77\u6c14\u5019\u3002" },
              ["\u5357\u7f8e\u6d32"]: { tb: "\u5357\u7f8e\u6d32\u897f\u90e8\u4e3a\u5b89\u7b2c\u65af\u5c71\u8109\uff08\u4e16\u754c\u6700\u957f\u7684\u5c71\u8109\uff0c\u7ea99000\u516c\u91cc\uff09\uff0c\u4e1c\u90e8\u9ad8\u539f\u5e73\u539f\u76f8\u95f4\uff0c\u6709\u4e9a\u9a6c\u900a\u5e73\u539f\u3001\u5df4\u897f\u9ad8\u539f\u3001\u5df4\u62c9\u6728\u5e73\u539f\u3002\u5b89\u7b2c\u65af\u5c71\u8109\u662f\u677f\u5757\u78b0\u649e\u5f62\u6210\u7684\uff0c\u706b\u5c71\u3001\u5730\u9707\u9891\u7e41\u3002\u5357\u7f8e\u6d32\u662f\u4e16\u754c\u4e0a\u6e7f\u6da6\u7684\u5927\u6d32\u4e4b\u4e00\uff0c\u62e5\u6709\u4e16\u754c\u6700\u5927\u7684\u70ed\u5e26\u96e8\u6797\u2014\u2014\u4e9a\u9a6c\u900a\u70ed\u5e26\u96e8\u6797\uff0c\u4e5f\u6709\u5e7f\u9614\u7684\u70ed\u5e26\u8349\u539f\u2014\u2014\u5df4\u897f\u9ad8\u539f\u4e0a\u7684\u4e16\u754c\u6700\u5927\u70ed\u5e26\u8349\u539f\u3002" }
            }
          },
          { num: 2, text: "\u5317\u7f8e\u6d32\u5730\u5f62\u5448\u201c\u897f\u90e8\u5c71\u5730-\u4e2d\u90e8\u5e73\u539f-\u4e1c\u90e8\u9ad8\u5730\u201d\u4e09\u5927\u7eb5\u5217\u5e26\u3002\u5357\u7f8e\u6d32\u62e5\u6709\u4e16\u754c\u6700\u5927\u7684\u201c\u70ed\u5e26\u96e8\u6797\u201d\uff08\u4e9a\u9a6c\u900a\u6d41\u57df\uff09\u548c\u5e7f\u9614\u7684\u201c\u70ed\u5e26\u8349\u539f\u201d\u3002",
            kws: {
              ["\u70ed\u5e26\u96e8\u6797"]: { tb: "\u4e9a\u9a6c\u900a\u70ed\u5e26\u96e8\u6797\u662f\u4e16\u754c\u4e0a\u6700\u5927\u7684\u70ed\u5e26\u96e8\u6797\uff0c\u6570\u91cf\u7ea6800\u4e07\u5e73\u65b9\u516c\u91cc\uff0c\u5305\u542b\u5854\u5360\u4e16\u754c\u96e8\u6791\u768450%\u4ee5\u4e0a\u3002\u4e9a\u9a6c\u900a\u70ed\u5e26\u96e8\u6797\u88ab\u79f0\u4e3a\u201c\u5730\u7403\u4e4b\u80ba\u201d\uff0c\u5b83\u4e0d\u4ec5\u662f\u4e16\u754c\u6700\u5927\u7684\u70ed\u5e26\u96e8\u6797\uff0c\u4e5f\u662f\u751f\u7269\u591a\u6837\u6027\u6700\u4e30\u5bcc\u7684\u5730\u533a\u3002\u5760\u5728\u5df4\u897f\u3001\u79d8\u9c81\u3001\u54e5\u4f26\u6bd4\u4e9a\u3001\u59d4\u5185\u745e\u62c9\u3001\u51e4\u4f0e\u591a\u5c14\u3001\u5a01\u7684\u79d1\u56fe\u3001\u82cf\u91cc\u5357\u3001\u4e3b\u4e9a\u90a3\u7b498\u4e2a\u56fd\u5bb6\u3002\u70ed\u5e26\u96e8\u6797\u6c14\u5019\u7ec8\u5e74\u9ad8\u6e29\u591a\u96e8\uff0c\u65e0\u660e\u663e\u5b63\u8282\u5206\u660e\u3002\u70ed\u5e26\u96e8\u6797\u91cc\u751f\u957f\u7740\u5927\u91cf\u7684\u690d\u7269\uff0c\u662f\u7ef4\u6301\u5168\u7403\u6c27\u6c14\u5e73\u8861\u7684\u91cd\u8981\u751f\u6001\u7cfb\u7edf\u3002\u4f46\u8fd1\u5e74\u6765\u96e8\u6791\u9762\u79ef\u5927\u5e45\u51cf\u5c11\uff0c\u4fdd\u62a4\u96e8\u6791\u6210\u4e3a\u5168\u7403\u5173\u6ce8\u7684\u7126\u70b9\u3002" },
              ["\u70ed\u5e26\u8349\u539f"]: { tb: "\u5357\u7f8e\u6d32\u7684\u70ed\u5e26\u8349\u539f\u4e3b\u8981\u5206\u5e03\u5728\u5df4\u897f\u9ad8\u539f\u4e0a\uff0c\u662f\u4e16\u754c\u4e0a\u9762\u79ef\u6700\u5e7f\u9614\u7684\u70ed\u5e26\u8349\u539f\u4e4b\u4e00\u3002\u70ed\u5e26\u8349\u539f\u6c14\u5019\u7279\u70b9\uff1a\u5168\u5e74\u9ad8\u6e29\uff0c\u5e72\u6e7f\u5b63\u5206\u660e\uff1b\u96e8\u5b63\uff08\u6f6e\u6e7f\uff09\u7eff\u8349\u5982\u8541\uff0c\u5927\u91cf\u690d\u7269\u751f\u957f\uff1b\u5e72\u5b63\u8349\u6728\u67af\u9ec4\uff0c\u8349\u539f\u4e0a\u82cd\u51c9\u3002\u70ed\u5e26\u8349\u539f\u9002\u5408\u91ce\u751f\u52a8\u7269\u751f\u5b58\uff0c\u5982\u72ee\u5b50\u3001\u8c5a\u72d7\u3001\u7315\u7329\u3001\u8d5b\u8f66\u3001\u6842\u725b\u7b49\u3002\u70ed\u5e26\u8349\u539f\u4e5f\u662f\u91cd\u8981\u7684\u7267\u4e1a\u533a\u3002" }
            }

  "kaodian-16": ["asia"],
  "kaodian-17": ["europe"],
  "kaodian-19": ["seasia"],
  "kaodian-24": ["japan"],
  "kaodian-29": ["usa"],
  "kaodian-32": ["china"]
};

// ==================== RENDER ====================
const app = document.getElementById('app');
const nav = document.getElementById('regionNav');

// Navigation
KNOWLEDGE.forEach((region, i) => {
  const btn = document.createElement('button');
  btn.className = `region-btn${i === 0 ? ' active' : ''}`;
  btn.textContent = region.period;
  btn.onclick = () => {
    document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(region.id).scrollIntoView({ behavior: 'smooth' });
  };
  nav.appendChild(btn);
});

// Build page
function buildPage() {
  let html = '';

  KNOWLEDGE.forEach(region => {
    html += `<div class="chapter" id="${region.id}">`;
    region.chapters.forEach(ch => {
      html += `<div class="chapter-header"><div class="chapter-num">${ch.id.split('-')[1]}</div><div><div class="chapter-title">${ch.title}</div></div></div>`;
      ch.points.forEach(pt => {
        let text = pt.text;
        if (pt.kws && Object.keys(pt.kws).length > 0) {
          Object.keys(pt.kws).forEach(kw => {
            const idx = text.indexOf(kw);
            if (idx >= 0) {
              const before = text.substring(0, idx);
              const after = text.substring(idx + kw.length);
              text = before + `<span class="kw" data-keyword="${kw}" data-chapter="${ch.id}" data-point="${pt.num}">${kw}</span>` + after;
            }
          });
        }

        html += `<div class="kp-card"><div class="kp-header" onclick="toggleDetail(this, event)">`;
        html += `<div class="kp-num">${pt.num}</div>`;
        html += `<div class="kp-text">${text}</div>`;
        html += `</div></div>`;
      });
    });
    html += `</div>`;
    const svgs = CHAPTER_SVGS[ch.id] || [];
    svgs.forEach(svgKey => {
      if (SVGS[svgKey]) {
        html += SVGS[svgKey];
      }
    });
  });

  app.innerHTML = html;
}

buildPage();

// ==================== INTERACTIONS ====================

// Format textbook content for better readability
function formatTbContent(text) {
  let paras = text.split(/(?<=[。！？])/);
  return paras.map(p => {
    if (!p.trim()) return '';
    let formatted = p;
    // Highlight numbers/degrees
    formatted = formatted.replace(/(\d+)(\u2103|\u00b0|\u516c\u91cc|\u5e73\u65b9\u516c\u91cc|\u7c73|mm|cm|\u4ebf)/g, `<span class="hl-num">$1$2</span>`);
    // Highlight key geography terms - places
    const places = [
      '\u9752\u85cf\u9ad8\u539f', '\u559c\u9a6c\u62c9\u96c5\u5c71', '\u957f\u6c5f', '\u9ec4\u6cb3', '\u6052\u6cb3',
      '\u4e9a\u9a6c\u900a\u6cb3', '\u5c3c\u7f57\u6cb3', '\u82cf\u4f0a\u58eb\u8fd0\u6cb3', '\u9a6c\u516d\u7532\u6d77\u5cfd',
      '\u4e1c\u6b27\u5e73\u539f', '\u897f\u6b27\u5e73\u539f', '\u6ce2\u5fb7\u5e73\u539f', '\u6052\u6cb3\u5e73\u539f',
      '\u5fb7\u5e72\u9ad8\u539f', '\u5bcc\u58eb\u5c71', '\u7845\u8c37', '\u5df4\u9ece\u76c6\u5730',
      '\u4e9a\u6d32', '\u6b27\u6d32', '\u975e\u6d32', '\u5317\u7f8e\u6d32', '\u5357\u7f8e\u6d32',
      '\u9752\u85cf\u9ad8\u539f', '\u5e15\u7c73\u5c14\u9ad8\u539f',
      '\u6ce2\u65af\u6e7e', '\u5c4b\u6c99', '\u591a\u7491\u6cb3', '\u83b1\u8335\u6cb3',
      '\u4e2d\u5357\u534a\u5c9b', '\u5370\u5ea6\u6d0b', '\u592a\u5e73\u6d0b', '\u5317\u51b0\u6d0b',
      '\u5730\u4e2d\u6d77', '\u7ea2\u6d77', '\u9ed1\u6d77', '\u91cc\u6d77',
      '\u53e4\u5df4', '\u5df4\u897f\u9ad8\u539f', '\u5b89\u7b2c\u65af\u5c71\u8109',
      '\u7279\u62c9\u65af\u5c71\u8109', '\u6d77\u53c2\u5d34', '\u5929\u5c71', '\u963f\u5c14\u6cf0\u65af\u5c71\u8109'
    ];
    places.forEach(t => {
      const re = new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      formatted = formatted.replace(re, `<span class="hl-place">${t}</span>`);
    });
    // Highlight climate types
    const climates = [
      '\u5b63\u98ce\u6c14\u5019', '\u6e29\u5e26\u6d77\u6d0b\u6027\u6c14\u5019', '\u70ed\u5e26\u96e8\u6797\u6c14\u5019',
      '\u70ed\u5e26\u8349\u539f\u6c14\u5019', '\u70ed\u5e26\u6c99\u6f20\u6c14\u5019', '\u6e29\u5e26\u5927\u9646\u6027\u6c14\u5019',
      '\u5730\u4e2d\u6d77\u6c14\u5019', '\u5bd2\u5e26\u6c14\u5019',
      '\u70ed\u5e26\u5b63\u98ce\u6c14\u5019', '\u4e9a\u70ed\u5e26\u5b63\u98ce\u6c14\u5019',
      '\u6e29\u5e26\u5b63\u98ce\u6c14\u5019'
    ];
    climates.forEach(t => {
      const re = new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      formatted = formatted.replace(re, `<span class="hl-climate">${t}</span>`);
    });
    return `<p>${formatted}</p>`;
  }).filter(p => p.trim()).join('');
}

function toggleDetail(header, evt) {
  if (evt && evt.target && evt.target.closest && evt.target.closest('.kw')) return;
  const card = header.closest('.kp-card');
  let detail = card.querySelector('.kp-detail');
  if (!detail) {
    detail = document.createElement('div');
    detail.className = 'kp-detail show';
    detail.innerHTML = '<div class="detail-tabs"><div class="detail-tab active">\ud83d\udcd6 \u8bfe\u672c\u8be6\u89e3</div><div class="detail-tab">\ud83d\udcdd \u76f8\u5173\u771f\u9898</div></div><div class="detail-body" style="padding:10px 16px;color:#999;font-size:12px">\u70b9\u51fb\u7ea2\u8272\u5173\u952e\u8bcd\u67e5\u770b\u8be6\u7ec6\u5185\u5bb9</div>';
    card.appendChild(detail);
  } else {
    detail.classList.toggle('show');
    detail.style.display = detail.classList.contains('show') ? 'block' : 'none';
  }
}

// Click on keyword to open modal
document.addEventListener('click', function(e) {
  const kw = e.target.closest('.kw');
  if (kw) {
    e.stopPropagation();
    const keyword = kw.dataset.keyword;
    const chapterId = kw.dataset.chapter;
    const pointNum = kw.dataset.point;

    let foundData = null;
    KNOWLEDGE.forEach(r => {
      r.chapters.forEach(ch => {
        if (ch.id === chapterId) {
          ch.points.forEach(pt => {
            if (pt.num == pointNum && pt.kws && pt.kws[keyword]) {
              foundData = { keyword, ...pt.kws[keyword], chapter: ch.title };
            }
          });
        }
      });
    });

    if (foundData) {
      document.getElementById('modalTitle').textContent = foundData.keyword;

      let tbContent = foundData.tb ? formatTbContent(foundData.tb) : '<p style="color:#999">\u6682\u65e0\u5185\u5bb9</p>';
      let examContent = foundData.exam ? '<p>' + foundData.exam + '</p>' : '<p style="color:#999">\ud83d\udccc \u7b49\u4f60\u53d1\u4e86\u771f\u9898\uff0c\u6211\u4f1a\u8865\u5230\u8fd9\u91cc\u301c</p>';

      document.getElementById('modalBody').innerHTML = '\
        <div class="detail-tabs" style="margin-bottom:14px">\
          <div class="detail-tab active" onclick="switchModalTab(this,0)">\ud83d\udcd6 \u8bfe\u672c\u8be6\u89e3</div>\
          <div class="detail-tab" onclick="switchModalTab(this,1)">\ud83d\udcdd \u76f8\u5173\u771f\u9898</div>\
        </div>\
        <div class="tab-content" data-tab="0">' + tbContent + '</div>\
        <div class="tab-content" data-tab="1" style="display:none">' + examContent + '</div>\
      ';
      document.getElementById('modalOverlay').classList.add('show');
    }
  }
});

function switchModalTab(tab, index) {
  const tabs = tab.parentElement.querySelectorAll('.detail-tab');
  tabs.forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const body = document.getElementById('modalBody');
  body.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  body.querySelectorAll('.tab-content')[index].style.display = 'block';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// Close modal on overlay click
document.getElementById('modalOverlay').onclick = function(e) {
  if (e.target === this) closeModal();
};

// Escape key closes modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
